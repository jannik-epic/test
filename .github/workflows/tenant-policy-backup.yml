# vanguard-template-version: 2026-07-20.5
name: Tenant Policy Backup

on:
  workflow_dispatch:
    inputs:
      include_types:
        description: 'Comma-separated policy-type keys to include. Use "all" or leave empty for the default safe set.'
        required: false
        type: string
        default: 'conditional-access-policies,named-locations,authentication-strengths,authentication-contexts,authorization-policy,device-registration-policy,entra-organization,entra-domains,entra-groups,entra-administrative-units,entra-applications,entra-oauth2-permission-grants,entra-directory-roles,entra-directory-role-definitions,entra-directory-role-assignments,authentication-methods-policy,app-management-policies,defender-secure-score-control-profiles,configuration-policies,device-configurations,group-policy-configurations,compliance-policies,device-management-scripts,device-health-scripts,device-compliance-scripts,device-management-intents,mobile-apps,managed-app-policies,targeted-managed-app-configurations,assignment-filters,enrollment-configurations,autopilot-deployment-profiles,feature-update-profiles,driver-update-profiles,device-categories,policy-sets,terms-and-conditions,role-definitions,notification-message-templates,intune-branding-profiles,cloud-pc-provisioning-policies,cloud-pc-on-premises-connections,cloud-pc-device-images,identity-security-defaults,admin-consent-request-policy,permission-grant-policies,cross-tenant-access-policy-default,cross-tenant-access-policy-partners,external-identities-policy,claims-mapping-policies,home-realm-discovery-policies,token-lifetime-policies,group-lifecycle-policies,security-detection-rules,intune-role-scope-tags,purview-sensitivity-labels,purview-label-policy-settings,windows-quality-update-profiles,windows-quality-update-policies,reusable-policy-settings,device-shell-scripts,mobile-app-configurations,mobile-threat-defense-connectors,teamwork-organization-settings,sharepoint-tenant-settings,m365-apps-installation-options,group-directory-settings,people-profile-card-properties,people-pronouns-settings,people-item-insights-settings,edge-internet-explorer-mode-site-lists,subscribed-skus,mobile-app-categories,ios-managed-app-protections,android-managed-app-protections,windows-managed-app-protections,ios-lob-app-provisioning-configurations,wdac-supplemental-policies,resource-access-profiles,derived-credentials,role-assignments,operation-approval-policies,android-device-owner-enrollment-profiles,cloud-pc-user-settings,feature-rollout-policies,default-app-management-policy,authentication-flows-policy,entra-custom-role-definitions,lifecycle-workflows,lifecycle-workflow-task-extensions'
      backup_scope:
        description: 'Coarse scope preset (legacy). Overridden when include_types is set.'
        required: false
        type: choice
        default: 'full'
        options:
          - full
          - intune_only
          - conditional_access_only
          - custom
      include_assignments:
        description: 'Include policy assignments in the snapshot'
        required: false
        type: boolean
        default: true
      include_groups:
        description: 'Include Entra groups referenced by assignments'
        required: false
        type: boolean
        default: true
      commit_snapshot:
        description: 'Commit the snapshot into .modern-dev-mgmt/tenant-backups'
        required: false
        type: boolean
        default: true
      backup_label:
        description: 'Optional human label for this backup'
        required: false
        type: string
      request_context_b64:
        description: 'Base64 encoded Vanguard request context'
        required: false
        type: string

env:
  AZURE_TENANT_ID: 'f849cde7-f11d-4ef5-a31d-7fca98b21bf5'
  AZURE_BACKUP_CLIENT_ID: 'a34f2806-b6f7-4d11-98f6-b32894396ca8'
  GRAPH_BASE: 'https://graph.microsoft.com/v1.0'
  GRAPH_BETA_BASE: 'https://graph.microsoft.com/beta'

jobs:
  tenant-policy-backup:
    name: Snapshot tenant policies
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Azure Login (backup app reg, OIDC)
        uses: azure/login@v3
        with:
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          client-id: ${{ env.AZURE_BACKUP_CLIENT_ID }}
          allow-no-subscriptions: true

      - name: Get Microsoft Graph token
        shell: bash
        run: |
          set -euo pipefail
          token="$(az account get-access-token --resource https://graph.microsoft.com --query accessToken -o tsv)"
          if [[ -z "$token" ]]; then
            echo "::error::Failed to acquire Microsoft Graph access token. Confirm the backup app reg has admin consent and the federated credential is registered."
            exit 1
          fi
          echo "::add-mask::$token"
          echo "GRAPH_TOKEN=$token" >> "$GITHUB_ENV"

      - name: Snapshot tenant policies
        id: snapshot
        shell: pwsh
        env:
          INPUT_SCOPE: ${{ github.event.inputs.backup_scope }}
          INPUT_INCLUDE_TYPES: ${{ github.event.inputs.include_types }}
          INPUT_INCLUDE_ASSIGNMENTS: ${{ github.event.inputs.include_assignments }}
          INPUT_INCLUDE_GROUPS: ${{ github.event.inputs.include_groups }}
          INPUT_COMMIT_SNAPSHOT: ${{ github.event.inputs.commit_snapshot }}
          INPUT_BACKUP_LABEL: ${{ github.event.inputs.backup_label }}
          INPUT_REQUEST_CONTEXT_B64: ${{ github.event.inputs.request_context_b64 }}
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not $env:GRAPH_TOKEN) { throw 'GRAPH_TOKEN missing.' }

          $scope = ([string]$env:INPUT_SCOPE).Trim().ToLowerInvariant()
          if (-not $scope) { $scope = 'full' }
          $includeAssignments = ([string]$env:INPUT_INCLUDE_ASSIGNMENTS).Trim().ToLowerInvariant() -ne 'false'
          $includeGroups = ([string]$env:INPUT_INCLUDE_GROUPS).Trim().ToLowerInvariant() -ne 'false'
          $commitSnapshot = ([string]$env:INPUT_COMMIT_SNAPSHOT).Trim().ToLowerInvariant() -ne 'false'

          $policyTypesPath = 'scripts/tenant-policy-types.json'
          if (-not (Test-Path $policyTypesPath)) { throw "Policy type catalog missing: $policyTypesPath" }
          $allSpecs = Get-Content -Path $policyTypesPath -Raw | ConvertFrom-Json
          $rawIncludeTypes = ([string]$env:INPUT_INCLUDE_TYPES).Trim()
          if (-not $rawIncludeTypes) {
            switch ($scope) {
              'intune_only' { $includedKeys = ($allSpecs | Where-Object { $_.group -like 'intune-*' -or $_.group -eq 'cloud-pc' } | ForEach-Object { $_.key }) }
              'conditional_access_only' { $includedKeys = ($allSpecs | Where-Object { $_.group -eq 'conditional-access' } | ForEach-Object { $_.key }) }
              default { $includedKeys = ('conditional-access-policies,named-locations,authentication-strengths,authentication-contexts,authorization-policy,device-registration-policy,entra-organization,entra-domains,entra-groups,entra-administrative-units,entra-applications,entra-oauth2-permission-grants,entra-directory-roles,entra-directory-role-definitions,entra-directory-role-assignments,authentication-methods-policy,app-management-policies,defender-secure-score-control-profiles,configuration-policies,device-configurations,group-policy-configurations,compliance-policies,device-management-scripts,device-health-scripts,device-compliance-scripts,device-management-intents,mobile-apps,managed-app-policies,targeted-managed-app-configurations,assignment-filters,enrollment-configurations,autopilot-deployment-profiles,feature-update-profiles,driver-update-profiles,device-categories,policy-sets,terms-and-conditions,role-definitions,notification-message-templates,intune-branding-profiles,cloud-pc-provisioning-policies,cloud-pc-on-premises-connections,cloud-pc-device-images,identity-security-defaults,admin-consent-request-policy,permission-grant-policies,cross-tenant-access-policy-default,cross-tenant-access-policy-partners,external-identities-policy,claims-mapping-policies,home-realm-discovery-policies,token-lifetime-policies,group-lifecycle-policies,security-detection-rules,intune-role-scope-tags,purview-sensitivity-labels,purview-label-policy-settings,windows-quality-update-profiles,windows-quality-update-policies,reusable-policy-settings,device-shell-scripts,mobile-app-configurations,mobile-threat-defense-connectors,teamwork-organization-settings,sharepoint-tenant-settings,m365-apps-installation-options,group-directory-settings,people-profile-card-properties,people-pronouns-settings,people-item-insights-settings,edge-internet-explorer-mode-site-lists,subscribed-skus,mobile-app-categories,ios-managed-app-protections,android-managed-app-protections,windows-managed-app-protections,ios-lob-app-provisioning-configurations,wdac-supplemental-policies,resource-access-profiles,derived-credentials,role-assignments,operation-approval-policies,android-device-owner-enrollment-profiles,cloud-pc-user-settings,feature-rollout-policies,default-app-management-policy,authentication-flows-policy,entra-custom-role-definitions,lifecycle-workflows,lifecycle-workflow-task-extensions' -split ',') | ForEach-Object { $_.Trim() } | Where-Object { $_ } }
            }
          } elseif ($rawIncludeTypes.ToLowerInvariant() -eq 'all') {
            $includedKeys = $allSpecs | ForEach-Object { $_.key }
          } else {
            $includedKeys = ($rawIncludeTypes -split ',') | ForEach-Object { $_.Trim() } | Where-Object { $_ }
          }
          $includedSet = New-Object 'System.Collections.Generic.HashSet[string]'
          foreach ($k in @($includedKeys)) { [void]$includedSet.Add($k.ToLowerInvariant()) }
          $selectedSpecs = @($allSpecs | Where-Object { $includedSet.Contains($_.key.ToLowerInvariant()) })

          # GitHub auto-exposes the run id as $env:GITHUB_RUN_ID. Using the
          # env var instead of an inline GitHub expression inside the run block
          # keeps the workflow under GitHub's 21000-char expression length
          # limit (see https://github.com/actions/runner/issues/2347).
          $backupId = $env:GITHUB_RUN_ID
          $tenantId = $env:AZURE_TENANT_ID
          $outDir = ".modern-dev-mgmt/tenant-backups/$tenantId/$backupId"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          Add-Content -Path $env:GITHUB_OUTPUT -Value "snapshot_dir=$outDir"
          New-Item -ItemType Directory -Force -Path (Join-Path $outDir 'assignments') | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $outDir 'groups') | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $outDir 'raw/graph-responses') | Out-Null
          foreach ($spec in $selectedSpecs) {
            $dir = Join-Path $outDir (Join-Path 'policies' $spec.subdir)
            New-Item -ItemType Directory -Force -Path $dir | Out-Null
          }

          $warnings = New-Object System.Collections.Generic.List[string]
          $limitations = New-Object System.Collections.Generic.List[object]
          $manifestPolicies = New-Object System.Collections.Generic.List[object]
          $GraphBase = $env:GRAPH_BASE.TrimEnd('/')
          $GraphBetaBase = $env:GRAPH_BETA_BASE.TrimEnd('/')
          $headers = @{
            Authorization = "Bearer $env:GRAPH_TOKEN"
            'Content-Type' = 'application/json'
          }

          function Graph-ErrorMessage {
            param([object]$ErrorRecord)
            $message = $ErrorRecord.Exception.Message
            if ($ErrorRecord.ErrorDetails -and $ErrorRecord.ErrorDetails.Message) {
              $message = $ErrorRecord.ErrorDetails.Message
            }
            return $message
          }

          function Graph-ErrorCode {
            param([object]$ErrorRecord)
            if ($ErrorRecord.ErrorDetails -and $ErrorRecord.ErrorDetails.Message) {
              try {
                $body = $ErrorRecord.ErrorDetails.Message | ConvertFrom-Json
                if ($body.error -and $body.error.code) { return [string]$body.error.code }
              } catch {}
            }
            return $null
          }

          function Invoke-GraphJson {
            param(
              [string]$Uri,
              [string]$Label,
              [string]$Method = 'GET',
              [object]$Body = $null,
              [switch]$NotFoundAsLimitation,
              [string]$LimitationArea = 'graph'
            )
            $maxAttempts = 5
            for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
              try {
                $params = @{ Method = $Method; Uri = $Uri; Headers = $headers; TimeoutSec = 120 }
                if ($null -ne $Body) { $params.Body = ($Body | ConvertTo-Json -Depth 30) }
                return Invoke-RestMethod @params
              } catch {
                $status = 0
                try { $status = [int]$_.Exception.Response.StatusCode } catch {}
                if ($attempt -lt $maxAttempts -and ($status -eq 429 -or $status -ge 500)) {
                  $delay = 0
                  try {
                    $ra = $_.Exception.Response.Headers.RetryAfter
                    if ($ra -and $ra.Delta) { $delay = [int]$ra.Delta.TotalSeconds }
                  } catch {}
                  if ($delay -lt 1) { $delay = [Math]::Min(60, [int][Math]::Pow(2, $attempt) * 2) }
                  Write-Host "Graph throttled/unavailable ($status) for $Label — retrying in $($delay)s (attempt $attempt/$maxAttempts)"
                  Start-Sleep -Seconds $delay
                  continue
                }
                $message = Graph-ErrorMessage $_
                $code = Graph-ErrorCode $_
                if ($NotFoundAsLimitation -and $code -eq 'Request_ResourceNotFound') {
                  $limitations.Add([ordered]@{ area = $LimitationArea; reason = "$Label does not exist or is no longer resolvable."; followUp = 'Review stale assignment targets in the source tenant.' }) | Out-Null
                } else {
                  $warnings.Add("$Label unavailable: $message") | Out-Null
                }
                return $null
              }
            }
            return $null
          }

          $truncatedCollections = New-Object System.Collections.Generic.List[string]
          function Invoke-GraphCollection {
            param([string]$Uri, [string]$Label)
            $items = New-Object System.Collections.Generic.List[object]
            $next = $Uri
            while ($next) {
              $response = Invoke-GraphJson -Uri $next -Label $Label
              if ($null -eq $response) {
                # A mid-pagination failure must not masquerade as a complete
                # collection: record it so the manifest reports a partial type.
                if ($next -ne $Uri) {
                  $truncatedCollections.Add($Label) | Out-Null
                  $warnings.Add("$Label collection truncated after $($items.Count) items: a page fetch failed; this type's snapshot is partial.") | Out-Null
                }
                break
              }
              if ($response.value -is [array]) {
                foreach ($item in $response.value) { $items.Add($item) | Out-Null }
              } elseif ($response.value) {
                $items.Add($response.value) | Out-Null
              } else {
                $items.Add($response) | Out-Null
              }
              $next = $response.'@odata.nextLink'
            }
            return @($items.ToArray())
          }

          function Save-Json {
            param([string]$Path, [object]$Data)
            $target = Join-Path $outDir $Path
            $parent = Split-Path -Parent $target
            if ($parent) { New-Item -ItemType Directory -Force -Path $parent | Out-Null }
            $json = ConvertTo-Json -InputObject $Data -Depth 40
            if ($null -eq $json) { $json = 'null' }
            Set-Content -Path $target -Value $json -Encoding UTF8
          }

          function Sanitize-Id {
            param([string]$Value)
            if (-not $Value) { return 'unknown' }
            $safe = ($Value -replace '[^a-zA-Z0-9._-]', '_')
            if ($safe.Length -le 80) { return $safe }
            # Cap the file name so committed snapshot paths stay well under the
            # Windows 260-char MAX_PATH — otherwise every windows-latest job in
            # this repo fails at checkout with "Filename too long". A short
            # content hash keeps truncated names collision-free.
            $sha = [System.Security.Cryptography.SHA256]::Create()
            $hashHex = -join ($sha.ComputeHash([Text.Encoding]::UTF8.GetBytes($Value)) | ForEach-Object { $_.ToString('x2') })
            return $safe.Substring(0, 64) + '-' + $hashHex.Substring(0, 10)
          }

          function Get-PolicyDisplayName {
            param([object]$Item)
            foreach ($key in @('displayName','name','policyName','profileName','title')) {
              $prop = if ($Item) { $Item.PSObject.Properties[$key] } else { $null }
              if ($prop -and $prop.Value) {
                return [string]$prop.Value
              }
            }
            return $null
          }

          # Description + a compact summary are written into the manifest so the
          # app can render the full Backup Objects browser from one committed file
          # instead of re-fetching every object (which exhausts GitHub rate limits
          # on large backups).
          function Get-PolicyDescription {
            param([object]$Item)
            foreach ($key in @('description','notes')) {
              $prop = if ($Item) { $Item.PSObject.Properties[$key] } else { $null }
              if ($prop -and ($prop.Value -is [string]) -and $prop.Value) {
                return [string]$prop.Value
              }
            }
            return $null
          }

          function Get-PolicySummary {
            param([object]$Item)
            if (-not $Item) { return $null }
            $out = [ordered]@{}
            foreach ($key in @('state','platforms','technologies','targetPlatforms','createdDateTime','lastModifiedDateTime','isAssigned','visibility','enabled')) {
              $prop = $Item.PSObject.Properties[$key]
              if ($prop -and $null -ne $prop.Value) { $out[$key] = $prop.Value }
            }
            $sc = $Item.PSObject.Properties['settingCount']
            if ($sc -and ($sc.Value -is [int])) { $out['settingCount'] = [int]$sc.Value }
            $asn = $Item.PSObject.Properties['assignments']
            if ($asn -and $asn.Value) { $out['assignmentCount'] = @($asn.Value).Count }
            $mem = $Item.PSObject.Properties['members']
            if ($mem -and $mem.Value) { $out['memberCount'] = @($mem.Value).Count }
            if ($out.Keys.Count -eq 0) { return $null }
            return $out
          }

          function Save-PolicyArray {
            param([string]$Subdir, [string]$PolicyType, [string]$Label, [array]$Items, [bool]$ExpandAssignments = $false, [bool]$Restorable = $true)
            $count = 0
            $expandedAssignments = 0
            foreach ($item in $Items) {
              if ($null -eq $item) { continue }
              $rawId = if ($item.id) { [string]$item.id } else { [string]$item.'@odata.etag' }
              if (-not $rawId) { continue }
              $safe = Sanitize-Id $rawId
              $policyPath = "policies/$Subdir/$safe.json"
              Save-Json -Path $policyPath -Data $item
              $manifestPolicies.Add([ordered]@{
                policyType = $PolicyType
                path = $policyPath
                backupPolicyId = $rawId
                displayName = Get-PolicyDisplayName -Item $item
                description = Get-PolicyDescription -Item $item
                summary = Get-PolicySummary -Item $item
                restorable = $Restorable
              }) | Out-Null
              if ($ExpandAssignments -and $item.assignments) {
                Save-Json -Path ("assignments/$safe.assignments.json") -Data $item.assignments
                $expandedAssignments += @($item.assignments).Count
              }
              $count++
            }
            return @{ count = $count; assignments = $expandedAssignments }
          }

          $manifestCounts = [ordered]@{}
          foreach ($spec in $allSpecs) { $manifestCounts[$spec.key] = 0 }
          $manifestCounts['assignments'] = 0
          $manifestCounts['groups'] = 0

          foreach ($spec in $selectedSpecs) {
            $base = if ($spec.graphBase -eq 'beta') { $GraphBetaBase } else { $GraphBase }
            $restorable = $true
            if ($spec.PSObject.Properties.Match('restorable').Count -gt 0) { $restorable = [bool]$spec.restorable }
            # Types that need nested enumeration instead of a flat readPath.
            if ($spec.key -eq 'dep-enrollment-profiles') {
              $depSettings = Invoke-GraphCollection -Uri "$base/deviceManagement/depOnboardingSettings" -Label 'DEP onboarding settings'
              $depProfiles = New-Object System.Collections.Generic.List[object]
              foreach ($dep in @($depSettings)) {
                if ($null -eq $dep -or -not $dep.id) { continue }
                $profiles = Invoke-GraphCollection -Uri ("$base/deviceManagement/depOnboardingSettings/" + $dep.id + '/enrollmentProfiles') -Label "DEP enrollment profiles ($($dep.id))"
                foreach ($p in @($profiles)) {
                  if ($null -eq $p) { continue }
                  $p | Add-Member -NotePropertyName depOnboardingSettingId -NotePropertyValue $dep.id -Force
                  $depProfiles.Add($p) | Out-Null
                }
              }
              $result = Save-PolicyArray -Subdir $spec.subdir -PolicyType $spec.policyType -Label $spec.label -Items @($depProfiles.ToArray()) -ExpandAssignments $false -Restorable $restorable
              $manifestCounts[$spec.key] = $result.count
              continue
            }
            if ($spec.key -eq 'entra-company-branding') {
              $orgs = Invoke-GraphCollection -Uri "$base/organization" -Label 'Organization'
              $brandings = New-Object System.Collections.Generic.List[object]
              foreach ($o in @($orgs)) {
                if ($null -eq $o -or -not $o.id) { continue }
                $branding = Invoke-GraphJson -Uri ("$base/organization/" + $o.id + '/branding') -Label "Company branding ($($o.id))" -NotFoundAsLimitation -LimitationArea 'entra-company-branding'
                if ($null -eq $branding) { continue }
                $locs = Invoke-GraphCollection -Uri ("$base/organization/" + $o.id + '/branding/localizations') -Label "Company branding localizations ($($o.id))"
                $branding | Add-Member -NotePropertyName localizations -NotePropertyValue @($locs) -Force
                $branding | Add-Member -NotePropertyName id -NotePropertyValue $o.id -Force
                $brandings.Add($branding) | Out-Null
              }
              $result = Save-PolicyArray -Subdir $spec.subdir -PolicyType $spec.policyType -Label $spec.label -Items @($brandings.ToArray()) -ExpandAssignments $false -Restorable $restorable
              $manifestCounts[$spec.key] = $result.count
              continue
            }
            $expand = if ($includeAssignments -and $spec.supportsExpandAssignments) { '?$expand=assignments' } else { '' }
            $uri = "$base/$($spec.readPath)$expand"
            if ($spec.singleton) {
              $obj = Invoke-GraphJson -Uri $uri -Label $spec.label
              if ($obj) {
                $policyPath = "policies/$($spec.subdir)/_singleton.json"
                Save-Json -Path $policyPath -Data $obj
                $manifestPolicies.Add([ordered]@{
                  policyType = $spec.policyType
                  path = $policyPath
                  backupPolicyId = "$($spec.policyType)-singleton"
                  displayName = Get-PolicyDisplayName -Item $obj
                  description = Get-PolicyDescription -Item $obj
                  summary = Get-PolicySummary -Item $obj
                  restorable = $restorable
                }) | Out-Null
                $manifestCounts[$spec.key] = 1
              }
              continue
            }
            $items = Invoke-GraphCollection -Uri $uri -Label $spec.label
            # The list endpoints for settings catalog, endpoint security intents
            # and ADMX return metadata only — without the per-object bodies a
            # restore would create empty shells. Pull the full content per item.
            if ($spec.key -eq 'configuration-policies') {
              foreach ($item in @($items)) {
                if ($null -eq $item -or -not $item.id) { continue }
                $settings = Invoke-GraphCollection -Uri ("$base/deviceManagement/configurationPolicies/" + $item.id + '/settings') -Label "$($spec.label) settings ($($item.id))"
                $item | Add-Member -NotePropertyName settings -NotePropertyValue @($settings) -Force
              }
            } elseif ($spec.key -eq 'device-management-intents') {
              foreach ($item in @($items)) {
                if ($null -eq $item -or -not $item.id) { continue }
                $intentSettings = Invoke-GraphCollection -Uri ("$base/deviceManagement/intents/" + $item.id + '/settings') -Label "$($spec.label) settings ($($item.id))"
                $item | Add-Member -NotePropertyName settingsDelta -NotePropertyValue @($intentSettings) -Force
              }
            } elseif ($spec.key -eq 'group-policy-configurations') {
              foreach ($item in @($items)) {
                if ($null -eq $item -or -not $item.id) { continue }
                # Graph caps $expand depth at 1, so presentationValues (which
                # need their own $expand=presentation) are fetched per value.
                $dvUri = "$base/deviceManagement/groupPolicyConfigurations/" + $item.id + '/definitionValues?$expand=definition'
                $definitionValues = @(Invoke-GraphCollection -Uri $dvUri -Label "$($spec.label) definitionValues ($($item.id))")
                foreach ($dv in $definitionValues) {
                  if ($null -eq $dv -or -not $dv.id) { continue }
                  $pvUri = "$base/deviceManagement/groupPolicyConfigurations/" + $item.id + '/definitionValues/' + $dv.id + '/presentationValues?$expand=presentation'
                  $presentationValues = Invoke-GraphCollection -Uri $pvUri -Label "$($spec.label) presentationValues ($($dv.id))"
                  $dv | Add-Member -NotePropertyName presentationValues -NotePropertyValue @($presentationValues) -Force
                }
                $item | Add-Member -NotePropertyName definitionValues -NotePropertyValue @($definitionValues) -Force
              }
            }
            $result = Save-PolicyArray -Subdir $spec.subdir -PolicyType $spec.policyType -Label $spec.label -Items $items -ExpandAssignments ($includeAssignments -and $spec.supportsExpandAssignments) -Restorable $restorable
            $manifestCounts[$spec.key] = $result.count
            $manifestCounts['assignments'] = [int]$manifestCounts['assignments'] + [int]$result.assignments
          }

          # Group resolution
          if ($includeGroups) {
            $groupIds = New-Object System.Collections.Generic.HashSet[string]
            foreach ($file in Get-ChildItem -Path (Join-Path $outDir 'assignments') -Filter '*.json' -ErrorAction SilentlyContinue) {
              try {
                $rows = Get-Content -Path $file.FullName -Raw | ConvertFrom-Json
                foreach ($row in @($rows)) {
                  $target = $row.target
                  if ($target -and $target.groupId) {
                    [void]$groupIds.Add([string]$target.groupId)
                  }
                }
              } catch {
                $warnings.Add("Failed to parse assignments file $($file.Name): $($_.Exception.Message)") | Out-Null
              }
            }

            foreach ($gid in $groupIds) {
              $safe = Sanitize-Id $gid
              $group = Invoke-GraphJson -Uri "$GraphBase/groups/$gid" -Label "Group $gid" -NotFoundAsLimitation -LimitationArea 'groups'
              if ($null -eq $group) { continue }
              $members = Invoke-GraphCollection -Uri "$GraphBase/groups/$gid/members?$select=id,displayName,userPrincipalName" -Label "Group members $gid"
              $payload = [ordered]@{
                originalGroupId = $gid
                name = $group.displayName
                description = $group.description
                mailNickname = $group.mailNickname
                rawJson = $group
                memberIds = @($members | ForEach-Object { $_.id })
              }
              Save-Json -Path "groups/$safe.json" -Data $payload
              $manifestCounts.groups++
            }
          } else {
            $limitations.Add([ordered]@{ area = 'groups'; reason = 'include_groups was set to false; assignments referencing groups will not have rawJson on restore.'; followUp = 'Re-run backup with include_groups=true to recover full restore fidelity.' }) | Out-Null
          }

          $manifest = [ordered]@{
            schemaVersion = 1
            source = 'modern-dev-mgmt'
            tenantId = $tenantId
            backupId = $backupId
            workflowRunId = $env:GITHUB_RUN_ID
            repository = $env:GITHUB_REPOSITORY
            scope = $scope
            includedTypes = @($selectedSpecs | ForEach-Object { $_.key })
            label = $env:INPUT_BACKUP_LABEL
            includeAssignments = $includeAssignments
            includeGroups = $includeGroups
            createdAt = (Get-Date).ToUniversalTime().ToString('o')
            graphBase = $GraphBase
            graphBetaBase = $GraphBetaBase
            counts = $manifestCounts
            warningCount = $warnings.Count
            limitationCount = $limitations.Count
            truncatedCollections = @($truncatedCollections.ToArray())
            partial = ($truncatedCollections.Count -gt 0)
            policies = @($manifestPolicies.ToArray())
          }
          if ($env:INPUT_REQUEST_CONTEXT_B64) { $manifest.requestContextProvided = $true }
          Save-Json -Path 'manifest.json' -Data $manifest
          Save-Json -Path 'warnings.json' -Data @($warnings.ToArray())
          Save-Json -Path 'limitations.json' -Data @($limitations.ToArray())

          $latestPath = ".modern-dev-mgmt/tenant-backups/$tenantId/latest.json"
          $latest = [ordered]@{
            backupId = $backupId
            tenantId = $tenantId
            snapshotPath = $outDir
            createdAt = $manifest.createdAt
            workflowRunId = $manifest.workflowRunId
            counts = $manifestCounts
            scope = $scope
          }
          $latest | ConvertTo-Json -Depth 20 | Set-Content -Path $latestPath -Encoding UTF8

          $totalPolicies = 0
          foreach ($entry in $manifestCounts.GetEnumerator()) {
            if ($entry.Key -in @('assignments','groups')) { continue }
            $totalPolicies += [int]$entry.Value
          }
          Add-Content -Path $env:GITHUB_OUTPUT -Value "latest_path=$latestPath"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "backup_id=$backupId"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "policy_count=$totalPolicies"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "assignment_count=$($manifestCounts.assignments)"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "group_count=$($manifestCounts.groups)"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "warning_count=$($warnings.Count)"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "commit_snapshot=$commitSnapshot"

          $summary = @(
            '# Tenant Policy Backup',
            '',
            "Backup ID: $backupId",
            "Snapshot path: $outDir",
            "Scope: $scope",
            '',
            '| Object | Count |',
            '| --- | --- |'
          )
          foreach ($entry in $manifestCounts.GetEnumerator()) {
            $summary += "| $($entry.Key) | $($entry.Value) |"
          }
          if ($warnings.Count) {
            $summary += ''
            $summary += "## Warnings ($($warnings.Count))"
            foreach ($warning in @($warnings.ToArray() | Select-Object -First 20)) { $summary += "- $warning" }
          }
          $summary | Add-Content -Path $env:GITHUB_STEP_SUMMARY

      - name: Snapshot Purview + Exchange (app-only SCC/EXO PowerShell)
        if: ${{ steps.snapshot.outputs.snapshot_dir != '' }}
        shell: pwsh
        env:
          SCC_CERT_PFX_B64: ${{ secrets.PURVIEW_CONNECTOR_PFX_B64 }}
          SCC_CERT_PWD: ${{ secrets.PURVIEW_CONNECTOR_PFX_PWD }}
          SCC_APP_ID: ''
          SCC_ORG: ''
          SNAPSHOT_DIR: ${{ steps.snapshot.outputs.snapshot_dir }}
        run: |
          $ErrorActionPreference = 'Stop'
          function Add-SnapshotWarnings {
            param([array]$Messages)
            if (-not $Messages -or -not $Messages.Count) { return }
            $warningsPath = Join-Path $env:SNAPSHOT_DIR 'warnings.json'
            $warnings = @()
            if (Test-Path $warningsPath) {
              try { $warnings = @(Get-Content $warningsPath -Raw | ConvertFrom-Json) } catch { $warnings = @() }
            }
            foreach ($msg in @($Messages)) {
              if ($msg) { $warnings += [string]$msg }
            }
            $warnings | ConvertTo-Json -Depth 8 | Set-Content -Path $warningsPath -Encoding UTF8
            $manifestPath = Join-Path $env:SNAPSHOT_DIR 'manifest.json'
            if (Test-Path $manifestPath) {
              try {
                $m = Get-Content $manifestPath -Raw | ConvertFrom-Json
                $m.warningCount = @($warnings).Count
                $m | ConvertTo-Json -Depth 30 | Set-Content -Path $manifestPath -Encoding UTF8
              } catch {}
            }
          }
          # Connector identity comes from config (baked) or a committed onboarding
          # file in the tenant repo (scripts/purview-connector.json: { appId, org }).
          # This keeps per-tenant onboarding to "push one config file + the cert
          # secret" — no app DB change needed.
          $appId = $env:SCC_APP_ID
          $org = $env:SCC_ORG
          if ((-not $appId -or -not $org) -and (Test-Path 'scripts/purview-connector.json')) {
            $cfg = Get-Content 'scripts/purview-connector.json' -Raw | ConvertFrom-Json
            if (-not $appId) { $appId = [string]$cfg.appId }
            if (-not $org) { $org = [string]$cfg.org }
          }
          if (-not $env:SCC_CERT_PFX_B64 -or -not $appId -or -not $org) {
            Add-SnapshotWarnings -Messages @('Purview/Exchange connector not onboarded for this tenant; Exchange Online and Security & Compliance PowerShell objects were not captured.')
            Write-Host 'Purview/Exchange connector not onboarded for this tenant - skipping non-Graph backup.'
            exit 0
          }
          $ProgressPreference = 'SilentlyContinue'
          Install-Module ExchangeOnlineManagement -RequiredVersion 3.5.0 -Scope CurrentUser -Force -AllowClobber
          Import-Module ExchangeOnlineManagement
          $bytes = [Convert]::FromBase64String($env:SCC_CERT_PFX_B64)
          $cert = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new($bytes, $env:SCC_CERT_PWD)
          $outDir = $env:SNAPSHOT_DIR
          $newPolicies = New-Object System.Collections.Generic.List[object]
          $newCounts = [ordered]@{}
          $sccWarnings = New-Object System.Collections.Generic.List[string]

          # Keep committed paths under the Windows 260-char MAX_PATH (see the
          # main snapshot step): overlong names break checkout on windows-latest.
          function Get-SafeFileName {
            param([string]$Value)
            if (-not $Value) { return 'unknown' }
            $safe = ($Value -replace '[^a-zA-Z0-9._-]','_')
            if ($safe.Length -le 80) { return $safe }
            $sha = [System.Security.Cryptography.SHA256]::Create()
            $hashHex = -join ($sha.ComputeHash([Text.Encoding]::UTF8.GetBytes($Value)) | ForEach-Object { $_.ToString('x2') })
            return $safe.Substring(0, 64) + '-' + $hashHex.Substring(0, 10)
          }

          function Backup-CmdSet {
            param([array]$Targets)
            foreach ($t in $Targets) {
              $dir = Join-Path $outDir ('policies/' + $t.d)
              New-Item -ItemType Directory -Force -Path $dir | Out-Null
              $n = 0
              try {
                $items = & $t.c -ErrorAction Stop
                foreach ($it in @($items)) {
                  if ($null -eq $it) { continue }
                  $rawId = if ($it.Guid) { [string]$it.Guid } elseif ($it.Identity) { [string]$it.Identity } else { [string]$it.Name }
                  if (-not $rawId) { continue }
                  $safe = Get-SafeFileName $rawId
                  $rel = 'policies/' + $t.d + '/' + $safe + '.json'
                  try { ($it | ConvertTo-Json -Depth 25) | Set-Content -Path (Join-Path $outDir $rel) -Encoding UTF8 }
                  catch { ([pscustomobject]@{ id=$rawId; name=$it.Name; _serializationError=$_.Exception.Message } | ConvertTo-Json -Depth 4) | Set-Content -Path (Join-Path $outDir $rel) -Encoding UTF8 }
                  $disp = if ($it.Name) { [string]$it.Name } elseif ($it.DisplayName) { [string]$it.DisplayName } else { $rawId }
                  $newPolicies.Add([ordered]@{ policyType=$t.pt; path=$rel; backupPolicyId=$rawId; displayName=$disp; description=$null; summary=$null; restorable=$true }) | Out-Null
                  $n++
                }
                Write-Host ('{0,-36} {1} captured' -f $t.n, $n)
              } catch {
                $sccWarnings.Add(($t.n + ' (' + $t.c + ') unavailable: ' + $_.Exception.Message)) | Out-Null
                Write-Host ('{0,-36} WARN: {1}' -f $t.n, $_.Exception.Message)
              }
              $newCounts[$t.pt] = $n
            }
          }

          Write-Host '== Purview (Security & Compliance) =='
          try {
            Connect-IPPSSession -AppId $appId -Certificate $cert -Organization $org -ShowBanner:$false
            Backup-CmdSet -Targets @(
              @{ n='DLP policies';                c='Get-DlpCompliancePolicy';                    d='purview/scc/dlp-policies';            pt='PurviewDlpCompliancePolicy' },
              @{ n='DLP rules';                   c='Get-DlpComplianceRule';                      d='purview/scc/dlp-rules';               pt='PurviewDlpComplianceRule' },
              @{ n='Retention policies';          c='Get-RetentionCompliancePolicy';              d='purview/scc/retention-policies';      pt='PurviewRetentionCompliancePolicy' },
              @{ n='Retention rules';             c='Get-RetentionComplianceRule';                d='purview/scc/retention-rules';         pt='PurviewRetentionComplianceRule' },
              @{ n='Retention labels';            c='Get-ComplianceTag';                          d='purview/scc/retention-labels';        pt='PurviewComplianceTag' },
              @{ n='Sensitivity labels';          c='Get-Label';                                  d='purview/scc/sensitivity-labels';      pt='PurviewSensitivityLabel' },
              @{ n='Label publish policies';      c='Get-LabelPolicy';                            d='purview/scc/label-policies';          pt='PurviewLabelPolicy' },
              @{ n='Auto-labeling policies';      c='Get-AutoSensitivityLabelPolicy';             d='purview/scc/auto-label-policies';     pt='PurviewAutoSensitivityLabelPolicy' },
              @{ n='Auto-labeling rules';         c='Get-AutoSensitivityLabelRule';               d='purview/scc/auto-label-rules';        pt='PurviewAutoSensitivityLabelRule' },
              @{ n='Information Barrier policies'; c='Get-InformationBarrierPolicy';               d='purview/scc/ib-policies';             pt='PurviewInformationBarrierPolicy' },
              @{ n='Organization segments';       c='Get-OrganizationSegment';                    d='purview/scc/org-segments';            pt='PurviewOrganizationSegment' },
              @{ n='Custom sensitive info types'; c='Get-DlpSensitiveInformationType';            d='purview/scc/sits';                    pt='PurviewSensitiveInformationType' },
              @{ n='SIT rule packages';           c='Get-DlpSensitiveInformationTypeRulePackage'; d='purview/scc/sit-rulepackages';        pt='PurviewSITRulePackage' },
              @{ n='Adaptive scopes';             c='Get-AdaptiveScope';                          d='purview/scc/adaptive-scopes';         pt='PurviewAdaptiveScope' },
              @{ n='Endpoint DLP settings';       c='Get-PolicyConfig';                           d='purview/scc/endpoint-dlp-settings';   pt='PurviewEndpointDlpSettings' }
            )
            Disconnect-ExchangeOnline -Confirm:$false -ErrorAction SilentlyContinue
          } catch { $sccWarnings.Add('Purview connect failed: ' + $_.Exception.Message) | Out-Null; Write-Host ('Purview connect WARN: ' + $_.Exception.Message) }

          Write-Host '== Exchange Online =='
          try {
            Connect-ExchangeOnline -AppId $appId -Certificate $cert -Organization $org -ShowBanner:$false
            Backup-CmdSet -Targets @(
              @{ n='Transport (mail flow) rules'; c='Get-TransportRule';            d='exchange/transport-rules';        pt='ExchangeTransportRule' },
              @{ n='Transport config';            c='Get-TransportConfig';          d='exchange/transport-config';       pt='ExchangeTransportConfig' },
              @{ n='Inbound connectors';          c='Get-InboundConnector';         d='exchange/inbound-connectors';     pt='ExchangeInboundConnector' },
              @{ n='Outbound connectors';         c='Get-OutboundConnector';        d='exchange/outbound-connectors';    pt='ExchangeOutboundConnector' },
              @{ n='Accepted domains';            c='Get-AcceptedDomain';           d='exchange/accepted-domains';       pt='ExchangeAcceptedDomain' },
              @{ n='Remote domains';              c='Get-RemoteDomain';             d='exchange/remote-domains';         pt='ExchangeRemoteDomain' },
              @{ n='Organization config';         c='Get-OrganizationConfig';       d='exchange/organization-config';    pt='ExchangeOrganizationConfig' },
              @{ n='OWA mailbox policies';        c='Get-OwaMailboxPolicy';         d='exchange/owa-mailbox-policies';   pt='ExchangeOwaMailboxPolicy' },
              @{ n='Mobile device mailbox policies'; c='Get-MobileDeviceMailboxPolicy'; d='exchange/mobile-device-policies'; pt='ExchangeMobileDeviceMailboxPolicy' },
              @{ n='MRM retention policies';      c='Get-RetentionPolicy';          d='exchange/mrm-retention-policies'; pt='ExchangeRetentionPolicy' },
              @{ n='MRM retention tags';          c='Get-RetentionPolicyTag';       d='exchange/mrm-retention-tags';     pt='ExchangeRetentionPolicyTag' },
              @{ n='Sharing policies';            c='Get-SharingPolicy';            d='exchange/sharing-policies';       pt='ExchangeSharingPolicy' },
              @{ n='Organization relationships';  c='Get-OrganizationRelationship'; d='exchange/org-relationships';      pt='ExchangeOrganizationRelationship' },
              @{ n='Email address policies';      c='Get-EmailAddressPolicy';       d='exchange/email-address-policies'; pt='ExchangeEmailAddressPolicy' },
              @{ n='Address lists';               c='Get-AddressList';              d='exchange/address-lists';          pt='ExchangeAddressList' },
              @{ n='DKIM signing config';         c='Get-DkimSigningConfig';        d='exchange/dkim-signing';           pt='ExchangeDkimSigningConfig' },
              @{ n='RBAC role groups';            c='Get-RoleGroup';                d='exchange/role-groups';            pt='ExchangeRoleGroup' },
              @{ n='Management roles';            c='Get-ManagementRole';           d='exchange/management-roles';       pt='ExchangeManagementRole' },
              @{ n='Management role assignments'; c='Get-ManagementRoleAssignment'; d='exchange/role-assignments';       pt='ExchangeManagementRoleAssignment' },
              @{ n='Management scopes';           c='Get-ManagementScope';          d='exchange/management-scopes';      pt='ExchangeManagementScope' },
              @{ n='Authentication policies';     c='Get-AuthenticationPolicy';     d='exchange/auth-policies';          pt='ExchangeAuthenticationPolicy' },
              @{ n='Journal rules';               c='Get-JournalRule';              d='exchange/journal-rules';          pt='ExchangeJournalRule' }
            )
            Disconnect-ExchangeOnline -Confirm:$false -ErrorAction SilentlyContinue
          } catch { $sccWarnings.Add('Exchange connect failed: ' + $_.Exception.Message) | Out-Null; Write-Host ('Exchange connect WARN: ' + $_.Exception.Message) }

          # Merge the non-Graph objects into the shared snapshot manifest so the
          # app shows ONE backup with Graph + Purview + Exchange.
          $manifestPath = Join-Path $outDir 'manifest.json'
          if (Test-Path $manifestPath) {
            $m = Get-Content $manifestPath -Raw | ConvertFrom-Json
            $merged = New-Object System.Collections.Generic.List[object]
            foreach ($p in @($m.policies)) { $merged.Add($p) | Out-Null }
            foreach ($p in $newPolicies) { $merged.Add($p) | Out-Null }
            $m.policies = $merged.ToArray()
            foreach ($k in $newCounts.Keys) { $m.counts | Add-Member -NotePropertyName $k -NotePropertyValue $newCounts[$k] -Force }
            $m | Add-Member -NotePropertyName 'connectors' -NotePropertyValue @('graph','purview-scc','exchange-online') -Force
            $m | ConvertTo-Json -Depth 30 | Set-Content -Path $manifestPath -Encoding UTF8
          }
          Add-SnapshotWarnings -Messages @($sccWarnings.ToArray())
          Write-Host ('== Non-Graph snapshot merged: {0} Purview+Exchange objects, {1} warnings ==' -f $newPolicies.Count, $sccWarnings.Count)

      - name: Snapshot Teams + SharePoint (app-only)
        if: ${{ steps.snapshot.outputs.snapshot_dir != '' }}
        shell: pwsh
        env:
          SCC_CERT_PFX_B64: ${{ secrets.PURVIEW_CONNECTOR_PFX_B64 }}
          SCC_CERT_PWD: ${{ secrets.PURVIEW_CONNECTOR_PFX_PWD }}
          SNAPSHOT_DIR: ${{ steps.snapshot.outputs.snapshot_dir }}
          TENANT_GUID: ${{ env.AZURE_TENANT_ID }}
        run: |
          $ErrorActionPreference = 'Stop'
          function Add-SnapshotWarnings {
            param([array]$Messages)
            if (-not $Messages -or -not $Messages.Count) { return }
            $warningsPath = Join-Path $env:SNAPSHOT_DIR 'warnings.json'
            $warnings = @()
            if (Test-Path $warningsPath) {
              try { $warnings = @(Get-Content $warningsPath -Raw | ConvertFrom-Json) } catch { $warnings = @() }
            }
            foreach ($msg in @($Messages)) {
              if ($msg) { $warnings += [string]$msg }
            }
            $warnings | ConvertTo-Json -Depth 8 | Set-Content -Path $warningsPath -Encoding UTF8
            $manifestPath = Join-Path $env:SNAPSHOT_DIR 'manifest.json'
            if (Test-Path $manifestPath) {
              try {
                $m = Get-Content $manifestPath -Raw | ConvertFrom-Json
                $m.warningCount = @($warnings).Count
                $m | ConvertTo-Json -Depth 30 | Set-Content -Path $manifestPath -Encoding UTF8
              } catch {}
            }
          }
          $appId = ''; $org = ''
          if (Test-Path 'scripts/purview-connector.json') {
            $cfg = Get-Content 'scripts/purview-connector.json' -Raw | ConvertFrom-Json
            $appId = [string]$cfg.appId; $org = [string]$cfg.org
          }
          if (-not $env:SCC_CERT_PFX_B64 -or -not $appId -or -not $org) {
            Add-SnapshotWarnings -Messages @('Teams/SharePoint connector not onboarded for this tenant; Teams PowerShell and SharePoint PnP objects were not captured.')
            Write-Host 'Teams/SharePoint connector not onboarded - skipping.'; exit 0
          }
          $ProgressPreference = 'SilentlyContinue'
          $bytes = [Convert]::FromBase64String($env:SCC_CERT_PFX_B64)
          $cert = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new($bytes, $env:SCC_CERT_PWD)
          $outDir = $env:SNAPSHOT_DIR
          $newPolicies = New-Object System.Collections.Generic.List[object]
          $newCounts = [ordered]@{}
          $tsWarnings = New-Object System.Collections.Generic.List[string]

          function Get-SafeFileName {
            param([string]$Value)
            if (-not $Value) { return 'unknown' }
            $safe = ($Value -replace '[^a-zA-Z0-9._-]','_')
            if ($safe.Length -le 80) { return $safe }
            $sha = [System.Security.Cryptography.SHA256]::Create()
            $hashHex = -join ($sha.ComputeHash([Text.Encoding]::UTF8.GetBytes($Value)) | ForEach-Object { $_.ToString('x2') })
            return $safe.Substring(0, 64) + '-' + $hashHex.Substring(0, 10)
          }

          function Save-TsSet {
            param([array]$Targets)
            foreach ($t in $Targets) {
              $dir = Join-Path $outDir ('policies/' + $t.d)
              New-Item -ItemType Directory -Force -Path $dir | Out-Null
              $n = 0
              try {
                $items = & $t.c -ErrorAction Stop
                foreach ($it in @($items)) {
                  if ($null -eq $it) { continue }
                  $rawId = if ($it.Identity) { [string]$it.Identity } elseif ($it.Url) { [string]$it.Url } elseif ($it.Id) { [string]$it.Id } elseif ($it.Name) { [string]$it.Name } else { $t.pt }
                  if (-not $rawId) { $rawId = $t.pt }
                  $safe = Get-SafeFileName $rawId
                  $rel = 'policies/' + $t.d + '/' + $safe + '.json'
                  try { ($it | ConvertTo-Json -Depth 20) | Set-Content -Path (Join-Path $outDir $rel) -Encoding UTF8 }
                  catch { ([pscustomobject]@{ id=$rawId; _serializationError=$_.Exception.Message } | ConvertTo-Json -Depth 4) | Set-Content -Path (Join-Path $outDir $rel) -Encoding UTF8 }
                  $disp = if ($it.DisplayName) { [string]$it.DisplayName } elseif ($it.Title) { [string]$it.Title } elseif ($it.Identity) { [string]$it.Identity } else { $rawId }
                  $newPolicies.Add([ordered]@{ policyType=$t.pt; path=$rel; backupPolicyId=$rawId; displayName=$disp; description=$null; summary=$null; restorable=$t.r }) | Out-Null
                  $n++
                }
                Write-Host ('{0,-40} {1} captured' -f $t.n, $n)
              } catch {
                $tsWarnings.Add(($t.n + ': ' + $_.Exception.Message)) | Out-Null
                Write-Host ('{0,-40} WARN: {1}' -f $t.n, $_.Exception.Message)
              }
              $newCounts[$t.pt] = $n
            }
          }

          Write-Host '== Microsoft Teams =='
          try {
            Install-Module MicrosoftTeams -RequiredVersion 6.5.0 -Scope CurrentUser -Force -AllowClobber
            Import-Module MicrosoftTeams
            Connect-MicrosoftTeams -ApplicationId $appId -Certificate $cert -TenantId $env:TENANT_GUID | Out-Null
            Save-TsSet -Targets @(
              @{ n='Teams meeting policies';       c='Get-CsTeamsMeetingPolicy';            d='teams/meeting-policies';        pt='TeamsMeetingPolicy';            r=$true },
              @{ n='Teams messaging policies';     c='Get-CsTeamsMessagingPolicy';          d='teams/messaging-policies';      pt='TeamsMessagingPolicy';          r=$true },
              @{ n='Teams app permission policies'; c='Get-CsTeamsAppPermissionPolicy';     d='teams/app-permission-policies'; pt='TeamsAppPermissionPolicy';       r=$true },
              @{ n='Teams app setup policies';     c='Get-CsTeamsAppSetupPolicy';           d='teams/app-setup-policies';      pt='TeamsAppSetupPolicy';           r=$true },
              @{ n='Teams calling policies';       c='Get-CsTeamsCallingPolicy';            d='teams/calling-policies';        pt='TeamsCallingPolicy';            r=$true },
              @{ n='Teams channels policies';      c='Get-CsTeamsChannelsPolicy';           d='teams/channels-policies';       pt='TeamsChannelsPolicy';           r=$true },
              @{ n='Teams live events policies';   c='Get-CsTeamsMeetingBroadcastPolicy';   d='teams/live-events-policies';    pt='TeamsMeetingBroadcastPolicy';   r=$true },
              @{ n='Teams update mgmt policies';   c='Get-CsTeamsUpdateManagementPolicy';   d='teams/update-mgmt-policies';    pt='TeamsUpdateManagementPolicy';   r=$true },
              @{ n='Teams external access policy'; c='Get-CsExternalAccessPolicy';          d='teams/external-access-policies'; pt='TeamsExternalAccessPolicy';     r=$true },
              @{ n='Teams federation config';      c='Get-CsTenantFederationConfiguration'; d='teams/federation-config';       pt='TeamsFederationConfiguration';  r=$true },
              @{ n='Teams client config';          c='Get-CsTeamsClientConfiguration';      d='teams/client-config';           pt='TeamsClientConfiguration';      r=$true },
              @{ n='Teams guest messaging config'; c='Get-CsTeamsGuestMessagingConfiguration'; d='teams/guest-messaging-config'; pt='TeamsGuestMessagingConfiguration'; r=$true }
            )
            Disconnect-MicrosoftTeams -ErrorAction SilentlyContinue
          } catch { $tsWarnings.Add('Teams connect failed: ' + $_.Exception.Message) | Out-Null; Write-Host ('Teams connect WARN: ' + $_.Exception.Message) }

          Write-Host '== SharePoint Online (PnP) =='
          try {
            Install-Module PnP.PowerShell -RequiredVersion 2.12.0 -Scope CurrentUser -Force -AllowClobber
            Import-Module PnP.PowerShell
            $spTenant = $org.Split('.')[0]
            $adminUrl = 'https://' + $spTenant + '-admin.sharepoint.com'
            $pwd = ConvertTo-SecureString $env:SCC_CERT_PWD -AsPlainText -Force
            Connect-PnPOnline -Url $adminUrl -ClientId $appId -Tenant $org -CertificateBase64Encoded $env:SCC_CERT_PFX_B64 -CertificatePassword $pwd | Out-Null
            Save-TsSet -Targets @(
              @{ n='SharePoint tenant settings';   c='Get-PnPTenant';            d='sharepoint/tenant-settings'; pt='SharePointTenantSettings'; r=$true },
              @{ n='SharePoint sites';             c='Get-PnPTenantSite';        d='sharepoint/sites';           pt='SharePointSite';           r=$true },
              @{ n='SharePoint home site';         c='Get-PnPHomeSite';          d='sharepoint/home-site';       pt='SharePointHomeSite';       r=$true },
              @{ n='SharePoint org assets';        c='Get-PnPOrgAssetsLibrary';  d='sharepoint/org-assets';      pt='SharePointOrgAssets';      r=$true }
            )
            Disconnect-PnPOnline -ErrorAction SilentlyContinue
          } catch { $tsWarnings.Add('SharePoint connect failed: ' + $_.Exception.Message) | Out-Null; Write-Host ('SharePoint connect WARN: ' + $_.Exception.Message) }

          # Merge into the shared snapshot manifest.
          $manifestPath = Join-Path $outDir 'manifest.json'
          if (Test-Path $manifestPath) {
            $m = Get-Content $manifestPath -Raw | ConvertFrom-Json
            $merged = New-Object System.Collections.Generic.List[object]
            foreach ($p in @($m.policies)) { $merged.Add($p) | Out-Null }
            foreach ($p in $newPolicies) { $merged.Add($p) | Out-Null }
            $m.policies = $merged.ToArray()
            foreach ($k in $newCounts.Keys) { $m.counts | Add-Member -NotePropertyName $k -NotePropertyValue $newCounts[$k] -Force }
            if ($m.PSObject.Properties['connectors']) { $m.connectors = @($m.connectors + @('teams','sharepoint-pnp')) } else { $m | Add-Member -NotePropertyName 'connectors' -NotePropertyValue @('teams','sharepoint-pnp') -Force }
            $m | ConvertTo-Json -Depth 30 | Set-Content -Path $manifestPath -Encoding UTF8
          }
          Add-SnapshotWarnings -Messages @($tsWarnings.ToArray())
          Write-Host ('== Teams + SharePoint snapshot merged: {0} objects, {1} warnings ==' -f $newPolicies.Count, $tsWarnings.Count)

      - name: Snapshot Power Platform (app-only BAP API)
        if: ${{ steps.snapshot.outputs.snapshot_dir != '' }}
        shell: pwsh
        env:
          SCC_CERT_PFX_B64: ${{ secrets.PURVIEW_CONNECTOR_PFX_B64 }}
          SCC_CERT_PWD: ${{ secrets.PURVIEW_CONNECTOR_PFX_PWD }}
          SNAPSHOT_DIR: ${{ steps.snapshot.outputs.snapshot_dir }}
          TENANT_GUID: ${{ env.AZURE_TENANT_ID }}
        run: |
          $ErrorActionPreference = 'Stop'
          function Add-SnapshotWarnings {
            param([array]$Messages)
            if (-not $Messages -or -not $Messages.Count) { return }
            $warningsPath = Join-Path $env:SNAPSHOT_DIR 'warnings.json'
            $warnings = @()
            if (Test-Path $warningsPath) {
              try { $warnings = @(Get-Content $warningsPath -Raw | ConvertFrom-Json) } catch { $warnings = @() }
            }
            foreach ($msg in @($Messages)) {
              if ($msg) { $warnings += [string]$msg }
            }
            $warnings | ConvertTo-Json -Depth 8 | Set-Content -Path $warningsPath -Encoding UTF8
            $manifestPath = Join-Path $env:SNAPSHOT_DIR 'manifest.json'
            if (Test-Path $manifestPath) {
              try {
                $m = Get-Content $manifestPath -Raw | ConvertFrom-Json
                $m.warningCount = @($warnings).Count
                $m | ConvertTo-Json -Depth 30 | Set-Content -Path $manifestPath -Encoding UTF8
              } catch {}
            }
          }
          $appId = ''
          if (Test-Path 'scripts/purview-connector.json') { $appId = [string](Get-Content 'scripts/purview-connector.json' -Raw | ConvertFrom-Json).appId }
          if (-not $env:SCC_CERT_PFX_B64 -or -not $appId -or -not $env:TENANT_GUID) {
            Add-SnapshotWarnings -Messages @('Power Platform connector not onboarded for this tenant; Power Platform environment and DLP objects were not captured.')
            Write-Host 'Power Platform connector not onboarded - skipping.'
            exit 0
          }
          $bytes = [Convert]::FromBase64String($env:SCC_CERT_PFX_B64)
          $flags = [System.Security.Cryptography.X509Certificates.X509KeyStorageFlags]::EphemeralKeySet
          $cert = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new($bytes, $env:SCC_CERT_PWD, $flags)
          $rsa = [System.Security.Cryptography.X509Certificates.RSACertificateExtensions]::GetRSAPrivateKey($cert)
          function B64Url($b) { ([Convert]::ToBase64String($b) -replace '\+','-' -replace '/','_').TrimEnd('=') }
          $tokenEp = "https://login.microsoftonline.com/$($env:TENANT_GUID)/oauth2/v2.0/token"
          $now = [DateTimeOffset]::UtcNow.ToUnixTimeSeconds()
          $x5t = B64Url($cert.GetCertHash())
          $hdr = @{ alg='RS256'; typ='JWT'; x5t=$x5t } | ConvertTo-Json -Compress
          $pl = @{ aud=$tokenEp; iss=$appId; sub=$appId; jti=[guid]::NewGuid().ToString(); nbf=$now; exp=$now+600 } | ConvertTo-Json -Compress
          $u = (B64Url([Text.Encoding]::UTF8.GetBytes($hdr))) + '.' + (B64Url([Text.Encoding]::UTF8.GetBytes($pl)))
          $sig = $rsa.SignData([Text.Encoding]::UTF8.GetBytes($u), [Security.Cryptography.HashAlgorithmName]::SHA256, [Security.Cryptography.RSASignaturePadding]::Pkcs1)
          $assertion = "$u." + (B64Url $sig)
          $outDir = $env:SNAPSHOT_DIR
          $newPolicies = New-Object System.Collections.Generic.List[object]
          $newCounts = [ordered]@{}
          $ppWarnings = New-Object System.Collections.Generic.List[string]
          function Get-SafeFileName {
            param([string]$Value)
            if (-not $Value) { return 'unknown' }
            $safe = ($Value -replace '[^a-zA-Z0-9._-]','_')
            if ($safe.Length -le 80) { return $safe }
            $sha = [System.Security.Cryptography.SHA256]::Create()
            $hashHex = -join ($sha.ComputeHash([Text.Encoding]::UTF8.GetBytes($Value)) | ForEach-Object { $_.ToString('x2') })
            return $safe.Substring(0, 64) + '-' + $hashHex.Substring(0, 10)
          }
          try {
            $body = @{ client_id=$appId; client_assertion_type='urn:ietf:params:oauth:client-assertion-type:jwt-bearer'; client_assertion=$assertion; scope='https://api.bap.microsoft.com/.default'; grant_type='client_credentials' }
            $tok = (Invoke-RestMethod -Method POST -Uri $tokenEp -Body $body -ContentType 'application/x-www-form-urlencoded').access_token
            $h = @{ Authorization = "Bearer $tok" }
            $targets = @(
              @{ n='Power Platform environments'; u='https://api.bap.microsoft.com/providers/Microsoft.BusinessAppPlatform/scopes/admin/environments?api-version=2021-04-01'; d='powerplatform/environments'; pt='PowerPlatformEnvironment'; idp='name' },
              @{ n='Power Platform DLP policies';  u='https://api.bap.microsoft.com/providers/PowerPlatform.Governance/v2/policies?api-version=2021-04-01'; d='powerplatform/dlp-policies'; pt='PowerPlatformDlpPolicy'; idp='id' }
            )
            foreach ($t in $targets) {
              $dir = Join-Path $outDir ('policies/' + $t.d); New-Item -ItemType Directory -Force -Path $dir | Out-Null
              $n = 0
              try {
                $resp = Invoke-RestMethod -Uri $t.u -Headers $h
                $items = if ($resp.value) { $resp.value } else { @($resp) }
                foreach ($it in @($items)) {
                  if ($null -eq $it) { continue }
                  $rawId = if ($it.($t.idp)) { [string]$it.($t.idp) } elseif ($it.name) { [string]$it.name } else { [string]$it.id }
                  if (-not $rawId) { continue }
                  $safe = Get-SafeFileName $rawId
                  $rel = 'policies/' + $t.d + '/' + $safe + '.json'
                  ($it | ConvertTo-Json -Depth 20) | Set-Content -Path (Join-Path $outDir $rel) -Encoding UTF8
                  $disp = if ($it.properties.displayName) { [string]$it.properties.displayName } elseif ($it.displayName) { [string]$it.displayName } else { $rawId }
                  $newPolicies.Add([ordered]@{ policyType=$t.pt; path=$rel; backupPolicyId=$rawId; displayName=$disp; description=$null; summary=$null; restorable=$true }) | Out-Null
                  $n++
                }
                Write-Host ('{0,-34} {1} captured' -f $t.n, $n)
              } catch { $ppWarnings.Add($t.n + ': ' + $_.Exception.Message) | Out-Null; Write-Host ('{0,-34} WARN: {1}' -f $t.n, $_.Exception.Message) }
              $newCounts[$t.pt] = $n
            }
          } catch { $ppWarnings.Add('Power Platform token failed: ' + $_.Exception.Message) | Out-Null; Write-Host ('Power Platform WARN: ' + $_.Exception.Message) }

          $manifestPath = Join-Path $outDir 'manifest.json'
          if (Test-Path $manifestPath) {
            $m = Get-Content $manifestPath -Raw | ConvertFrom-Json
            $merged = New-Object System.Collections.Generic.List[object]
            foreach ($p in @($m.policies)) { $merged.Add($p) | Out-Null }
            foreach ($p in $newPolicies) { $merged.Add($p) | Out-Null }
            $m.policies = $merged.ToArray()
            foreach ($k in $newCounts.Keys) { $m.counts | Add-Member -NotePropertyName $k -NotePropertyValue $newCounts[$k] -Force }
            if ($m.PSObject.Properties['connectors']) { $m.connectors = @($m.connectors + @('power-platform')) } else { $m | Add-Member -NotePropertyName 'connectors' -NotePropertyValue @('power-platform') -Force }
            $m | ConvertTo-Json -Depth 30 | Set-Content -Path $manifestPath -Encoding UTF8
          }
          Add-SnapshotWarnings -Messages @($ppWarnings.ToArray())
          Write-Host ('== Power Platform snapshot merged: {0} objects, {1} warnings ==' -f $newPolicies.Count, $ppWarnings.Count)

      - name: Upload backup artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tenant-policy-backup-${{ github.run_id }}
          path: ${{ steps.snapshot.outputs.snapshot_dir }}
          if-no-files-found: warn

      - name: Commit backup snapshot
        if: ${{ steps.snapshot.outputs.commit_snapshot == 'True' || steps.snapshot.outputs.commit_snapshot == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          branch="${GITHUB_REF_NAME:-main}"
          snapshot_dir="${{ steps.snapshot.outputs.snapshot_dir }}"
          latest_path="${{ steps.snapshot.outputs.latest_path }}"
          latest_tmp="$(mktemp)"
          cp "$latest_path" "$latest_tmp"

          for attempt in 1 2 3; do
            git fetch origin "$branch"
            git reset --hard "origin/$branch"
            mkdir -p "$(dirname "$latest_path")"
            cp "$latest_tmp" "$latest_path"
            git add "$snapshot_dir" "$latest_path"
            if git diff --cached --quiet; then
              echo "No tenant policy backup changes to commit."
              exit 0
            fi
            git commit -m "chore(backup): tenant policy snapshot ${{ steps.snapshot.outputs.backup_id }}"
            if git push origin "HEAD:$branch"; then
              exit 0
            fi
            echo "Push failed on attempt $attempt; refreshing from origin and retrying."
            sleep $((attempt * 2))
          done
          echo "Failed to push tenant policy backup snapshot after 3 attempts." >&2
          exit 1