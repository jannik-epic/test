    "label": "Company Portal branding profiles",
    "group": "intune-management",
    "graphBase": "beta",
    "readPath": "deviceManagement/intuneBrandingProfiles",
    "supportsExpandAssignments": true,
    "singleton": false,
    "subdir": "intune/branding-profiles"
  },
  {
    "key": "cloud-pc-provisioning-policies",
    "policyType": "CloudPcProvisioningPolicy",
    "label": "Cloud PC provisioning policies",
    "group": "cloud-pc",
    "graphBase": "beta",
    "readPath": "deviceManagement/virtualEndpoint/provisioningPolicies",
    "supportsExpandAssignments": true,
    "singleton": false,
    "subdir": "intune/cloud-pc/provisioning-policies"
  },
  {
    "key": "cloud-pc-on-premises-connections",
    "policyType": "CloudPcOnPremisesConnection",
    "label": "Cloud PC on-premises connections",
    "group": "cloud-pc",
    "graphBase": "beta",
    "readPath": "deviceManagement/virtualEndpoint/onPremisesConnections",
    "supportsExpandAssignments": false,
    "singleton": false,
    "subdir": "intune/cloud-pc/on-premises-connections"
  },
  {
