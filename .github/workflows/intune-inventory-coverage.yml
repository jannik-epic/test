# vanguard-template-version: 2026-07-20.10
name: Check Intune inventory coverage

on:
  schedule:
    - cron: '15 4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  AZURE_TENANT_ID: 'f849cde7-f11d-4ef5-a31d-7fca98b21bf5'
  AZURE_CLIENT_ID: 'a34f2806-b6f7-4d11-98f6-b32894396ca8'

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve target Azure tenant from Vanguard context
        shell: bash
        env:
          MODERN_DEVMGMT_CONTEXT_B64: ${{ github.event.inputs.modern_dev_mgmt_context_b64 }}
        run: |
          # The desktop app's catalog deploy passes targetAzureTenantId +
          # targetAzureClientId inside the b64-encoded context blob. When two
          # tenants share the same GitHub repo this is the only mechanism that
          # routes OIDC to the right Azure tenant per dispatch — the YAML env
          # defaults are baked at provisioning time and can only point at one
          # tenant.
          if [[ -z "${MODERN_DEVMGMT_CONTEXT_B64:-}" ]]; then
            echo "no Vanguard context — keeping default AZURE_TENANT_ID/CLIENT_ID"
            exit 0
          fi
          decoded="$(printf '%s' "$MODERN_DEVMGMT_CONTEXT_B64" | base64 --decode 2>/dev/null || true)"
          if [[ -z "$decoded" ]]; then
            echo "::warning::could not base64-decode modern_dev_mgmt_context_b64; using YAML defaults"
            exit 0
          fi
          tenant="$(printf '%s' "$decoded" | jq -r '.targetAzureTenantId // ""' 2>/dev/null || true)"
          client="$(printf '%s' "$decoded" | jq -r '.targetAzureClientId // ""' 2>/dev/null || true)"
          if [[ -n "$tenant" ]]; then
            # Mask the tenant id for the rest of the job so it never appears in
            # the clear in workflow logs (trust-by-design; logs may be exported).
            echo "::add-mask::$tenant"
            echo "AZURE_TENANT_ID=$tenant" >> "$GITHUB_ENV"
            echo "INTUNE_TENANT_ID=$tenant" >> "$GITHUB_ENV"
            echo "resolved AZURE_TENANT_ID=$tenant"
          fi
          if [[ -n "$client" ]]; then
            echo "AZURE_CLIENT_ID=$client" >> "$GITHUB_ENV"
            echo "INTUNE_CLIENT_ID=$client" >> "$GITHUB_ENV"
            echo "resolved AZURE_CLIENT_ID=$client"
          fi

      - name: Azure Login using OIDC
        uses: azure/login@v3
        with:
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          client-id: ${{ env.AZURE_CLIENT_ID }}
          allow-no-subscriptions: true

      - name: Acquire Microsoft Graph token
        id: graph_token
        shell: bash
        run: |
          set -euo pipefail
          token=$(az account get-access-token --resource https://graph.microsoft.com/ --query accessToken -o tsv)
          echo "::add-mask::$token"
          echo "GRAPH_TOKEN=$token" >> "$GITHUB_ENV"

      - name: Validate Microsoft Graph application permissions
        shell: bash
        run: |
          set -euo pipefail
          node - <<'NODE'
          const token = process.env.GRAPH_TOKEN || '';
          const required = [
            'DeviceManagementManagedDevices.Read.All',
            'DeviceManagementApps.ReadWrite.All',
          ];
          function decodeJwtPayload(jwt) {
            const payload = jwt.split('.')[1];
            if (!payload) throw new Error('Microsoft Graph token is not a JWT access token.');
            return JSON.parse(Buffer.from(payload.replace(/-/g, '+').replace(/_/g, '/'), 'base64').toString('utf8'));
          }
          const claims = decodeJwtPayload(token);
          const roles = new Set(Array.isArray(claims.roles) ? claims.roles : []);
          const missing = required.filter((role) => !roles.has(role));
          if (missing.length) {
            console.error('Missing Microsoft Graph application roles on the GitHub deployment app:');
            for (const role of missing) console.error('- ' + role);
            console.error('Open Vanguard > Setup CI/CD > Permissions Validation, prepare permissions, then grant tenant-wide admin consent.');
            process.exit(1);
          }
          console.log('Graph application roles validated: ' + required.join(', '));
          NODE

      - name: Build unmanaged-app coverage report
        shell: bash
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require('fs');
          const graph = 'https://graph.microsoft.com/v1.0';
          const token = process.env.GRAPH_TOKEN;
          const systemApp = /^(android($|\.)|com\.android\.|com\.google\.android\.|android\.overlay\.|android\.auto_generated|com\.samsung\.android\.|com\.huawei\.|com\.xiaomi\.|com\.oppo\.|com\.vivo\.|com\.oneplus\.|com\.qualcomm\.|com\.mediatek\.)/i;
          function norm(v) {
            return String(v || '')
              .replace(/([a-z])([A-Z])/g, '$1 $2')
              .toLowerCase()
              .replace(/[._/\\-]+/g, ' ')
              .replace(/\b(v?\d{1,4}(?:\.\d+){1,5})\b/g, ' ')
              .replace(/\s+/g, ' ')
              .trim();
          }
          function tokens(v) {
            return new Set(norm(v).split(' ').filter(t => t.length > 1 && !/^\d+$/.test(t)));
          }
          function score(a, b) {
            const an = norm(a.displayName);
            const bn = norm(b.displayName);
            if (!an || !bn) return 0;
            if (an === bn) return 1;
            const at = tokens(a.displayName);
            const bt = tokens(b.displayName);
            let common = 0;
            for (const t of at) if (bt.has(t)) common++;
            const overlap = common / Math.max(at.size || 1, bt.size || 1);
            const pub = a.publisher && b.publisher && norm(a.publisher) === norm(b.publisher) ? 0.2 : 0;
            if (an.includes(bn) || bn.includes(an)) return 0.9 + pub;
            return overlap >= 0.72 ? overlap + pub : 0;
          }
          async function all(url) {
            const rows = [];
            while (url) {
              const res = await fetch(url, { headers: { authorization: `Bearer ${token}` } });
              if (!res.ok) throw new Error(`${res.status} ${res.statusText}: ${await res.text()}`);
              const data = await res.json();
              rows.push(...(data.value || []));
              url = data['@odata.nextLink'];
            }
            return rows;
          }
          (async () => {
            const detectedRaw = await all(`${graph}/deviceManagement/detectedApps?$top=200&$select=id,displayName,version,publisher,platform,deviceCount`);
            const managed = await all(`${graph}/deviceAppManagement/mobileApps?$top=200&$select=id,displayName,publisher`);
            const detected = detectedRaw.filter(app => app.displayName && !systemApp.test(app.displayName) && !systemApp.test(app.publisher || '') && !/android|ios/i.test(app.platform || ''));
            const unmanaged = [];
            const managedRows = [];
            for (const app of detected) {
              const best = managed.map(m => ({ app: m, score: score(app, m) })).sort((a,b) => b.score - a.score)[0];
              if (best && best.score >= 0.86) {
                managedRows.push({ ...app, managedIntuneAppId: best.app.id, managedDisplayName: best.app.displayName, confidence: best.score });
              } else {
                unmanaged.push(app);
              }
            }
            const report = {
              generatedAt: new Date().toISOString(),
              detectedInScope: detected.length,
              managedCovered: managedRows.length,
              unmanaged: unmanaged.map(app => ({
                id: app.id,
                displayName: app.displayName,
                publisher: app.publisher || null,
                version: app.version || null,
                platform: app.platform || null,
                deviceCount: app.deviceCount || 0,
              })),
              managed: managedRows,
            };
            fs.writeFileSync('intune-inventory-coverage.json', JSON.stringify(report, null, 2));
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `# Intune inventory coverage\n\nDetected in scope: ${report.detectedInScope}\n\nManaged: ${report.managedCovered}\n\nUnmanaged: ${report.unmanaged.length}\n`);
            if (report.unmanaged.length > 0) {
              console.log('Unmanaged discovered apps:');
              for (const app of report.unmanaged.slice(0, 50)) console.log(`- ${app.displayName} (${app.publisher || 'unknown'}) on ${app.deviceCount || 0} devices`);
            }
          })().catch(err => { console.error(err); process.exit(1); });
          NODE

      - name: Commit report
        shell: bash
        run: |
          set -euo pipefail
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          git add intune-inventory-coverage.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "chore: refresh Intune inventory coverage"
            git pull --rebase origin "${GITHUB_REF_NAME:-main}"
            git push
          fi
