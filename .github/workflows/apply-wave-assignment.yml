name: Apply Modern Dev Mgmt Wave Assignment

on:
  workflow_dispatch:
    inputs:
      intune_app_id:
        description: 'Existing Intune mobile app id'
        required: true
        type: string
      assignment_json:
        description: 'JSON mobileAppAssignments payload generated by Modern Dev Mgmt'
        required: true
        type: string
      assignment_summary:
        description: 'Human-readable assignment plan summary'
        required: false
        type: string
      patch_run_id:
        description: 'Modern Dev Mgmt patch run id'
        required: false
        type: string
      wave_run_id:
        description: 'Modern Dev Mgmt wave run id'
        required: false
        type: string
      wave_id:
        description: 'Modern Dev Mgmt wave id'
        required: false
        type: string
      wave_name:
        description: 'Modern Dev Mgmt wave name'
        required: false
        type: string
      modern_dev_mgmt_context_b64:
        description: 'Base64 encoded Modern Dev Mgmt wave context'
        required: false
        type: string

env:
  AZURE_TENANT_ID: 'f849cde7-f11d-4ef5-a31d-7fca98b21bf5'
  AZURE_CLIENT_ID: '7659f226-8344-4731-b758-a4d93238309c'
  INTUNE_API_URL: 'https://graph.microsoft.com/v1.0'

permissions:
  id-token: write
  contents: write

jobs:
  apply-wave-assignment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Azure Login using OIDC
        uses: azure/login@v3
        with:
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          client-id: ${{ env.AZURE_CLIENT_ID }}
          allow-no-subscriptions: true

      - name: Get Azure Access Token
        id: get_token
        shell: pwsh
        run: |
          $token = (az account get-access-token --resource https://graph.microsoft.com --query accessToken -o tsv)
          if (-not $token) {
            Write-Error "Failed to acquire Microsoft Graph access token"
            exit 1
          }
          echo "::add-mask::$token"
          echo "access_token=$token" >> $env:GITHUB_OUTPUT

      - name: Apply wave assignment
        shell: pwsh
        env:
          ASSIGNMENT_JSON: ${{ github.event.inputs.assignment_json }}
        run: |
          ./scripts/common/Assign-IntuneMobileApp.ps1 -AccessToken "${{ steps.get_token.outputs.access_token }}" -AppId "${{ github.event.inputs.intune_app_id }}" -AssignmentJson $env:ASSIGNMENT_JSON -IntuneApiUrl "$env:INTUNE_API_URL"

      - name: Persist Modern Dev Mgmt wave result
        if: always()
        shell: pwsh
        env:
          MODERN_DEVMGMT_CONTEXT_B64: ${{ github.event.inputs.modern_dev_mgmt_context_b64 }}
          ASSIGNMENT_SUMMARY: ${{ github.event.inputs.assignment_summary }}
          JOB_STATUS: ${{ job.status }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          git pull --rebase

          $context = $null
          if ($env:MODERN_DEVMGMT_CONTEXT_B64) {
            try {
              $contextJson = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($env:MODERN_DEVMGMT_CONTEXT_B64))
              $context = $contextJson | ConvertFrom-Json
            } catch {
              Write-Warning "Could not decode Modern Dev Mgmt context: $($_.Exception.Message)"
            }
          }

          $summary = $null
          if ($env:ASSIGNMENT_SUMMARY) {
            try { $summary = $env:ASSIGNMENT_SUMMARY | ConvertFrom-Json } catch { $summary = $env:ASSIGNMENT_SUMMARY }
          }

          $result = [ordered]@{
            workflowRunId = "${{ github.run_id }}"
            workflow = "apply-wave-assignment.yml"
            patchRunId = "${{ github.event.inputs.patch_run_id }}"
            waveRunId = "${{ github.event.inputs.wave_run_id }}"
            waveId = "${{ github.event.inputs.wave_id }}"
            waveName = "${{ github.event.inputs.wave_name }}"
            intuneAppId = "${{ github.event.inputs.intune_app_id }}"
            status = $env:JOB_STATUS
            assignmentSummary = $summary
            context = $context
            createdAt = (Get-Date).ToUniversalTime().ToString("o")
          }

          $runDir = ".modern-dev-mgmt/runs"
          $waveDir = ".modern-dev-mgmt/waves"
          New-Item -ItemType Directory -Force -Path $runDir, $waveDir | Out-Null
          $result | ConvertTo-Json -Depth 8 | Set-Content -Path "$runDir/${{ github.run_id }}.json" -Encoding UTF8
          $waveKey = if ("${{ github.event.inputs.wave_run_id }}") { "${{ github.event.inputs.wave_run_id }}" } else { "${{ github.run_id }}" }
          $result | ConvertTo-Json -Depth 8 | Set-Content -Path "$waveDir/$waveKey.json" -Encoding UTF8
          if ("${{ github.event.inputs.patch_run_id }}") {
            $patchDir = ".modern-dev-mgmt/patch-runs"
            New-Item -ItemType Directory -Force -Path $patchDir | Out-Null
            $result | ConvertTo-Json -Depth 8 | Set-Content -Path "$patchDir/${{ github.event.inputs.patch_run_id }}-wave-$waveKey.json" -Encoding UTF8
            git add "$patchDir/${{ github.event.inputs.patch_run_id }}-wave-$waveKey.json"
          }
          git add "$runDir/${{ github.run_id }}.json" "$waveDir/$waveKey.json"
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "chore: record Modern Dev Mgmt wave ${{ github.run_id }}"
            git push
          } else {
            Write-Host "no changes"
          }
