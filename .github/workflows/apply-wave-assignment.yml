name: Apply Vanguard Wave Assignment

on:
  workflow_dispatch:
    inputs:
      intune_app_id:
        description: 'Existing Intune mobile app id'
        required: true
        type: string
      assignment_json:
        description: 'JSON mobileAppAssignments payload generated by Vanguard'
        required: true
        type: string
      dry_run:
        description: 'Validate OIDC, Graph token, assignment payload, and persistence without writing Intune assignments'
        required: false
        type: boolean
        default: false
      assignment_summary:
        description: 'Human-readable assignment plan summary'
        required: false
        type: string
      patch_run_id:
        description: 'Vanguard patch run id'
        required: false
        type: string
      wave_run_id:
        description: 'Vanguard wave run id'
        required: false
        type: string
      wave_id:
        description: 'Vanguard wave id'
        required: false
        type: string
      wave_name:
        description: 'Vanguard wave name'
        required: false
        type: string
      modern_dev_mgmt_context_b64:
        description: 'Base64 encoded Vanguard wave context'
        required: false
        type: string

env:
  AZURE_TENANT_ID: 'f849cde7-f11d-4ef5-a31d-7fca98b21bf5'
  AZURE_CLIENT_ID: 'a34f2806-b6f7-4d11-98f6-b32894396ca8'
  INTUNE_API_URL: 'https://graph.microsoft.com/v1.0'

permissions:
  id-token: write
  contents: write

jobs:
  apply-wave-assignment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve target Azure tenant from Vanguard context
        shell: bash
        env:
          MODERN_DEVMGMT_CONTEXT_B64: ${{ github.event.inputs.modern_dev_mgmt_context_b64 }}
        run: |
          # The desktop app's catalog deploy passes targetAzureTenantId +
          # targetAzureClientId inside the b64-encoded context blob. When two
          # tenants share the same GitHub repo this is the only mechanism that
          # routes OIDC to the right Azure tenant per dispatch — the YAML env
          # defaults are baked at provisioning time and can only point at one
          # tenant.
          if [[ -z "${MODERN_DEVMGMT_CONTEXT_B64:-}" ]]; then
            echo "no Vanguard context — keeping default AZURE_TENANT_ID/CLIENT_ID"
            exit 0
          fi
          decoded="$(printf '%s' "$MODERN_DEVMGMT_CONTEXT_B64" | base64 --decode 2>/dev/null || true)"
          if [[ -z "$decoded" ]]; then
            echo "::warning::could not base64-decode modern_dev_mgmt_context_b64; using YAML defaults"
            exit 0
          fi
          tenant="$(printf '%s' "$decoded" | jq -r '.targetAzureTenantId // ""' 2>/dev/null || true)"
          client="$(printf '%s' "$decoded" | jq -r '.targetAzureClientId // ""' 2>/dev/null || true)"
          if [[ -n "$tenant" ]]; then
            # Mask the tenant id for the rest of the job so it never appears in
            # the clear in workflow logs (trust-by-design; logs may be exported).
            echo "::add-mask::$tenant"
            echo "AZURE_TENANT_ID=$tenant" >> "$GITHUB_ENV"
            echo "INTUNE_TENANT_ID=$tenant" >> "$GITHUB_ENV"
            echo "resolved AZURE_TENANT_ID=$tenant"
          fi
          if [[ -n "$client" ]]; then
            echo "AZURE_CLIENT_ID=$client" >> "$GITHUB_ENV"
            echo "INTUNE_CLIENT_ID=$client" >> "$GITHUB_ENV"
            echo "resolved AZURE_CLIENT_ID=$client"
          fi

      - name: Azure Login using OIDC
        uses: azure/login@v3
        with:
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          client-id: ${{ env.AZURE_CLIENT_ID }}
          allow-no-subscriptions: true

      - name: Get Azure Access Token
        id: get_token
        shell: pwsh
        run: |
          $token = (az account get-access-token --resource https://graph.microsoft.com --query accessToken -o tsv)
          if (-not $token) {
            Write-Error "Failed to acquire Microsoft Graph access token"
            exit 1
          }
          echo "::add-mask::$token"
          echo "access_token=$token" >> $env:GITHUB_OUTPUT

      - name: Apply wave assignment
        if: ${{ github.event.inputs.dry_run != 'true' }}
        shell: pwsh
        env:
          ASSIGNMENT_JSON: ${{ github.event.inputs.assignment_json }}
        run: |
          ./scripts/common/Assign-IntuneMobileApp.ps1 -AccessToken "${{ steps.get_token.outputs.access_token }}" -AppId "${{ github.event.inputs.intune_app_id }}" -AssignmentJson $env:ASSIGNMENT_JSON -IntuneApiUrl "$env:INTUNE_API_URL"

      - name: Dry run summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        shell: pwsh
        env:
          ASSIGNMENT_JSON: ${{ github.event.inputs.assignment_json }}
        run: |
          try {
            $null = $env:ASSIGNMENT_JSON | ConvertFrom-Json
          } catch {
            Write-Error "Assignment JSON is not valid JSON: $($_.Exception.Message)"
            exit 1
          }
          Write-Host "✅ Dry run completed. OIDC, Graph token acquisition, assignment payload parsing, and run persistence were validated."

      - name: Persist Vanguard wave result
        if: always()
        shell: pwsh
        env:
          MODERN_DEVMGMT_CONTEXT_B64: ${{ github.event.inputs.modern_dev_mgmt_context_b64 }}
          ASSIGNMENT_SUMMARY: ${{ github.event.inputs.assignment_summary }}
          JOB_STATUS: ${{ job.status }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          git pull --rebase

          $context = $null
          if ($env:MODERN_DEVMGMT_CONTEXT_B64) {
            try {
              $contextJson = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($env:MODERN_DEVMGMT_CONTEXT_B64))
              $context = $contextJson | ConvertFrom-Json
            } catch {
              Write-Warning "Could not decode Vanguard context: $($_.Exception.Message)"
            }
          }

          $summary = $null
          if ($env:ASSIGNMENT_SUMMARY) {
            try { $summary = $env:ASSIGNMENT_SUMMARY | ConvertFrom-Json } catch { $summary = $env:ASSIGNMENT_SUMMARY }
          }

          $result = [ordered]@{
            workflowRunId = "${{ github.run_id }}"
            workflow = "apply-wave-assignment.yml"
            patchRunId = "${{ github.event.inputs.patch_run_id }}"
            waveRunId = "${{ github.event.inputs.wave_run_id }}"
            waveId = "${{ github.event.inputs.wave_id }}"
            waveName = "${{ github.event.inputs.wave_name }}"
            intuneAppId = "${{ github.event.inputs.intune_app_id }}"
            dryRun = ("${{ github.event.inputs.dry_run }}" -eq "true")
            status = $env:JOB_STATUS
            assignmentSummary = $summary
            context = $context
            createdAt = (Get-Date).ToUniversalTime().ToString("o")
          }

          $runDir = ".modern-dev-mgmt/runs"
          $waveDir = ".modern-dev-mgmt/waves"
          New-Item -ItemType Directory -Force -Path $runDir, $waveDir | Out-Null
          $result | ConvertTo-Json -Depth 8 | Set-Content -Path "$runDir/${{ github.run_id }}.json" -Encoding UTF8
          $waveKey = if ("${{ github.event.inputs.wave_run_id }}") { "${{ github.event.inputs.wave_run_id }}" } else { "${{ github.run_id }}" }
          $result | ConvertTo-Json -Depth 8 | Set-Content -Path "$waveDir/$waveKey.json" -Encoding UTF8
          if ("${{ github.event.inputs.patch_run_id }}") {
            $patchDir = ".modern-dev-mgmt/patch-runs"
            New-Item -ItemType Directory -Force -Path $patchDir | Out-Null
            $result | ConvertTo-Json -Depth 8 | Set-Content -Path "$patchDir/${{ github.event.inputs.patch_run_id }}-wave-$waveKey.json" -Encoding UTF8
            git add "$patchDir/${{ github.event.inputs.patch_run_id }}-wave-$waveKey.json"
          }
          git add "$runDir/${{ github.run_id }}.json" "$waveDir/$waveKey.json"
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "chore: record Vanguard wave ${{ github.run_id }}"
            git pull --rebase origin "${{ github.ref_name }}"
            git push
          } else {
            Write-Host "no changes"
          }
