name: Deploy Winget App to Intune

on:
  workflow_dispatch:
    inputs:
      package_id:
        description: 'Winget Package ID (e.g., Microsoft.VisualStudioCode)'
        required: true
        type: string
      package_name:
        description: 'Package display name (optional compatibility input)'
        required: false
        type: string
      version:
        description: 'Requested version or latest'
        required: false
        type: string
      dry_run:
        description: 'Plan only; do not create the Intune app'
        required: false
        type: boolean
        default: false
      app_name:
        description: 'Display Name for the app in Intune'
        required: false
        type: string
      app_description:
        description: 'App description'
        required: false
        type: string
      install_context:
        description: 'Installation context'
        required: true
        type: choice
        default: 'system'
        options:
          - 'system'
          - 'user'
      use_psadt:
        description: 'Use PowerShell App Deployment Toolkit (PSADT)'
        required: true
        type: boolean
        default: true
      detection_script:
        description: 'Custom detection script (optional)'
        required: false
        type: string
      detection_script_b64:
        description: 'Base64 encoded custom detection script (optional)'
        required: false
        type: string
      install_script_b64:
        description: 'Base64 encoded install script or command override (optional)'
        required: false
        type: string
      uninstall_script_b64:
        description: 'Base64 encoded uninstall script or command override (optional)'
        required: false
        type: string
      pre_install_script_b64:
        description: 'Base64 encoded pre-install script (optional)'
        required: false
        type: string
      post_install_script_b64:
        description: 'Base64 encoded post-install script (optional)'
        required: false
        type: string
      assignment_json:
        description: 'JSON mobileAppAssignments payload generated by Modern Dev Mgmt'
        required: false
        type: string
      assignment_summary:
        description: 'Human-readable assignment plan summary'
        required: false
        type: string
      modern_dev_mgmt_context_b64:
        description: 'Base64 encoded Modern Dev Mgmt run context'
        required: false
        type: string

env:
  AZURE_TENANT_ID: 'f849cde7-f11d-4ef5-a31d-7fca98b21bf5'
  AZURE_CLIENT_ID: '7659f226-8344-4731-b758-a4d93238309c'
  INTUNE_API_URL: 'https://graph.microsoft.com/beta'

jobs:
  deploy-winget-app:
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Azure Login using OIDC
        uses: azure/login@v3
        with:
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          client-id: ${{ env.AZURE_CLIENT_ID }}
          allow-no-subscriptions: true

      - name: Get Azure Access Token
        id: get_token
        run: |
          $token = (az account get-access-token --resource https://graph.microsoft.com --query accessToken -o tsv)
          echo "::add-mask::$token"
          echo "access_token=$token" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Fetch Winget Package Information
        id: winget_info
        run: |
          ./scripts/winget/Fetch-WingetPackageInfo.ps1 -PackageId "${{ github.event.inputs.package_id }}"
        shell: pwsh

      - name: Generate Installation Scripts
        id: generate_scripts
        env:
          DETECTION_SCRIPT_B64: ${{ github.event.inputs.detection_script_b64 }}
          INSTALL_SCRIPT_B64: ${{ github.event.inputs.install_script_b64 }}
          UNINSTALL_SCRIPT_B64: ${{ github.event.inputs.uninstall_script_b64 }}
          PRE_INSTALL_SCRIPT_B64: ${{ github.event.inputs.pre_install_script_b64 }}
          POST_INSTALL_SCRIPT_B64: ${{ github.event.inputs.post_install_script_b64 }}
        run: |
          $params = @{
            PackageId = "${{ github.event.inputs.package_id }}"
            UsePSADT = ("${{ github.event.inputs.use_psadt }}" -eq "true")
            InstallContext = "${{ github.event.inputs.install_context }}"
            Publisher = "${{ steps.winget_info.outputs.publisher }}"
            Version = "${{ steps.winget_info.outputs.version }}"
          }
          if ("${{ github.event.inputs.app_name }}") {
            $params.AppName = "${{ github.event.inputs.app_name }}"
          }
          if ("${{ github.event.inputs.detection_script }}") {
            $params.CustomDetectionScript = "${{ github.event.inputs.detection_script }}"
          }
          if ($env:DETECTION_SCRIPT_B64) {
            $params.CustomDetectionScriptBase64 = $env:DETECTION_SCRIPT_B64
          }
          if ($env:INSTALL_SCRIPT_B64) {
            $params.InstallScriptBase64 = $env:INSTALL_SCRIPT_B64
          }
          if ($env:UNINSTALL_SCRIPT_B64) {
            $params.UninstallScriptBase64 = $env:UNINSTALL_SCRIPT_B64
          }
          if ($env:PRE_INSTALL_SCRIPT_B64) {
            $params.PreInstallScriptBase64 = $env:PRE_INSTALL_SCRIPT_B64
          }
          if ($env:POST_INSTALL_SCRIPT_B64) {
            $params.PostInstallScriptBase64 = $env:POST_INSTALL_SCRIPT_B64
          }
          ./scripts/winget/Generate-InstallationScripts.ps1 @params
        shell: pwsh

      - name: Create Intune Application
        id: create_app
        run: |
          $params = @{
            AccessToken = "${{ steps.get_token.outputs.access_token }}"
            PackageId = "${{ github.event.inputs.package_id }}"
            Publisher = "${{ steps.winget_info.outputs.publisher }}"
            Version = "${{ steps.winget_info.outputs.version }}"
            InstallContext = "${{ github.event.inputs.install_context }}"
            UsePSADT = ("${{ github.event.inputs.use_psadt }}" -eq "true")
            DryRun = ("${{ github.event.inputs.dry_run }}" -eq "true")
            IntuneApiUrl = "$env:INTUNE_API_URL"
          }
          if ("${{ github.event.inputs.app_name }}") {
            $params.AppName = "${{ github.event.inputs.app_name }}"
          }
          if ("${{ github.event.inputs.app_description }}") {
            $params.AppDescription = "${{ github.event.inputs.app_description }}"
          } elseif ("${{ steps.winget_info.outputs.description }}") {
            $params.AppDescription = "${{ steps.winget_info.outputs.description }}"
          }
          ./scripts/winget/Create-IntuneApplication.ps1 @params
        shell: pwsh

      - name: Apply assignment template
        if: ${{ github.event.inputs.dry_run != 'true' && github.event.inputs.assignment_json != '' }}
        env:
          ASSIGNMENT_JSON: ${{ github.event.inputs.assignment_json }}
        run: |
          ./scripts/common/Assign-IntuneMobileApp.ps1 -AccessToken "${{ steps.get_token.outputs.access_token }}" -AppId "${{ steps.create_app.outputs.app_id }}" -AssignmentJson $env:ASSIGNMENT_JSON -IntuneApiUrl "$env:INTUNE_API_URL"
        shell: pwsh

      - name: Summary
        env:
          ASSIGNMENT_SUMMARY: ${{ github.event.inputs.assignment_summary }}
        run: |
          if ("${{ github.event.inputs.dry_run }}" -eq "true") {
            Write-Host "✅ Dry run completed. Scripts were generated but no Intune app was created."
            if ($env:ASSIGNMENT_SUMMARY) {
              Write-Host "Assignment plan: $env:ASSIGNMENT_SUMMARY"
            }
            exit 0
          }
          $success = "${{ steps.create_app.outputs.success }}"
          $appName = "${{ steps.create_app.outputs.app_name }}"
          $appId = "${{ steps.create_app.outputs.app_id }}"
          $packageId = "${{ github.event.inputs.package_id }}"

          if ($success -eq "true") {
            Write-Host "✅ Successfully deployed Winget application to Intune!"
            Write-Host "📱 App Name: $appName"
            Write-Host "🆔 App ID: $appId"
            Write-Host "📦 Package ID: $packageId"
            Write-Host ""
            Write-Host "The application is now available in the Microsoft Intune admin center."
          } else {
            Write-Host "❌ Failed to deploy application to Intune."
            exit 1
          }
        shell: pwsh

      - name: Persist Modern Dev Mgmt run result
        if: ${{ github.event.inputs.dry_run != 'true' && steps.create_app.outputs.app_id != '' }}
        shell: pwsh
        env:
          MODERN_DEVMGMT_CONTEXT_B64: ${{ github.event.inputs.modern_dev_mgmt_context_b64 }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          git pull --rebase
          $runDir = ".modern-dev-mgmt/runs"
          New-Item -ItemType Directory -Force -Path $runDir | Out-Null
          $context = $null
          if ($env:MODERN_DEVMGMT_CONTEXT_B64) {
            try {
              $contextJson = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($env:MODERN_DEVMGMT_CONTEXT_B64))
              $context = $contextJson | ConvertFrom-Json
            } catch {
              Write-Warning "Could not decode Modern Dev Mgmt context: $($_.Exception.Message)"
            }
          }
          $result = [ordered]@{
            workflowRunId = "${{ github.run_id }}"
            workflow = "deploy-winget-app.yml"
            packageManager = "winget"
            packageId = "${{ github.event.inputs.package_id }}"
            appId = "${{ steps.create_app.outputs.app_id }}"
            appName = "${{ steps.create_app.outputs.app_name }}"
            status = "success"
            createdAt = (Get-Date).ToUniversalTime().ToString("o")
            context = $context
          }
          $result | ConvertTo-Json -Depth 5 | Set-Content -Path "$runDir/${{ github.run_id }}.json" -Encoding UTF8
          git add "$runDir/${{ github.run_id }}.json"
          if ($context -and $context.patchRunId) {
            $patchDir = ".modern-dev-mgmt/patch-runs"
            New-Item -ItemType Directory -Force -Path $patchDir | Out-Null
            $patchPath = "$patchDir/$($context.patchRunId).json"
            $result | ConvertTo-Json -Depth 8 | Set-Content -Path $patchPath -Encoding UTF8
            git add $patchPath
          }
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "chore: record Modern Dev Mgmt run ${{ github.run_id }}"
            git push
          } else {
            Write-Host "no changes"
          }