# vanguard-template-version: 2026-07-20.8
name: Deploy Winget App to Intune
run-name: "Vanguard · ${{ inputs.package_id }} · ${{ inputs.version }} · ${{ inputs.dispatch_correlation_id }}"

on:
  workflow_dispatch:
    inputs:
      package_id:
        description: 'Winget Package ID (e.g., Microsoft.VisualStudioCode)'
        required: true
        type: string
      package_source:
        description: 'WinGet source for this package'
        required: false
        type: choice
        default: 'winget'
        options:
          - 'winget'
          - 'msstore'
      dispatch_correlation_id:
        description: 'Unique Vanguard dispatch correlation id'
        required: false
        type: string
      version:
        description: 'Requested version or latest'
        required: false
        type: string
      installer_architecture:
        description: 'Target CPU architecture for the offline installer download'
        required: false
        type: choice
        default: 'x64'
        options:
          - 'x86'
          - 'x64'
          - 'arm64'
      installer_url:
        description: 'Direct download URL (overrides winget manifest). Pipeline downloads + packages this binary into the .intunewin. Filename + silent args inferred from URL/extension; encode overrides as a single "url|filename|silentArgs" pipe-separated string when needed.'
        required: false
        type: string
      validation_enabled:
        description: 'Run install/detection/uninstall + footprint diff in the runner before uploading to Intune'
        required: false
        type: boolean
        default: true
      dry_run:
        description: 'Plan only; do not create the Intune app'
        required: false
        type: boolean
        default: false
      app_name:
        description: 'Display Name for the app in Intune'
        required: false
        type: string
      app_description:
        description: 'App description'
        required: false
        type: string
      app_publisher:
        description: 'Publisher override for the Intune app'
        required: false
        type: string
      app_icon_base64:
        description: 'Base64 encoded app icon (optional)'
        required: false
        type: string
      install_context:
        description: 'Installation context'
        required: true
        type: choice
        default: 'system'
        options:
          - 'system'
          - 'user'
      use_psadt:
        description: 'Use PowerShell App Deployment Toolkit (PSADT)'
        required: true
        type: boolean
        default: true
      detection_script_b64:
        description: 'Base64 encoded custom detection script (optional)'
        required: false
        type: string
      install_script_b64:
        description: 'Base64 encoded install script or command override (optional)'
        required: false
        type: string
      uninstall_script_b64:
        description: 'Base64 encoded uninstall script or command override (optional)'
        required: false
        type: string
      pre_install_script_b64:
        description: 'Base64 encoded pre-install script (optional)'
        required: false
        type: string
      post_install_script_b64:
        description: 'Base64 encoded post-install script (optional)'
        required: false
        type: string
      assignment_json:
        description: 'JSON mobileAppAssignments payload generated by Vanguard'
        required: false
        type: string
      assignment_summary:
        description: 'Human-readable assignment plan summary'
        required: false
        type: string
      modern_dev_mgmt_context_b64:
        description: 'Base64 encoded Vanguard run context'
        required: false
        type: string
      apps_to_close:
        description: 'Rendered close-app list from the selected Vanguard app setting (process.exe=Friendly Name, comma separated)'
        required: false
        type: string
      update_only_b64:
        # Dual-app pattern: when present, a SECOND
        # Intune mobileApp must be created with this script as its custom
        # detection rule, intent=required, scope=all devices, display name
        # suffixed with "(Update-Only)". The script reports detected for absent
        # or current installs and not-detected only for outdated installs, so the
        # required companion remediates outdated devices without clean-installing.
        description: 'Base64 encoded PowerShell detection script for the Update-Only Required companion app'
        required: false
        type: string
      signing_cert_thumbprint:
        description: 'SHA-1 thumbprint used to select certificate-specific GitHub secrets'
        required: false
        type: string
env:
  AZURE_TENANT_ID: 'f849cde7-f11d-4ef5-a31d-7fca98b21bf5'
  AZURE_CLIENT_ID: 'a34f2806-b6f7-4d11-98f6-b32894396ca8'
  INTUNE_API_URL: 'https://graph.microsoft.com/v1.0'

jobs:
  validate_winget_app:
    runs-on: windows-latest
    timeout-minutes: 35
    permissions:
      id-token: none
      contents: read
    outputs:
      app_version: ${{ steps.winget_info.outputs.version }}
      app_publisher: ${{ steps.winget_info.outputs.publisher }}
      app_description: ${{ steps.winget_info.outputs.description }}

    steps:
      # Tenant repos accumulate backup snapshots whose nested paths can exceed
      # the Windows 260-char MAX_PATH; without long paths the checkout fails
      # with "Filename too long".
      - name: Enable Git long paths
        shell: pwsh
        run: git config --system core.longpaths true

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Fetch Winget Package Information
        id: winget_info
        run: |
          ./scripts/winget/Fetch-WingetPackageInfo.ps1 -PackageId "${{ github.event.inputs.package_id }}" -PackageSource "${{ github.event.inputs.package_source || 'winget' }}"
        shell: pwsh

      - name: Resolve and download installer binary (offline package)
        id: resolve_installer
        # Resolves the installer binary from one of three sources, in order of
        # preference: (a) explicit installer_url input (vendor download link
        # outside winget/msstore), (b) winget manifest, (c) msstore manifest
        # via 'winget download --source msstore'. Licensed Store apps fail at
        # the manifest stage; the workflow then falls back to the legacy
        # winget-client install path so the deploy still completes (just
        # without VM validation / footprint diff).
        if: ${{ github.event.inputs.dry_run != 'true' || true }}
        timeout-minutes: 5
        shell: pwsh
        continue-on-error: true
        run: |
          $ErrorActionPreference = 'Stop'
          $arch = "${{ github.event.inputs.installer_architecture }}"
          if (-not $arch) { $arch = 'x64' }
          $version = "${{ github.event.inputs.version }}"
          if (-not $version) { $version = "${{ steps.winget_info.outputs.version }}" }
          $source = "${{ github.event.inputs.package_source || 'winget' }}"
          $stagingDir = Join-Path $PWD 'winget-installer-files'
          $installerUrl = "${{ github.event.inputs.installer_url }}"
          try {
            if ($installerUrl) {
              # URL path: download arbitrary vendor link and produce the same
              # installer-metadata.json shape so the rest of the offline
              # pipeline (Generate scripts, VM validation, Intune upload)
              # runs unchanged. Filename + silent args may be encoded as
              # "url|filename|silentArgs" pipe-separated string.
              $urlParts = $installerUrl -split '\|', 3
              $url = $urlParts[0]
              $fname = if ($urlParts.Count -ge 2) { $urlParts[1] } else { '' }
              $silentArgs = if ($urlParts.Count -ge 3) { $urlParts[2] } else { '' }
              $urlArgs = @{
                InstallerUrl = $url
                OutputDirectory = $stagingDir
                Version = $version
              }
              if ($fname)      { $urlArgs.Filename = $fname }
              if ($silentArgs) { $urlArgs.SilentArgsOverride = $silentArgs }
              ./scripts/common/Download-InstallerFromUrl.ps1 @urlArgs
              Add-Content -Path $env:GITHUB_OUTPUT -Value "url_mode=true"
            } else {
              ./scripts/winget/Download-WingetInstaller.ps1 `
                -PackageId "${{ github.event.inputs.package_id }}" `
                -Version $version `
                -PackageSource $source `
                -Architecture $arch `
                -InstallContext "${{ github.event.inputs.install_context }}" `
                -OutputDirectory $stagingDir
            }
            $metadataPath = Join-Path $stagingDir 'installer-metadata.json'
            if (Test-Path -LiteralPath $metadataPath) {
              Add-Content -Path $env:GITHUB_OUTPUT -Value "metadata_path=$metadataPath"
              Add-Content -Path $env:GITHUB_OUTPUT -Value "staging_dir=$stagingDir"
              Add-Content -Path $env:GITHUB_OUTPUT -Value "offline=true"
            } else {
              Write-Host "::warning::Offline installer metadata missing; falling back to runtime install path."
            }
          } catch {
            Write-Host "::warning::Offline installer download failed ($($_.Exception.Message)); falling back to runtime install path."
          }

      - name: Require a sandbox-validation candidate
        if: ${{ github.event.inputs.validation_enabled != 'false' }}
        shell: pwsh
        run: |
          if ("${{ steps.resolve_installer.outputs.offline }}" -ne 'true') {
            throw 'The installer could not be resolved into an offline package, so install/detect/uninstall validation cannot run. Intune upload is blocked.'
          }

      - name: Download app-setting files
        id: app_setting_files
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          MODERN_DEVMGMT_CONTEXT_B64: ${{ github.event.inputs.modern_dev_mgmt_context_b64 }}
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not $env:MODERN_DEVMGMT_CONTEXT_B64) { return }
          $context = ([Text.Encoding]::UTF8.GetString([Convert]::FromBase64String(($env:MODERN_DEVMGMT_CONTEXT_B64 -replace '\s+', '')))) | ConvertFrom-Json
          $files = $context.appSettingFilesRelease
          if (-not $files -or -not $files.releaseTag -or @($files.assetNames).Count -eq 0) { return }
          $stagingDir = "${{ steps.resolve_installer.outputs.staging_dir }}"
          if (-not $stagingDir -or -not (Test-Path -LiteralPath $stagingDir -PathType Container)) {
            throw 'App-setting files require a resolved offline installer; refusing to deploy without them.'
          }
          foreach ($assetName in @($files.assetNames)) {
            gh release download ([string]$files.releaseTag) --repo "${{ github.repository }}" --pattern ([string]$assetName) --dir $stagingDir --clobber
            $assetPath = Join-Path $stagingDir ([string]$assetName)
            if (-not (Test-Path -LiteralPath $assetPath -PathType Leaf)) { throw "App-setting asset was not downloaded: $assetName" }
          }
          $mstNames = @($files.mstAssetNames | ForEach-Object { [IO.Path]::GetFileName([string]$_) } | Where-Object { $_ })
          if ($mstNames.Count -gt 0) {
            Add-Content -Path $env:GITHUB_OUTPUT -Value "mst_filenames=$($mstNames -join ';')"
            $metadataPath = "${{ steps.resolve_installer.outputs.metadata_path }}"
            if ($metadataPath -and (Test-Path -LiteralPath $metadataPath -PathType Leaf)) {
              $metadata = Get-Content -LiteralPath $metadataPath -Raw | ConvertFrom-Json
              $installerType = ([string]$metadata.installerType).ToLowerInvariant()
              if ($installerType -in @('msi','wix','burn') -and ([string]$metadata.silentArgs) -notmatch '(?i)\bTRANSFORMS\s*=') {
                $metadata.silentArgs = (([string]$metadata.silentArgs).Trim() + ' TRANSFORMS="' + ($mstNames -join ';') + '"').Trim()
                $metadata | ConvertTo-Json -Depth 20 | Set-Content -LiteralPath $metadataPath -Encoding UTF8
              }
            }
          }

      - name: Generate Installation Scripts
        id: generate_scripts
        env:
          DETECTION_SCRIPT_B64: ${{ github.event.inputs.detection_script_b64 }}
          INSTALL_SCRIPT_B64: ${{ github.event.inputs.install_script_b64 }}
          UNINSTALL_SCRIPT_B64: ${{ github.event.inputs.uninstall_script_b64 }}
          PRE_INSTALL_SCRIPT_B64: ${{ github.event.inputs.pre_install_script_b64 }}
          POST_INSTALL_SCRIPT_B64: ${{ github.event.inputs.post_install_script_b64 }}
          APP_NAME: ${{ github.event.inputs.app_name }}
          APP_PUBLISHER: ${{ github.event.inputs.app_publisher }}
          WINGET_PUBLISHER: ${{ steps.winget_info.outputs.publisher }}
          WINGET_VERSION: ${{ steps.winget_info.outputs.version }}
        run: |
          $publisher = $env:APP_PUBLISHER
          if (-not $publisher) { $publisher = $env:WINGET_PUBLISHER }
          $params = @{
            PackageId = "${{ github.event.inputs.package_id }}"
            PackageSource = "${{ github.event.inputs.package_source || 'winget' }}"
            UsePSADT = ("${{ github.event.inputs.use_psadt }}" -eq "true")
            InstallContext = "${{ github.event.inputs.install_context }}"
            Publisher = $publisher
            Version = $env:WINGET_VERSION
          }
          if ($env:APP_NAME) {
            $params.AppName = $env:APP_NAME
          }
          if ($env:DETECTION_SCRIPT_B64) {
            $params.CustomDetectionScriptBase64 = $env:DETECTION_SCRIPT_B64
          }
          if ($env:INSTALL_SCRIPT_B64) {
            $params.InstallScriptBase64 = $env:INSTALL_SCRIPT_B64
          }
          if ($env:UNINSTALL_SCRIPT_B64) {
            $params.UninstallScriptBase64 = $env:UNINSTALL_SCRIPT_B64
          }
          if ($env:PRE_INSTALL_SCRIPT_B64) {
            $params.PreInstallScriptBase64 = $env:PRE_INSTALL_SCRIPT_B64
          }
          if ($env:POST_INSTALL_SCRIPT_B64) {
            $params.PostInstallScriptBase64 = $env:POST_INSTALL_SCRIPT_B64
          }
          if ("${{ steps.resolve_installer.outputs.metadata_path }}") {
            $params.InstallerMetadataPath = "${{ steps.resolve_installer.outputs.metadata_path }}"
          }
          ./scripts/winget/Generate-InstallationScripts.ps1 @params
        shell: pwsh

      - name: Wrap package in PSADT v4
        id: stage_psadt
        if: ${{ github.event.inputs.use_psadt == 'true' && steps.resolve_installer.outputs.offline == 'true' }}
        shell: pwsh
        env:
          APPS_TO_CLOSE: ${{ github.event.inputs.apps_to_close }}
          APP_NAME: ${{ github.event.inputs.app_name }}
          WINGET_PUBLISHER: ${{ steps.winget_info.outputs.publisher }}
          WINGET_VERSION: ${{ steps.winget_info.outputs.version }}
          STAGING_DIR: ${{ steps.resolve_installer.outputs.staging_dir }}
        run: |
          $ErrorActionPreference = 'Continue'
          $stagingDir = $env:STAGING_DIR
          if (-not $stagingDir -or -not (Test-Path -LiteralPath $stagingDir)) {
            Write-Host "::warning::No offline staging dir; skipping PSADT wrap."
            exit 0
          }
          try {
            $appName = $env:APP_NAME
            if (-not $appName) { $appName = "${{ github.event.inputs.package_id }}".Split('.')[-1] }
            $wrapParams = @{
              AppName = $appName
              Publisher = $env:WINGET_PUBLISHER
              Version = $env:WINGET_VERSION
              PackageRoot = $stagingDir
              InstallScriptPath = './install_script.ps1'
              UninstallScriptPath = './uninstall_script.ps1'
              AppsToClose = $env:APPS_TO_CLOSE
            }
            $contextB64 = "${{ github.event.inputs.modern_dev_mgmt_context_b64 }}"
            if ($contextB64) {
              try {
                $context = ([Text.Encoding]::UTF8.GetString([Convert]::FromBase64String(($contextB64 -replace '\s+', '')))) | ConvertFrom-Json
                $ix = $context.installExperience
                if ($ix) {
                  if ($null -ne $ix.conflictingProcesses) { $wrapParams.ConflictingProcessesJson = $ix.conflictingProcesses | ConvertTo-Json -Depth 10 -Compress }
                  if ($ix.deferral -and $ix.deferral.allowed) {
                    $wrapParams.AllowDeferral = $true
                    if ($null -ne $ix.deferral.maxDeferrals) { $wrapParams.MaxDeferrals = [int]$ix.deferral.maxDeferrals }
                    if ($null -ne $ix.deferral.deadlineHours) { $wrapParams.DeferralDeadlineHours = [int]$ix.deferral.deadlineHours }
                  }
                }
              } catch {
                throw "Install-experience context is invalid: $($_.Exception.Message)"
              }
            }
            ./scripts/common/New-PsadtV4Package.ps1 @wrapParams
          } catch {
            Write-Error "PSADT v4 wrap failed: $($_.Exception.Message)"
            throw
          }

      - name: Inject close-processes fallback prologue
        if: ${{ github.event.inputs.apps_to_close != '' && steps.stage_psadt.outputs.psadt_wrapped != 'true' }}
        shell: pwsh
        env:
          APPS_TO_CLOSE: ${{ github.event.inputs.apps_to_close }}
        run: |
          $ErrorActionPreference = 'Stop'
          $apps = ($env:APPS_TO_CLOSE -split '[,;\r\n]+' | ForEach-Object { $_.Trim() } | Where-Object { $_ }) -join ','
          if (-not $apps) { return }
          # PSADT v4 emits Show-ADTInstallationWelcome; in non-PSADT runtimes we
          # fall back to Stop-Process on the same process-name list so we never
          # block-execute outside a PSADT session and never break dry-run.
          $processList = (($apps -split ',') | ForEach-Object { ($_ -split '=', 2)[0].Trim() -replace '\.exe$', '' } | Where-Object { $_ }) -join ','
          $prologue = @"
          # --- Vanguard: close running apps before install ---
          `$closeProcesses = @('$processList' -split ',' | Where-Object { `$_ })
          if (Get-Command Show-ADTInstallationWelcome -ErrorAction SilentlyContinue) {
              Show-ADTInstallationWelcome -CloseProcesses `$closeProcesses -BlockExecution -Silent
          } else {
              foreach (`$proc in `$closeProcesses) {
                  if (`$proc) { Get-Process -Name `$proc -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue }
              }
          }
          # --- end close-apps prologue ---
          "@
          foreach ($target in @('install_script.ps1','uninstall_script.ps1')) {
            if (Test-Path -LiteralPath $target -PathType Leaf) {
              $existing = Get-Content -LiteralPath $target -Raw
              Set-Content -LiteralPath $target -Value ($prologue + [Environment]::NewLine + $existing) -Encoding UTF8
              Write-Host "Injected close-apps prologue into $target"
            }
          }

      - name: Authenticode-sign validated package scripts
        if: ${{ github.event.inputs.signing_cert_thumbprint != '' }}
        shell: pwsh
        env:
          SIGNING_CERT_PFX_BASE64: ${{ secrets[format('SIGNING_CERT_{0}', inputs.signing_cert_thumbprint)] }}
          SIGNING_CERT_PFX_PASSWORD: ${{ secrets[format('SIGNING_CERT_PASSWORD_{0}', inputs.signing_cert_thumbprint)] }}
          SIGNING_CERT_THUMBPRINT: ${{ github.event.inputs.signing_cert_thumbprint }}
          STAGING_DIR: ${{ steps.resolve_installer.outputs.staging_dir }}
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not $env:SIGNING_CERT_PFX_BASE64) { throw 'Certificate-specific signing material is missing.' }
          $pfxPath = Join-Path $env:RUNNER_TEMP 'vanguard-signing.pfx'
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:SIGNING_CERT_PFX_BASE64))
          $importedCert = $null
          try {
            $password = ConvertTo-SecureString ($env:SIGNING_CERT_PFX_PASSWORD ?? '') -AsPlainText -Force
            $importedCert = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation 'Cert:\CurrentUser\My' -Password $password -Exportable
            if (-not $importedCert -or -not $importedCert.HasPrivateKey) { throw 'Signing certificate has no private key.' }
            $actual = ($importedCert.Thumbprint -replace '[^A-Fa-f0-9]', '').ToUpperInvariant()
            $expected = ($env:SIGNING_CERT_THUMBPRINT -replace '[^A-Fa-f0-9]', '').ToUpperInvariant()
            if ($actual -ne $expected) { throw "Signing certificate thumbprint mismatch: expected $expected, got $actual." }
            $targets = @(
              Get-ChildItem -LiteralPath $env:STAGING_DIR -Recurse -File -Filter '*.ps1'
              Get-Item -LiteralPath './detection_script.ps1' -ErrorAction SilentlyContinue
            ) | Where-Object { $_ }
            if ($targets.Count -eq 0) { throw 'No package scripts were found to sign.' }
            foreach ($target in $targets) {
              $signature = Set-AuthenticodeSignature -FilePath $target.FullName -Certificate $importedCert -HashAlgorithm SHA256 -TimestampServer 'http://timestamp.digicert.com'
              if (-not $signature.SignerCertificate -or $signature.Status -in @('NotSigned','HashMismatch')) {
                throw "Authenticode signing failed for $($target.FullName): $($signature.Status)"
              }
            }
          } finally {
            if ($importedCert) { Remove-Item -LiteralPath "Cert:\CurrentUser\My\$($importedCert.Thumbprint)" -Force -ErrorAction SilentlyContinue }
            Remove-Item -LiteralPath $pfxPath -Force -ErrorAction SilentlyContinue
          }

      - name: Stage immutable Winget deployment candidate
        uses: actions/upload-artifact@v7
        with:
          name: winget-deployment-input-${{ github.run_id }}
          path: |
            winget-installer-files/
            install_script.ps1
            uninstall_script.ps1
            detection_script.ps1
          if-no-files-found: error
          retention-days: 1

      - name: VM validation — baseline snapshot
        id: validate_baseline
        if: ${{ github.event.inputs.validation_enabled != 'false' && steps.resolve_installer.outputs.offline == 'true' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path .modern-dev-mgmt/validation | Out-Null
          # ARP-only baseline: a list of currently-installed apps. Fast (no
          # file system walk). The after-install snapshot will only enumerate
          # files under the NEW ARP entry's InstallLocation.
          ./scripts/common/Capture-WindowsFootprint.ps1 -OutputPath .modern-dev-mgmt/validation/before.json -Mode arp
          Add-Content -Path $env:GITHUB_OUTPUT -Value "baseline_path=.modern-dev-mgmt/validation/before.json"

      - name: VM validation — install (offline package)
        id: validate_install
        if: ${{ github.event.inputs.validation_enabled != 'false' && steps.resolve_installer.outputs.offline == 'true' }}
        shell: pwsh
        timeout-minutes: 10
        continue-on-error: true
        run: |
          $ErrorActionPreference = 'Continue'
          # Stage scripts + Files/ next to each other so install_script.ps1 can
          # resolve Files/<installer> via PSScriptRoot — identical to how Intune
          # lays out the .intunewin on the device.
          $workspace = $PWD.Path
          $stageDir = Join-Path $workspace 'validation-stage'
          $validationDir = Join-Path $workspace '.modern-dev-mgmt/validation'
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null
          New-Item -ItemType Directory -Force -Path $validationDir | Out-Null
          Copy-Item install_script.ps1   "$stageDir/" -Force
          Copy-Item uninstall_script.ps1 "$stageDir/" -Force
          Copy-Item detection_script.ps1 "$stageDir/" -Force
          # Copy the whole staging dir: Files/ plus (when PSADT-wrapped) the
          # toolkit, Invoke-AppDeployToolkit.ps1, and logic scripts — the same
          # layout the .intunewin will have on the device.
          $stagingSrc = "${{ steps.resolve_installer.outputs.staging_dir }}"
          if ($stagingSrc -and (Test-Path -LiteralPath $stagingSrc)) {
            Copy-Item (Join-Path $stagingSrc '*') "$stageDir/" -Recurse -Force
          }
          $installLog = Join-Path $validationDir 'install.log'
          $installScript = Join-Path $stageDir 'install_script.ps1'
          Start-Transcript -Path $installLog -Force | Out-Null
          $exit = 0
          try {
            & powershell.exe -ExecutionPolicy Bypass -NoProfile -File $installScript
            $exit = $LASTEXITCODE
          } catch {
            $exit = 1
            Write-Host "Install threw: $($_.Exception.Message)"
          }
          Stop-Transcript | Out-Null
          Add-Content -Path $env:GITHUB_OUTPUT -Value "install_exit_code=$exit"

      - name: VM validation — detection (assert installed)
        id: validate_detection
        if: ${{ github.event.inputs.validation_enabled != 'false' && steps.resolve_installer.outputs.offline == 'true' && steps.validate_install.outcome == 'success' }}
        shell: pwsh
        continue-on-error: true
        run: |
          $detect = Join-Path $PWD.Path 'validation-stage/detection_script.ps1'
          & powershell.exe -ExecutionPolicy Bypass -NoProfile -File $detect
          $exit = $LASTEXITCODE
          Add-Content -Path $env:GITHUB_OUTPUT -Value "detection_exit_code=$exit"

      - name: VM validation — after-install snapshot + footprint diff
        id: validate_footprint
        if: ${{ github.event.inputs.validation_enabled != 'false' && steps.resolve_installer.outputs.offline == 'true' && steps.validate_install.outcome == 'success' }}
        shell: pwsh
        run: |
          # 'full' mode + BaselinePath: enumerates files ONLY under the new
          # ARP entry's InstallLocation (skip everything that was already on
          # the runner). Brings post-install snapshot from minutes to seconds.
          ./scripts/common/Capture-WindowsFootprint.ps1 `
            -OutputPath .modern-dev-mgmt/validation/after-install.json `
            -Mode full `
            -BaselinePath .modern-dev-mgmt/validation/before.json
          ./scripts/common/Diff-WindowsFootprint.ps1 `
            -BeforePath .modern-dev-mgmt/validation/before.json `
            -AfterPath  .modern-dev-mgmt/validation/after-install.json `
            -OutputPath .modern-dev-mgmt/validation/footprint.json

      - name: VM validation — uninstall
        id: validate_uninstall
        if: ${{ github.event.inputs.validation_enabled != 'false' && steps.resolve_installer.outputs.offline == 'true' && steps.validate_install.outcome == 'success' }}
        shell: pwsh
        timeout-minutes: 10
        continue-on-error: true
        run: |
          $validationDir = Join-Path $PWD.Path '.modern-dev-mgmt/validation'
          $uninstallLog = Join-Path $validationDir 'uninstall.log'
          $uninstall = Join-Path $PWD.Path 'validation-stage/uninstall_script.ps1'
          New-Item -ItemType Directory -Force -Path $validationDir | Out-Null
          Start-Transcript -Path $uninstallLog -Force | Out-Null
          $exit = 0
          try {
            & powershell.exe -ExecutionPolicy Bypass -NoProfile -File $uninstall
            $exit = $LASTEXITCODE
          } catch {
            $exit = 1
            Write-Host "Uninstall threw: $($_.Exception.Message)"
          }
          Stop-Transcript | Out-Null
          Add-Content -Path $env:GITHUB_OUTPUT -Value "uninstall_exit_code=$exit"

      - name: VM validation — leftover diff
        id: validate_leftovers
        # Run even if uninstall failed so "Left after uninstall" surfaces the
        # leftover files for the UI (matches Robopack's "0 files, 0 KB - 0%"
        # vs. "leftover" rows). Only skip if validation was disabled entirely.
        if: ${{ always() && github.event.inputs.validation_enabled != 'false' && steps.resolve_installer.outputs.offline == 'true' && steps.validate_install.outcome == 'success' }}
        shell: pwsh
        run: |
          ./scripts/common/Capture-WindowsFootprint.ps1 `
            -OutputPath .modern-dev-mgmt/validation/after-uninstall.json `
            -Mode full `
            -BaselinePath .modern-dev-mgmt/validation/before.json
          ./scripts/common/Diff-WindowsFootprint.ps1 `
            -BeforePath .modern-dev-mgmt/validation/before.json `
            -AfterPath  .modern-dev-mgmt/validation/after-uninstall.json `
            -OutputPath .modern-dev-mgmt/validation/leftovers.json

      - name: VM validation — post-uninstall detection
        id: validate_post_uninstall_detection
        if: ${{ always() && github.event.inputs.validation_enabled != 'false' && steps.validate_install.outcome == 'success' }}
        shell: pwsh
        continue-on-error: true
        run: |
          $detect = Join-Path $PWD.Path 'validation-stage/detection_script.ps1'
          if (-not (Test-Path -LiteralPath $detect -PathType Leaf)) {
            Add-Content -Path $env:GITHUB_OUTPUT -Value "post_uninstall_detection_exit_code=1"
            exit 0
          }
          & powershell.exe -ExecutionPolicy Bypass -NoProfile -File $detect
          Add-Content -Path $env:GITHUB_OUTPUT -Value "post_uninstall_detection_exit_code=$LASTEXITCODE"

      - name: VM validation — assemble report
        id: validation_report
        if: ${{ github.event.inputs.validation_enabled != 'false' && steps.resolve_installer.outputs.offline == 'true' }}
        shell: pwsh
        env:
          INSTALL_EXIT:   ${{ steps.validate_install.outputs.install_exit_code }}
          DETECT_EXIT:    ${{ steps.validate_detection.outputs.detection_exit_code }}
          UNINSTALL_EXIT: ${{ steps.validate_uninstall.outputs.uninstall_exit_code }}
          POST_UNINSTALL_DETECT_EXIT: ${{ steps.validate_post_uninstall_detection.outputs.post_uninstall_detection_exit_code }}
          INSTALL_OUTCOME:   ${{ steps.validate_install.outcome }}
          DETECT_OUTCOME:    ${{ steps.validate_detection.outcome }}
          UNINSTALL_OUTCOME: ${{ steps.validate_uninstall.outcome }}
        run: |
          function ParseInt($s) { if ($s -and $s -match '^-?\d+$') { return [int]$s } else { return $null } }
          $report = [ordered]@{
            installExitCode    = ParseInt $env:INSTALL_EXIT
            detectionExitCode  = ParseInt $env:DETECT_EXIT
            uninstallExitCode  = ParseInt $env:UNINSTALL_EXIT
            postUninstallDetectionExitCode = ParseInt $env:POST_UNINSTALL_DETECT_EXIT
            installOutcome     = $env:INSTALL_OUTCOME
            detectionOutcome   = $env:DETECT_OUTCOME
            uninstallOutcome   = $env:UNINSTALL_OUTCOME
            footprintAvailable = (Test-Path '.modern-dev-mgmt/validation/footprint.json')
            leftoversAvailable = (Test-Path '.modern-dev-mgmt/validation/leftovers.json')
            installLogPath     = '.modern-dev-mgmt/validation/install.log'
            uninstallLogPath   = '.modern-dev-mgmt/validation/uninstall.log'
          }
          $report | ConvertTo-Json -Depth 8 | Set-Content '.modern-dev-mgmt/validation/report.json' -Encoding UTF8
          # Decide pass/fail on the recorded exit codes (the validate steps end
          # with exit 0 by design, so step outcome is always 'success' and must
          # not be the gate). Install must succeed; a failing detection after a
          # successful install means the package would loop on devices.
          # Uninstall failures are warnings — surfaced in the UI but non-blocking.
          $installExit = ParseInt $env:INSTALL_EXIT
          $detectExit = ParseInt $env:DETECT_EXIT
          if ($null -eq $installExit -or $installExit -notin @(0, 1641, 3010, 1707)) {
            Write-Host "::error::Install failed in validation runner (exit $installExit) — aborting Intune upload."
            exit 1
          }
          if ($null -ne $detectExit -and $detectExit -ne 0) {
            Write-Host "::error::Detection did not report the app as installed after a successful install (exit $detectExit) — aborting Intune upload."
            exit 1
          }
          $uninstallExit = ParseInt $env:UNINSTALL_EXIT
          if ($null -ne $uninstallExit -and $uninstallExit -notin @(0, 1641, 3010, 1707, 19)) {
            Write-Host "::warning::Uninstall failed in validation runner (exit $uninstallExit). Check leftovers.json for residues."
          }
          $postUninstallDetectExit = ParseInt $env:POST_UNINSTALL_DETECT_EXIT
          if ($null -eq $postUninstallDetectExit -or $postUninstallDetectExit -eq 0) {
            Write-Host "::error::Application is still detected after uninstall — aborting Intune upload."
            exit 1
          }
          Write-Host "✅ Validation report assembled at .modern-dev-mgmt/validation/report.json"

      - name: VM validation — upload artifacts
        if: ${{ always() && github.event.inputs.validation_enabled != 'false' && steps.resolve_installer.outputs.offline == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: validation-${{ github.run_id }}
          path: .modern-dev-mgmt/validation/
          if-no-files-found: ignore
          retention-days: 14

  deploy-winget-app:
    needs: validate_winget_app
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Enable Git long paths
        shell: pwsh
        run: git config --system core.longpaths true

      - name: Checkout repository without persisted credentials
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download immutable validated candidate
        uses: actions/download-artifact@v8
        with:
          name: winget-deployment-input-${{ github.run_id }}
          path: .

      - name: Download validation evidence
        if: ${{ github.event.inputs.validation_enabled != 'false' }}
        uses: actions/download-artifact@v8
        with:
          name: validation-${{ github.run_id }}
          path: .modern-dev-mgmt/validation

      - name: Resolve target Azure tenant from Vanguard context
        shell: bash
        env:
          MODERN_DEVMGMT_CONTEXT_B64: ${{ github.event.inputs.modern_dev_mgmt_context_b64 }}
        run: |
          if [[ -z "${MODERN_DEVMGMT_CONTEXT_B64:-}" ]]; then exit 0; fi
          decoded="$(printf '%s' "$MODERN_DEVMGMT_CONTEXT_B64" | base64 --decode 2>/dev/null || true)"
          tenant="$(printf '%s' "$decoded" | jq -r '.targetAzureTenantId // ""' 2>/dev/null || true)"
          client="$(printf '%s' "$decoded" | jq -r '.targetAzureClientId // ""' 2>/dev/null || true)"
          if [[ -n "$tenant" ]]; then
            echo "::add-mask::$tenant"
            echo "AZURE_TENANT_ID=$tenant" >> "$GITHUB_ENV"
          fi
          if [[ -n "$client" ]]; then
            echo "AZURE_CLIENT_ID=$client" >> "$GITHUB_ENV"
          fi

      - name: Azure Login using OIDC
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: azure/login@v3
        with:
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          client-id: ${{ env.AZURE_CLIENT_ID }}
          allow-no-subscriptions: true

      - name: Get Azure Access Token
        id: get_token
        if: ${{ github.event.inputs.dry_run != 'true' }}
        shell: pwsh
        run: |
          $token = (az account get-access-token --resource https://graph.microsoft.com --query accessToken -o tsv)
          if (-not $token) { throw 'Failed to acquire Microsoft Graph token.' }
          echo "::add-mask::$token"
          echo "access_token=$token" >> $env:GITHUB_OUTPUT

      - name: Create Intune Application
        id: create_app
        env:
          APP_NAME: ${{ github.event.inputs.app_name }}
          APP_DESCRIPTION: ${{ github.event.inputs.app_description }}
          APP_PUBLISHER: ${{ github.event.inputs.app_publisher }}
          WINGET_PUBLISHER: ${{ needs.validate_winget_app.outputs.app_publisher }}
          WINGET_DESCRIPTION: ${{ needs.validate_winget_app.outputs.app_description }}
          WINGET_VERSION: ${{ needs.validate_winget_app.outputs.app_version }}
          STAGING_DIR: winget-installer-files
          METADATA_PATH: winget-installer-files/installer-metadata.json
        run: |
          $packageSource = "${{ github.event.inputs.package_source || 'winget' }}"
          $packageSourceLabel = if ($packageSource -eq "msstore") { "Microsoft Store via WinGet" } else { "WinGet" }
          $publisher = $env:APP_PUBLISHER
          if (-not $publisher) { $publisher = $env:WINGET_PUBLISHER }
          $architecture = "x64"
          $contextB64 = "${{ github.event.inputs.modern_dev_mgmt_context_b64 }}"
          if ($contextB64) {
            try {
              $rawContext = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String(($contextB64 -replace '\s+', '')))
              $context = $rawContext | ConvertFrom-Json
              if ($context.architecture) { $architecture = [string]$context.architecture }
              elseif ($context.package -and $context.package.architecture) { $architecture = [string]$context.package.architecture }
            } catch {
              Write-Warning "Could not parse Vanguard context architecture, using x64"
            }
          }
          $mdDeveloper = ""; $mdOwner = ""; $mdInformationUrl = ""; $mdPrivacyUrl = ""; $mdNotes = ""; $mdRestartBehavior = ""
          $mdReturnCodesJson = ""; $mdCategoryIdsJson = ""; $mdCategoryNamesJson = ""; $mdRequirementRulesJson = ""; $mdMinimumSupportedOperatingSystemJson = ""; $mdMaxRunTimeInMinutes = 0
          $mdContextB64 = "${{ github.event.inputs.modern_dev_mgmt_context_b64 }}"
          if ($mdContextB64) {
            try {
              $mdContext = ([Text.Encoding]::UTF8.GetString([Convert]::FromBase64String(($mdContextB64 -replace '\s+', '')))) | ConvertFrom-Json
              if ($mdContext.intuneMetadata) {
                $md = $mdContext.intuneMetadata
                if ($md.developer) { $mdDeveloper = [string]$md.developer }
                if ($md.owner) { $mdOwner = [string]$md.owner }
                if ($md.informationUrl) { $mdInformationUrl = [string]$md.informationUrl }
                if ($md.privacyInformationUrl) { $mdPrivacyUrl = [string]$md.privacyInformationUrl }
                if ($md.notes) { $mdNotes = [string]$md.notes }
                if ($md.restartBehavior) { $mdRestartBehavior = [string]$md.restartBehavior }
                if ($null -ne $md.returnCodes) { $mdReturnCodesJson = $md.returnCodes | ConvertTo-Json -Depth 10 -Compress }
                if ($null -ne $md.categoryIds) { $mdCategoryIdsJson = $md.categoryIds | ConvertTo-Json -Depth 10 -Compress }
                if ($null -ne $md.categoryNames) { $mdCategoryNamesJson = $md.categoryNames | ConvertTo-Json -Depth 10 -Compress }
                if ($null -ne $md.requirementRules) { $mdRequirementRulesJson = $md.requirementRules | ConvertTo-Json -Depth 20 -Compress }
                if ($null -ne $md.minimumSupportedOperatingSystem) { $mdMinimumSupportedOperatingSystemJson = $md.minimumSupportedOperatingSystem | ConvertTo-Json -Depth 10 -Compress }
                if ($md.maxRunTimeInMinutes) { $mdMaxRunTimeInMinutes = [int]$md.maxRunTimeInMinutes }
              }
            } catch {
              Write-Warning "Could not parse Vanguard context Intune metadata"
            }
          }
          $params = @{
            AccessToken = $(if ("${{ github.event.inputs.dry_run }}" -eq 'true') { 'dry-run' } else { "${{ steps.get_token.outputs.access_token }}" })
            PackageId = "${{ github.event.inputs.package_id }}"
            Publisher = $publisher
            Version = $env:WINGET_VERSION
            InstallContext = "${{ github.event.inputs.install_context }}"
            UsePSADT = ("${{ github.event.inputs.use_psadt }}" -eq "true")
            DryRun = ("${{ github.event.inputs.dry_run }}" -eq "true")
            IntuneApiUrl = "$env:INTUNE_API_URL"
            PackageSource = $packageSourceLabel
            Architecture = $architecture
          }
          if ($env:APP_NAME) {
            $params.AppName = $env:APP_NAME
          }
          if ($env:APP_DESCRIPTION) {
            $params.AppDescription = $env:APP_DESCRIPTION
          } elseif ($env:WINGET_DESCRIPTION) {
            $params.AppDescription = $env:WINGET_DESCRIPTION
          }
          if ("${{ github.event.inputs.app_icon_base64 }}") {
            $params.AppIconBase64 = "${{ github.event.inputs.app_icon_base64 }}"
          }
          if ($env:STAGING_DIR) {
            $params.PackageFilesDirectory = $env:STAGING_DIR
          }
          if ($env:METADATA_PATH) {
            $params.InstallerMetadataPath = $env:METADATA_PATH
          }
          if ($mdDeveloper) { $params.Developer = $mdDeveloper }
          if ($mdOwner) { $params.Owner = $mdOwner }
          if ($mdInformationUrl) { $params.InformationUrl = $mdInformationUrl }
          if ($mdPrivacyUrl) { $params.PrivacyInformationUrl = $mdPrivacyUrl }
          if ($mdNotes) { $params.PackageNotes = $mdNotes }
          if ($mdRestartBehavior) { $params.RestartBehavior = $mdRestartBehavior }
          if ($mdReturnCodesJson) { $params.ReturnCodesJson = $mdReturnCodesJson }
          if ($mdCategoryIdsJson) { $params.CategoryIdsJson = $mdCategoryIdsJson }
          if ($mdCategoryNamesJson) { $params.CategoryNamesJson = $mdCategoryNamesJson }
          if ($mdRequirementRulesJson) { $params.RequirementRulesJson = $mdRequirementRulesJson }
          if ($mdMinimumSupportedOperatingSystemJson) { $params.MinimumSupportedOperatingSystemJson = $mdMinimumSupportedOperatingSystemJson }
          if ($mdMaxRunTimeInMinutes -gt 0) { $params.MaxRunTimeInMinutes = $mdMaxRunTimeInMinutes }
          ./scripts/winget/Create-IntuneApplication.ps1 @params
        shell: powershell

      - name: Apply assignment template
        if: ${{ github.event.inputs.dry_run != 'true' && github.event.inputs.assignment_json != '' }}
        env:
          ASSIGNMENT_JSON: ${{ github.event.inputs.assignment_json }}
        run: |
          ./scripts/common/Assign-IntuneMobileApp.ps1 -AccessToken "${{ steps.get_token.outputs.access_token }}" -AppId "${{ steps.create_app.outputs.app_id }}" -AssignmentJson $env:ASSIGNMENT_JSON -IntuneApiUrl "$env:INTUNE_API_URL"
        shell: pwsh

      - name: Create Update-Only Required companion app
        id: create_update_only_app
        if: ${{ github.event.inputs.dry_run != 'true' && github.event.inputs.update_only_b64 != '' }}
        shell: powershell
        env:
          UPDATE_ONLY_B64: ${{ github.event.inputs.update_only_b64 }}
          APP_NAME: ${{ github.event.inputs.app_name }}
          APP_DESCRIPTION: ${{ github.event.inputs.app_description }}
          APP_PUBLISHER: ${{ github.event.inputs.app_publisher }}
          WINGET_PUBLISHER: ${{ needs.validate_winget_app.outputs.app_publisher }}
          WINGET_DESCRIPTION: ${{ needs.validate_winget_app.outputs.app_description }}
          WINGET_VERSION: ${{ needs.validate_winget_app.outputs.app_version }}
        run: |
          $ErrorActionPreference = "Stop"
          $raw = $env:UPDATE_ONLY_B64
          if ($raw.Contains(",")) { $raw = $raw.Split(",", 2)[1] }
          [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String(($raw -replace '\s+', ''))) |
            Set-Content -Path "detection_script.ps1" -Encoding UTF8
          $baseName = $env:APP_NAME
          if (-not $baseName) { $baseName = "${{ steps.create_app.outputs.app_name }}" }
          if (-not $baseName) { $baseName = "${{ github.event.inputs.package_id }}" }
          $publisher = $env:APP_PUBLISHER
          if (-not $publisher) { $publisher = $env:WINGET_PUBLISHER }
          $architecture = "x64"
          $contextB64 = "${{ github.event.inputs.modern_dev_mgmt_context_b64 }}"
          if ($contextB64) {
            try {
              $rawContext = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String(($contextB64 -replace '\s+', '')))
              $context = $rawContext | ConvertFrom-Json
              if ($context.architecture) { $architecture = [string]$context.architecture }
              elseif ($context.package -and $context.package.architecture) { $architecture = [string]$context.package.architecture }
            } catch {
              Write-Warning "Could not parse Vanguard context architecture, using x64"
            }
          }
          $params = @{
            AccessToken = "${{ steps.get_token.outputs.access_token }}"
            PackageId = "${{ github.event.inputs.package_id }}"
            AppName = "$baseName (Update-Only)"
            Publisher = $publisher
            Version = $env:WINGET_VERSION
            InstallContext = "${{ github.event.inputs.install_context }}"
            UsePSADT = ("${{ github.event.inputs.use_psadt }}" -eq "true")
            DryRun = $false
            IntuneApiUrl = "$env:INTUNE_API_URL"
            PackageSource = "Winget update-only companion"
            PackageNotes = "Vanguard Update-Only Required companion. Primary Intune app: ${{ steps.create_app.outputs.app_id }}. Workflow: ${{ github.run_id }}."
            Architecture = $architecture
          }
          if ($env:APP_DESCRIPTION) {
            $params.AppDescription = "$($env:APP_DESCRIPTION) (Update-Only Required companion)"
          } elseif ($env:WINGET_DESCRIPTION) {
            $params.AppDescription = "$($env:WINGET_DESCRIPTION) (Update-Only Required companion)"
          }
          if ("${{ github.event.inputs.app_icon_base64 }}") {
            $params.AppIconBase64 = "${{ github.event.inputs.app_icon_base64 }}"
          }
          ./scripts/winget/Create-IntuneApplication.ps1 @params

      - name: Assign Update-Only companion to all devices
        if: ${{ github.event.inputs.dry_run != 'true' && steps.create_update_only_app.outputs.app_id != '' }}
        shell: pwsh
        run: |
          $assignment = @{
            mobileAppAssignments = @(
              @{
                '@odata.type' = '#microsoft.graph.mobileAppAssignment'
                intent = 'required'
                target = @{ '@odata.type' = '#microsoft.graph.allDevicesAssignmentTarget' }
                settings = @{
                  '@odata.type' = '#microsoft.graph.win32LobAppAssignmentSettings'
                  notifications = 'showAll'
                  restartSettings = $null
                  deliveryOptimizationPriority = 'notConfigured'
                }
              }
            )
          } | ConvertTo-Json -Depth 20
          ./scripts/common/Assign-IntuneMobileApp.ps1 -AccessToken "${{ steps.get_token.outputs.access_token }}" -AppId "${{ steps.create_update_only_app.outputs.app_id }}" -AssignmentJson $assignment -IntuneApiUrl "$env:INTUNE_API_URL"

      - name: Summary
        env:
          ASSIGNMENT_SUMMARY: ${{ github.event.inputs.assignment_summary }}
        run: |
          if ("${{ github.event.inputs.dry_run }}" -eq "true") {
            Write-Host "✅ Dry run completed. Scripts were generated but no Intune app was created."
            if ($env:ASSIGNMENT_SUMMARY) {
              Write-Host "Assignment plan: $env:ASSIGNMENT_SUMMARY"
            }
            exit 0
          }
          $success = "${{ steps.create_app.outputs.success }}"
          $appName = "${{ steps.create_app.outputs.app_name }}"
          $appId = "${{ steps.create_app.outputs.app_id }}"
          $packageId = "${{ github.event.inputs.package_id }}"

          if ($success -eq "true") {
            Write-Host "✅ Successfully deployed Winget application to Intune!"
            Write-Host "📱 App Name: $appName"
            Write-Host "🆔 App ID: $appId"
            Write-Host "📦 Package ID: $packageId"
            if ("${{ steps.create_update_only_app.outputs.app_id }}") {
              Write-Host "🔁 Update-Only companion App ID: ${{ steps.create_update_only_app.outputs.app_id }}"
            }
            Write-Host ""
            Write-Host "The application is now available in the Microsoft Intune admin center."
          } else {
            Write-Host "❌ Failed to deploy application to Intune."
            exit 1
          }
        shell: pwsh

      - name: Persist Vanguard run result
        if: ${{ github.event.inputs.dry_run != 'true' && steps.create_app.outputs.app_id != '' }}
        shell: pwsh
        env:
          MODERN_DEVMGMT_CONTEXT_B64: ${{ github.event.inputs.modern_dev_mgmt_context_b64 }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          git pull --rebase
          $runDir = ".modern-dev-mgmt/runs"
          New-Item -ItemType Directory -Force -Path $runDir | Out-Null
          $context = $null
          if ($env:MODERN_DEVMGMT_CONTEXT_B64) {
            try {
              $contextJson = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($env:MODERN_DEVMGMT_CONTEXT_B64))
              $context = $contextJson | ConvertFrom-Json
            } catch {
              Write-Warning "Could not decode Vanguard context: $($_.Exception.Message)"
            }
          }
          # Pull validation artifacts into the persisted run result so the
          # desktop UI can render the Robopack-style App Documentation page
          # (files added, registry values added, leftovers, install/uninstall
          # exit codes, raw logs).
          $validation = $null
          $validationReportPath = ".modern-dev-mgmt/validation/report.json"
          if (Test-Path -LiteralPath $validationReportPath) {
            try {
              $validation = Get-Content -LiteralPath $validationReportPath -Raw | ConvertFrom-Json
            } catch {
              Write-Warning "Could not parse validation report: $($_.Exception.Message)"
            }
          }
          # Capture last 200 lines of each transcript so the UI can show what
          # actually went wrong without forcing the user to download artifacts.
          function Get-LogTail([string]$Path, [int]$N = 200) {
            if (-not (Test-Path -LiteralPath $Path)) { return $null }
            try {
              $lines = Get-Content -LiteralPath $Path -Tail $N -ErrorAction Stop
              return ($lines -join [Environment]::NewLine)
            } catch { return $null }
          }
          if ($validation) {
            $validation | Add-Member -NotePropertyName installLogTail   -NotePropertyValue (Get-LogTail '.modern-dev-mgmt/validation/install.log')   -Force
            $validation | Add-Member -NotePropertyName uninstallLogTail -NotePropertyValue (Get-LogTail '.modern-dev-mgmt/validation/uninstall.log') -Force
          }
          $footprint = $null
          if (Test-Path -LiteralPath ".modern-dev-mgmt/validation/footprint.json") {
            try { $footprint = Get-Content -LiteralPath ".modern-dev-mgmt/validation/footprint.json" -Raw | ConvertFrom-Json } catch {}
          }
          $leftovers = $null
          if (Test-Path -LiteralPath ".modern-dev-mgmt/validation/leftovers.json") {
            try { $leftovers = Get-Content -LiteralPath ".modern-dev-mgmt/validation/leftovers.json" -Raw | ConvertFrom-Json } catch {}
          }
          # Pull installer manifest metadata too so the UI's App Documentation
          # tab can show real install/uninstall commands + product code.
          $installerMeta = $null
          if (Test-Path -LiteralPath "winget-installer-files/installer-metadata.json") {
            try {
              $installerMeta = Get-Content -LiteralPath "winget-installer-files/installer-metadata.json" -Raw | ConvertFrom-Json
            } catch {}
          }
          $result = [ordered]@{
            workflowRunId = "${{ github.run_id }}"
            workflow = "deploy-winget-app.yml"
            packageManager = "winget"
            packageId = "${{ github.event.inputs.package_id }}"
            appId = "${{ steps.create_app.outputs.app_id }}"
            updateOnlyAppId = "${{ steps.create_update_only_app.outputs.app_id }}"
            appName = "${{ steps.create_app.outputs.app_name }}"
            status = "success"
            createdAt = (Get-Date).ToUniversalTime().ToString("o")
            context = $context
            validation = $validation
            footprint = $footprint
            leftovers = $leftovers
            installer = $installerMeta
          }
          $resultJson = $result | ConvertTo-Json -Depth 12
          $resultJson | Set-Content -Path "$runDir/${{ github.run_id }}.json" -Encoding UTF8
          git add "$runDir/${{ github.run_id }}.json"
          if ($context -and $context.patchRunId) {
            $patchDir = ".modern-dev-mgmt/patch-runs"
            New-Item -ItemType Directory -Force -Path $patchDir | Out-Null
            $patchPath = "$patchDir/$($context.patchRunId).json"
            $resultJson | Set-Content -Path $patchPath -Encoding UTF8
            git add $patchPath
          }
          # ---- Per-app docs layout (mirrors app-docs-layout.ts) ----
          function _Slugify([string]$Value) {
            if ([string]::IsNullOrWhiteSpace($Value)) { return '_unknown' }
            $lower = $Value.ToLowerInvariant()
            $dashed = [System.Text.RegularExpressions.Regex]::Replace($lower, '[^a-z0-9]+', '-')
            $trimmed = $dashed.Trim('-')
            if ([string]::IsNullOrEmpty($trimmed)) { return '_unknown' }
            return $trimmed
          }
          function _NormalizeVersion([string]$Value) {
            if ([string]::IsNullOrWhiteSpace($Value)) { return 'unknown' }
            $cleaned = [System.Text.RegularExpressions.Regex]::Replace($Value.Trim(), '[^A-Za-z0-9._-]+', '-').Trim('-')
            if ([string]::IsNullOrEmpty($cleaned)) { return 'unknown' }
            return $cleaned
          }
          $slugCandidates = @(
            $result.packageId,
            $result.appName,
            $(if ($context) { $context.packageId } else { $null }),
            $(if ($context) { $context.appName } else { $null }),
            $(if ($installerMeta) { $installerMeta.fileName } else { $null })
          )
          $appSlug = '_unknown'
          foreach ($cand in $slugCandidates) {
            if ($cand) {
              $candidate = _Slugify ([string]$cand)
              if ($candidate -ne '_unknown') { $appSlug = $candidate; break }
            }
          }
          $versionCandidates = @(
            $(if ($installerMeta) { $installerMeta.version } else { $null }),
            $(if ($installerMeta) { $installerMeta.displayVersion } else { $null }),
            $(if ($context) { $context.targetVersion } else { $null }),
            $(if ($context) { $context.version } else { $null }),
            $result.version,
            $result.appVersion
          )
          $appVersion = 'unknown'
          foreach ($cand in $versionCandidates) {
            if ($cand) {
              $candidate = _NormalizeVersion ([string]$cand)
              if ($candidate -ne 'unknown') { $appVersion = $candidate; break }
            }
          }
          $runIdRaw = "${{ github.run_id }}"
          $safeRunId = [System.Text.RegularExpressions.Regex]::Replace($runIdRaw, '[^A-Za-z0-9._-]+', '')
          $appDir = ".modern-dev-mgmt/apps/$appSlug"
          $versionDir = "$appDir/$appVersion"
          $perRunDir = "$versionDir/$safeRunId"
          New-Item -ItemType Directory -Force -Path $perRunDir | Out-Null
          $resultJson | Set-Content -Path "$perRunDir/result.json" -Encoding UTF8
          foreach ($pair in @(
            @{ src = '.modern-dev-mgmt/validation/install.log';   dst = "$perRunDir/install.log" },
            @{ src = '.modern-dev-mgmt/validation/uninstall.log'; dst = "$perRunDir/uninstall.log" },
            @{ src = '.modern-dev-mgmt/validation/footprint.json';dst = "$perRunDir/footprint.json" },
            @{ src = '.modern-dev-mgmt/validation/leftovers.json';dst = "$perRunDir/leftovers.json" },
            @{ src = '.modern-dev-mgmt/validation/report.json';   dst = "$perRunDir/report.json" }
          )) {
            if (Test-Path -LiteralPath $pair.src) {
              Copy-Item -LiteralPath $pair.src -Destination $pair.dst -Force
            }
          }
          $createdAt = $result.createdAt
          $intuneAppId = $result.appId
          $catalogAppId = $null
          $patchRunId = $null
          if ($context) {
            if ($context.PSObject.Properties.Match('catalogAppId').Count -gt 0) { $catalogAppId = $context.catalogAppId }
            if ($context.PSObject.Properties.Match('patchRunId').Count -gt 0) { $patchRunId = $context.patchRunId }
          }
          $latestPointer = [ordered]@{
            workflowRunId = $safeRunId
            createdAt     = $createdAt
            intuneAppId   = $intuneAppId
            catalogAppId  = $catalogAppId
          }
          ($latestPointer | ConvertTo-Json -Depth 4) | Set-Content -Path "$versionDir/latest.json" -Encoding UTF8
          $displayName = $result.appName
          $indexPath = "$appDir/index.json"
          $index = $null
          if (Test-Path -LiteralPath $indexPath) {
            try { $index = Get-Content -LiteralPath $indexPath -Raw | ConvertFrom-Json } catch { $index = $null }
          }
          $indexVersions = @()
          if ($index -and $index.versions) {
            foreach ($v in $index.versions) {
              $runsCopy = @()
              if ($v.runs) {
                foreach ($r in $v.runs) {
                  $runsCopy += [ordered]@{
                    workflowRunId = [string]$r.workflowRunId
                    createdAt     = $r.createdAt
                    intuneAppId   = $r.intuneAppId
                    catalogAppId  = $r.catalogAppId
                    patchRunId    = $r.patchRunId
                    status        = $r.status
                  }
                }
              }
              $indexVersions += [ordered]@{ version = [string]$v.version; runs = $runsCopy }
            }
          }
          $newRunEntry = [ordered]@{
            workflowRunId = $safeRunId
            createdAt     = $createdAt
            intuneAppId   = $intuneAppId
            catalogAppId  = $catalogAppId
            patchRunId    = $patchRunId
            status        = $result.status
          }
          $found = $false
          for ($i = 0; $i -lt $indexVersions.Count; $i++) {
            if ($indexVersions[$i].version -eq $appVersion) {
              $found = $true
              $filteredRuns = @()
              foreach ($r in $indexVersions[$i].runs) {
                if ([string]$r.workflowRunId -ne $safeRunId) { $filteredRuns += $r }
              }
              $filteredRuns += $newRunEntry
              $indexVersions[$i].runs = $filteredRuns
              break
            }
          }
          if (-not $found) {
            $indexVersions += [ordered]@{ version = $appVersion; runs = @($newRunEntry) }
          }
          # Sort versions by their newest run's createdAt (desc); fall back to version name desc.
          $sortedVersions = $indexVersions | Sort-Object @{ Expression = {
            $maxCreated = ''
            foreach ($r in $_.runs) {
              if ($r.createdAt -and ([string]$r.createdAt) -gt $maxCreated) { $maxCreated = [string]$r.createdAt }
            }
            $maxCreated
          }; Descending = $true }, @{ Expression = { $_.version }; Descending = $true }
          $indexOut = [ordered]@{
            slug        = $appSlug
            displayName = $displayName
            versions    = @($sortedVersions)
            updatedAt   = (Get-Date).ToUniversalTime().ToString('o')
          }
          ($indexOut | ConvertTo-Json -Depth 10) | Set-Content -Path $indexPath -Encoding UTF8
          git add $appDir
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "chore: record Vanguard run ${{ github.run_id }} (per-app docs)"
            git pull --rebase origin "${{ github.ref_name }}"
            git push
          } else {
            Write-Host "no changes"
          }