name: Deploy Homebrew App to Intune

on:
  workflow_dispatch:
    inputs:
      package_id:
        description: 'Homebrew Cask token (e.g., google-chrome)'
        required: true
        type: string
      package_name:
        description: 'Package display name (optional compatibility input)'
        required: false
        type: string
      version:
        description: 'Requested version or latest'
        required: false
        type: string
      dry_run:
        description: 'Plan only; do not create the Intune app'
        required: false
        type: boolean
        default: false
      app_name:
        description: 'Display name in Intune (optional)'
        required: false
        type: string
      app_description:
        description: 'Description in Intune (optional)'
        required: false
        type: string
      app_publisher:
        description: 'Publisher in Intune (optional)'
        required: false
        type: string
      app_icon_base64:
        description: 'Base64 encoded icon (optional)'
        required: false
        type: string
      pre_install_script_b64:
        description: 'Base64 encoded pre-install script (optional)'
        required: false
        type: string
      post_install_script_b64:
        description: 'Base64 encoded post-install script (optional)'
        required: false
        type: string
      assignment_json:
        description: 'JSON mobileAppAssignments payload generated by Modern Dev Mgmt'
        required: false
        type: string
      assignment_summary:
        description: 'Human-readable assignment plan summary'
        required: false
        type: string
      modern_dev_mgmt_context_b64:
        description: 'Base64 encoded Modern Dev Mgmt run context'
        required: false
        type: string

env:
  AZURE_TENANT_ID: 'f849cde7-f11d-4ef5-a31d-7fca98b21bf5'
  AZURE_CLIENT_ID: '7659f226-8344-4731-b758-a4d93238309c'
  INTUNE_TENANT_ID: 'f849cde7-f11d-4ef5-a31d-7fca98b21bf5'
  INTUNE_CLIENT_ID: '7659f226-8344-4731-b758-a4d93238309c'

jobs:
  deploy-homebrew-app:
    runs-on: macos-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Azure Login using OIDC
        uses: azure/login@v3
        with:
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          client-id: ${{ env.AZURE_CLIENT_ID }}
          allow-no-subscriptions: true

      - name: Acquire Microsoft Graph token
        id: graph_token
        shell: bash
        run: |
          set -euo pipefail
          token=$(az account get-access-token --resource https://graph.microsoft.com/ --query accessToken -o tsv)
          if [[ -z "$token" ]]; then
            echo "::error::Failed to acquire Microsoft Graph access token"
            exit 1
          fi
          echo "::add-mask::$token"
          echo "INTUNE_ACCESS_TOKEN=$token" >> "$GITHUB_ENV"

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade pycryptodome

      - name: Ensure packaging tool is executable
        run: chmod +x tools/intune_packager.py

      - name: Prepare Homebrew environment
        shell: bash
        run: |
          set -euo pipefail
          export HOMEBREW_NO_AUTO_UPDATE=1
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            brew --version
            echo "Dry run: skipping brew update, brew doctor, and footprint installation."
            exit 0
          fi
          # Clean up unnecessary local taps to avoid warnings
          brew untap homebrew/cask 2>/dev/null || true
          brew untap homebrew/core 2>/dev/null || true
          brew update || true
          brew doctor || true

      - name: Generate App Footprint Report
        if: ${{ github.event.inputs.dry_run != 'true' }}
        timeout-minutes: 20
        shell: bash
        run: |
          set -euo pipefail
          echo "📊 Generating app footprint analysis..."
          python3 tools/analyze_app_footprint.py \
            --cask "${{ github.event.inputs.package_id }}" \
            --output "output/${{ github.event.inputs.package_id }}_footprint_report.txt" || true

          if [ -f "output/${{ github.event.inputs.package_id }}_footprint_report.txt" ]; then
            echo "✅ Footprint report generated successfully"
            cat "output/${{ github.event.inputs.package_id }}_footprint_report.txt"
          else
            echo "⚠️  Footprint report generation failed, continuing with packaging..."
          fi

      - name: Convert Footprint Report to PDF
        if: ${{ github.event.inputs.dry_run != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "output/${{ github.event.inputs.package_id }}_footprint_report.txt" ]; then
            echo "📄 Converting footprint report to PDF..."
            /usr/sbin/cupsfilter "output/${{ github.event.inputs.package_id }}_footprint_report.txt" > "output/${{ github.event.inputs.package_id }}_footprint_report.pdf" 2>&1 | grep -v "^DEBUG:" || true
            if [ -f "output/${{ github.event.inputs.package_id }}_footprint_report.pdf" ]; then
              echo "✅ PDF report generated successfully"
              ls -lh "output/${{ github.event.inputs.package_id }}_footprint_report.pdf"
            else
              echo "⚠️  PDF generation failed, text report still available"
            fi
          else
            echo "⚠️  Skipping PDF generation - text report not available"
          fi

      - name: Validate Homebrew cask metadata
        if: ${{ github.event.inputs.dry_run == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          export HOMEBREW_NO_AUTO_UPDATE=1
          brew info --cask --json=v2 "${{ github.event.inputs.package_id }}" | python3 -c "import json,sys; data=json.load(sys.stdin); casks=data.get('casks') or []; sys.exit('No Homebrew cask metadata returned') if not casks else print('Validated cask:', casks[0].get('token') or casks[0].get('full_token') or '${{ github.event.inputs.package_id }}')"

      - name: Package and upload to Intune
        id: package_upload
        if: ${{ github.event.inputs.dry_run != 'true' }}
        shell: bash
        env:
          INTUNE_TENANT_ID: '${{ env.INTUNE_TENANT_ID }}'
          INTUNE_CLIENT_ID: '${{ env.INTUNE_CLIENT_ID }}'
          INTUNE_ACCESS_TOKEN: '${{ env.INTUNE_ACCESS_TOKEN }}'
          INTUNE_CLIENT_SECRET: '${{ secrets.INTUNE_CLIENT_SECRET }}'
          PACKAGE_ID: '${{ github.event.inputs.package_id }}'
          APP_NAME: '${{ github.event.inputs.app_name }}'
          APP_DESCRIPTION: '${{ github.event.inputs.app_description }}'
          APP_PUBLISHER: '${{ github.event.inputs.app_publisher }}'
          APP_ICON_BASE64: '${{ github.event.inputs.app_icon_base64 }}'
          PRE_INSTALL_SCRIPT_B64: '${{ github.event.inputs.pre_install_script_b64 }}'
          POST_INSTALL_SCRIPT_B64: '${{ github.event.inputs.post_install_script_b64 }}'
        run: |
          set -euo pipefail
          if [[ -z "${INTUNE_ACCESS_TOKEN:-}" && -z "${INTUNE_CLIENT_SECRET:-}" ]]; then
            echo "::error::Failed to locate Microsoft Graph token. Ensure Azure login succeeded or configure INTUNE_CLIENT_SECRET." >&2
            exit 1
          fi
          mkdir -p output
          ARGS=(--cask "$PACKAGE_ID" --output-dir output)
          if [[ -n "$APP_NAME" ]]; then
            ARGS+=(--display-name "$APP_NAME")
          fi
          if [[ -n "$APP_DESCRIPTION" ]]; then
            ARGS+=(--description "$APP_DESCRIPTION")
          fi
          if [[ -n "$APP_PUBLISHER" ]]; then
            ARGS+=(--publisher "$APP_PUBLISHER")
          fi
          if [[ -n "$PRE_INSTALL_SCRIPT_B64" ]]; then
            ARGS+=(--pre-install-script-b64 "$PRE_INSTALL_SCRIPT_B64")
          fi
          if [[ -n "$POST_INSTALL_SCRIPT_B64" ]]; then
            ARGS+=(--post-install-script-b64 "$POST_INSTALL_SCRIPT_B64")
          fi
          ICON_FILE_PATH=""
          if [[ -n "$APP_ICON_BASE64" ]]; then
            ICON_FILE_PATH="output/app_icon.png"
            export APP_ICON_BASE64 ICON_FILE_PATH
            python3 -c "import base64, os, pathlib, sys; raw = os.environ.get('APP_ICON_BASE64', ''); raw = raw.split(',', 1)[1] if raw.startswith('data:') else raw.strip(); sys.exit('App icon base64 data is empty') if not raw else None; path = pathlib.Path(os.environ['ICON_FILE_PATH']); path.parent.mkdir(parents=True, exist_ok=True); path.write_bytes(base64.b64decode(raw))"
            ARGS+=(--icon-file "$ICON_FILE_PATH")
          fi
          python3 tools/intune_packager.py "${ARGS[@]}"

      - name: Dry run summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        shell: bash
        env:
          ASSIGNMENT_SUMMARY: ${{ github.event.inputs.assignment_summary }}
        run: |
          echo "✅ Dry run completed. Package metadata and assignment plan were validated."
          if [[ -n "${ASSIGNMENT_SUMMARY:-}" ]]; then
            echo "Assignment plan: $ASSIGNMENT_SUMMARY"
          fi

      - name: Apply assignment template
        if: ${{ github.event.inputs.dry_run != 'true' && github.event.inputs.assignment_json != '' }}
        shell: pwsh
        env:
          ASSIGNMENT_JSON: ${{ github.event.inputs.assignment_json }}
        run: |
          ./scripts/common/Assign-IntuneMobileApp.ps1 -AccessToken "$env:INTUNE_ACCESS_TOKEN" -AppId "${{ steps.package_upload.outputs.app_id }}" -AssignmentJson $env:ASSIGNMENT_JSON -IntuneApiUrl "https://graph.microsoft.com/v1.0"

      - name: Upload Footprint Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ${{ github.event.inputs.package_id }}-footprint-report
          path: |
            output/*_footprint_report.txt
            output/*_footprint_report.pdf
          if-no-files-found: ignore

      - name: Persist Modern Dev Mgmt run result
        if: ${{ github.event.inputs.dry_run != 'true' && steps.package_upload.outputs.app_id != '' }}
        shell: bash
        env:
          APP_ID: ${{ steps.package_upload.outputs.app_id }}
          APP_NAME: ${{ github.event.inputs.app_name }}
          PACKAGE_ID: ${{ github.event.inputs.package_id }}
          MODERN_DEVMGMT_CONTEXT_B64: ${{ github.event.inputs.modern_dev_mgmt_context_b64 }}
        run: |
          set -euo pipefail
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          git pull --rebase
          mkdir -p .modern-dev-mgmt/runs
          node - <<'NODE'
          const fs = require('fs');
          const runId = process.env.GITHUB_RUN_ID;
          let context = null;
          if (process.env.MODERN_DEVMGMT_CONTEXT_B64) {
            try {
              context = JSON.parse(Buffer.from(process.env.MODERN_DEVMGMT_CONTEXT_B64, 'base64').toString('utf8'));
            } catch (error) {
              console.warn('Could not decode Modern Dev Mgmt context:', error.message);
            }
          }
          const result = {
            workflowRunId: runId,
            workflow: 'deploy-homebrew-app.yml',
            packageManager: 'homebrew',
            packageId: process.env.PACKAGE_ID || null,
            appId: process.env.APP_ID || null,
            appName: process.env.APP_NAME || process.env.PACKAGE_ID || null,
            status: 'success',
            createdAt: new Date().toISOString(),
            context,
          };
          fs.writeFileSync(`.modern-dev-mgmt/runs/${runId}.json`, JSON.stringify(result, null, 2));
          if (context && context.patchRunId) {
            fs.mkdirSync('.modern-dev-mgmt/patch-runs', { recursive: true });
            fs.writeFileSync(`.modern-dev-mgmt/patch-runs/${context.patchRunId}.json`, JSON.stringify(result, null, 2));
          }
          NODE
          git add ".modern-dev-mgmt/runs/${GITHUB_RUN_ID}.json" .modern-dev-mgmt/patch-runs || true
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "chore: record Modern Dev Mgmt run ${GITHUB_RUN_ID}"
            git pull --rebase origin "${GITHUB_REF_NAME:-main}"
            git push
          fi

      - name: Summary
        run: |
          echo "✅ Homebrew package ${{ github.event.inputs.package_id }} deployed to Intune." >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ github.event.inputs.app_name }}" ]; then
            echo "📱 App Name: ${{ github.event.inputs.app_name }}" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f "output/${{ github.event.inputs.package_id }}_footprint_report.txt" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## 📊 App Footprint Report" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            head -n 50 "output/${{ github.event.inputs.package_id }}_footprint_report.txt" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📥 Download the full report from the workflow artifacts:" >> $GITHUB_STEP_SUMMARY
            if [ -f "output/${{ github.event.inputs.package_id }}_footprint_report.pdf" ]; then
              echo "- 📄 PDF version available" >> $GITHUB_STEP_SUMMARY
            fi
            echo "- 📝 Text version available" >> $GITHUB_STEP_SUMMARY
          fi
