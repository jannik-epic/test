name: Deploy Custom Installer to Intune
run-name: "Vanguard · ${{ inputs.package_id }} · ${{ inputs.app_version }} · ${{ inputs.dispatch_correlation_id }}"

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'GitHub release tag containing the uploaded installer'
        required: true
        type: string
      asset_name:
        description: 'Release asset filename to package'
        required: true
        type: string
      package_id:
        description: 'Vanguard custom package id'
        required: true
        type: string
      package_name:
        description: 'Display name in Intune'
        required: true
        type: string
      app_description:
        description: 'Description in Intune'
        required: false
        type: string
      app_publisher:
        description: 'Publisher in Intune'
        required: false
        type: string
      app_version:
        description: 'Application version'
        required: false
        type: string
      app_icon_base64:
        description: 'Base64 encoded app icon (optional)'
        required: false
        type: string
      installer_engine:
        description: 'Installer engine'
        required: true
        default: 'exe'
        type: choice
        options:
          - exe
          - msi
      install_args:
        description: 'Silent install arguments used when no install script override is supplied'
        required: false
        type: string
      uninstall_args:
        description: 'Silent uninstall arguments used when no uninstall script override is supplied'
        required: false
        type: string
      dispatch_correlation_id:
        description: 'Unique Vanguard dispatch correlation id'
        required: false
        type: string
      install_context:
        description: 'Installation context'
        required: true
        type: choice
        default: 'system'
        options:
          - system
          - user
      dry_run:
        description: 'Build package only; do not create Intune app'
        required: false
        type: boolean
        default: false
      install_script_b64:
        description: 'Base64 encoded PowerShell install script override'
        required: false
        type: string
      uninstall_script_b64:
        description: 'Base64 encoded PowerShell uninstall script override'
        required: false
        type: string
      detection_script_b64:
        description: 'Base64 encoded PowerShell detection script override'
        required: false
        type: string
      pre_install_script_b64:
        description: 'Base64 encoded pre-install script appended to generated install script'
        required: false
        type: string
      post_install_script_b64:
        description: 'Base64 encoded post-install script appended to generated install script'
        required: false
        type: string
      assignment_json:
        description: 'JSON mobileAppAssignments payload generated by Vanguard'
        required: false
        type: string
      assignment_summary:
        description: 'Human-readable assignment plan summary'
        required: false
        type: string
      use_psadt:
        description: 'Wrap the final package in PSAppDeployToolkit v4'
        required: false
        type: boolean
        default: true
      signing_cert_thumbprint:
        description: 'SHA-1 thumbprint of the tenant signing certificate to use (matches a SIGNING_CERT_PFX_BASE64 secret)'
        required: false
        type: string
      modern_dev_mgmt_context_b64:
        description: 'Base64 encoded Vanguard run context'
        required: false
        type: string
      update_only_b64:
        # Dual-app pattern: when present, a SECOND
        # Intune mobileApp must be created from the same installer with this
        # script as its custom detection rule, intent=required, scope=all
        # devices, display name suffixed with "(Update-Only)". The script
        # reports detected for absent or current installs and not-detected only
        # for outdated installs, so the required companion remediates outdated
        # devices without clean-installing.
        description: 'Base64 encoded PowerShell detection script for the Update-Only Required companion app'
        required: false
        type: string
env:
  AZURE_TENANT_ID: 'f849cde7-f11d-4ef5-a31d-7fca98b21bf5'
  AZURE_CLIENT_ID: 'a34f2806-b6f7-4d11-98f6-b32894396ca8'
  INTUNE_API_URL: 'https://graph.microsoft.com/v1.0'

permissions:
  contents: read

# Requires tenant app-registration application permissions:
# Group.ReadWrite.All and Directory.Read.All

jobs:
  validate-custom-installer:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      # Backup snapshots in this repo can exceed Windows MAX_PATH — enable
      # long paths so checkout does not fail with "Filename too long".
      - name: Enable Git long paths
        shell: pwsh
        run: git config --system core.longpaths true

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Resolve target Azure tenant from Vanguard context
        shell: bash
        env:
          MODERN_DEVMGMT_CONTEXT_B64: ${{ github.event.inputs.modern_dev_mgmt_context_b64 }}
        run: |
          # The desktop app's catalog deploy passes targetAzureTenantId +
          # targetAzureClientId inside the b64-encoded context blob. When two
          # tenants share the same GitHub repo this is the only mechanism that
          # routes OIDC to the right Azure tenant per dispatch — the YAML env
          # defaults are baked at provisioning time and can only point at one
          # tenant.
          if [[ -z "${MODERN_DEVMGMT_CONTEXT_B64:-}" ]]; then
            echo "no Vanguard context — keeping default AZURE_TENANT_ID/CLIENT_ID"
            exit 0
          fi
          decoded="$(printf '%s' "$MODERN_DEVMGMT_CONTEXT_B64" | base64 --decode 2>/dev/null || true)"
          if [[ -z "$decoded" ]]; then
            echo "::warning::could not base64-decode modern_dev_mgmt_context_b64; using YAML defaults"
            exit 0
          fi
          tenant="$(printf '%s' "$decoded" | jq -r '.targetAzureTenantId // ""' 2>/dev/null || true)"
          client="$(printf '%s' "$decoded" | jq -r '.targetAzureClientId // ""' 2>/dev/null || true)"
          if [[ -n "$tenant" ]]; then
            # Mask the tenant id for the rest of the job so it never appears in
            # the clear in workflow logs (trust-by-design; logs may be exported).
            echo "::add-mask::$tenant"
            echo "AZURE_TENANT_ID=$tenant" >> "$GITHUB_ENV"
            echo "INTUNE_TENANT_ID=$tenant" >> "$GITHUB_ENV"
            echo "resolved AZURE_TENANT_ID=$tenant"
          fi
          if [[ -n "$client" ]]; then
            echo "AZURE_CLIENT_ID=$client" >> "$GITHUB_ENV"
            echo "INTUNE_CLIENT_ID=$client" >> "$GITHUB_ENV"
            echo "resolved AZURE_CLIENT_ID=$client"
          fi

      - name: Download uploaded installer asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assetDir = "custom-files"
          New-Item -ItemType Directory -Force -Path $assetDir | Out-Null
          gh release download "${{ github.event.inputs.release_tag }}" --repo "${{ github.repository }}" --pattern "${{ github.event.inputs.asset_name }}" --dir $assetDir --clobber
          $assetPath = Join-Path $assetDir "${{ github.event.inputs.asset_name }}"
          if (-not (Test-Path -LiteralPath $assetPath -PathType Leaf)) {
            throw "Installer asset was not downloaded: $assetPath"
          }
          Write-Host "Downloaded installer asset: $assetPath"

      - name: Materialize app setting files
        id: materialize_files
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          MODERN_DEVMGMT_CONTEXT_B64: ${{ github.event.inputs.modern_dev_mgmt_context_b64 }}
        run: |
          $ErrorActionPreference = 'Stop'
          $assetDir = "custom-files"
          New-Item -ItemType Directory -Force -Path $assetDir | Out-Null
          $resolvedMstNames = @()
          if ($env:MODERN_DEVMGMT_CONTEXT_B64) {
            $context = ([Text.Encoding]::UTF8.GetString([Convert]::FromBase64String(($env:MODERN_DEVMGMT_CONTEXT_B64 -replace '\s+', '')))) | ConvertFrom-Json
            $releaseFiles = $context.appSettingFilesRelease
            if ($releaseFiles -and $releaseFiles.releaseTag) {
              foreach ($assetName in @($releaseFiles.assetNames)) {
                gh release download ([string]$releaseFiles.releaseTag) --repo "${{ github.repository }}" --pattern ([string]$assetName) --dir $assetDir --clobber
                $assetPath = Join-Path $assetDir ([string]$assetName)
                if (-not (Test-Path -LiteralPath $assetPath -PathType Leaf)) { throw "App-setting asset was not downloaded: $assetName" }
              }
              $resolvedMstNames += @($releaseFiles.mstAssetNames | ForEach-Object { [IO.Path]::GetFileName([string]$_) } | Where-Object { $_ })
            }
          }
          if ($resolvedMstNames.Count -gt 0) {
            Add-Content -Path $env:GITHUB_OUTPUT -Value "mst_filenames=$($resolvedMstNames -join ';')"
          }

      - name: Generate custom installer scripts
        shell: pwsh
        env:
          INSTALL_SCRIPT_B64: ${{ github.event.inputs.install_script_b64 }}
          UNINSTALL_SCRIPT_B64: ${{ github.event.inputs.uninstall_script_b64 }}
          DETECTION_SCRIPT_B64: ${{ github.event.inputs.detection_script_b64 }}
          PRE_INSTALL_SCRIPT_B64: ${{ github.event.inputs.pre_install_script_b64 }}
          POST_INSTALL_SCRIPT_B64: ${{ github.event.inputs.post_install_script_b64 }}
          INPUT_ASSET_NAME: ${{ github.event.inputs.asset_name }}
          INPUT_INSTALLER_ENGINE: ${{ github.event.inputs.installer_engine }}
          INPUT_INSTALL_ARGS: ${{ github.event.inputs.install_args }}
          INPUT_UNINSTALL_ARGS: ${{ github.event.inputs.uninstall_args }}
          INPUT_APP_NAME: ${{ github.event.inputs.package_name }}
          INPUT_APP_VERSION: ${{ github.event.inputs.app_version }}
        run: |
          function Decode-B64Utf8([string]$value) {
            if ([string]::IsNullOrWhiteSpace($value)) { return $null }
            $raw = $value.Trim()
            if ($raw.Contains(",")) { $raw = $raw.Split(",", 2)[1] }
            return [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($raw))
          }
          function Escape-Single([string]$value) {
            return $value.Replace("'", "''")
          }

          $assetName = $env:INPUT_ASSET_NAME
          $engine = $env:INPUT_INSTALLER_ENGINE
          $installArgs = $env:INPUT_INSTALL_ARGS
          $uninstallArgs = $env:INPUT_UNINSTALL_ARGS
          $productCode = ''
          $appName = $env:INPUT_APP_NAME
          $version = $env:INPUT_APP_VERSION
          $pre = Decode-B64Utf8 $env:PRE_INSTALL_SCRIPT_B64
          $post = Decode-B64Utf8 $env:POST_INSTALL_SCRIPT_B64

          # If the MST materialization step published an mst_filename and we are
          # installing an MSI silently, append TRANSFORMS="<file>" so msiexec
          # picks up the transform from the same package directory.
          $mstFiles = "${{ steps.materialize_files.outputs.mst_filenames }}"
          if ($mstFiles -and $engine -eq 'msi' -and $installArgs -notmatch '(?i)\bTRANSFORMS\s*=') {
            $installArgs = ($installArgs.Trim() + ' TRANSFORMS="' + $mstFiles + '"').Trim()
            Write-Host "Appended TRANSFORMS=$mstFiles to install_args"
          }

          $installOverride = Decode-B64Utf8 $env:INSTALL_SCRIPT_B64
          if ($installOverride) {
            $installOverride | Set-Content -Path "install_script.ps1" -Encoding UTF8
          } else {
            $escapedAsset = Escape-Single $assetName
            $escapedArgs = Escape-Single $installArgs
            $escapedEngine = Escape-Single $engine
            @"
          # vanguard:default-logic (install)
          `$ErrorActionPreference = 'Stop'
          `$installerPath = Join-Path `$PSScriptRoot '$escapedAsset'
          if (-not (Test-Path -LiteralPath `$installerPath -PathType Leaf)) { throw "Installer not found: `$installerPath" }
          $pre
          if ('$escapedEngine' -eq 'msi') {
            `$arguments = ('/i "{0}" {1}' -f `$installerPath, '$escapedArgs').Trim()
            `$process = Start-Process -FilePath 'msiexec.exe' -ArgumentList `$arguments -Wait -PassThru -WindowStyle Hidden
          } else {
            `$process = Start-Process -FilePath `$installerPath -ArgumentList '$escapedArgs' -Wait -PassThru -WindowStyle Hidden
          }
          if (`$process.ExitCode -ne 0) { throw "Installer exited with code `$(`$process.ExitCode)" }
          $post
          "@ | Set-Content -Path "install_script.ps1" -Encoding UTF8
          }

          $uninstallOverride = Decode-B64Utf8 $env:UNINSTALL_SCRIPT_B64
          if ($uninstallOverride) {
            $uninstallOverride | Set-Content -Path "uninstall_script.ps1" -Encoding UTF8
          } else {
            $escapedAsset = Escape-Single $assetName
            $escapedArgs = Escape-Single $uninstallArgs
            $escapedEngine = Escape-Single $engine
            $escapedProductCode = Escape-Single $productCode
            @"
          # vanguard:default-logic (uninstall)
          `$ErrorActionPreference = 'Stop'
          `$installerPath = Join-Path `$PSScriptRoot '$escapedAsset'
          if ('$escapedEngine' -eq 'msi') {
            `$msiTarget = if ('$escapedProductCode') { '$escapedProductCode' } else { '"' + `$installerPath + '"' }
            if (-not '$escapedProductCode' -and -not (Test-Path -LiteralPath `$installerPath -PathType Leaf)) {
              throw "MSI package not found for uninstall: `$installerPath"
            }
            `$arguments = ("/x {0} {1}" -f `$msiTarget, '$escapedArgs').Trim()
            `$process = Start-Process -FilePath 'msiexec.exe' -ArgumentList `$arguments -Wait -PassThru -WindowStyle Hidden
            exit `$process.ExitCode
          }
          if (-not (Test-Path -LiteralPath `$installerPath -PathType Leaf)) {
            Write-Warning "Installer not found for uninstall fallback: `$installerPath"
            exit 0
          }
          `$process = Start-Process -FilePath `$installerPath -ArgumentList '$escapedArgs' -Wait -PassThru -WindowStyle Hidden
          exit `$process.ExitCode
          "@ | Set-Content -Path "uninstall_script.ps1" -Encoding UTF8
          }

          $detectionOverride = Decode-B64Utf8 $env:DETECTION_SCRIPT_B64
          if ($detectionOverride) {
            $detectionOverride | Set-Content -Path "detection_script.ps1" -Encoding UTF8
          } else {
            $escapedAppName = Escape-Single $appName
            $escapedVersion = Escape-Single $version
            @"
          `$ErrorActionPreference = 'SilentlyContinue'
          `$names = @('$escapedAppName') | Where-Object { -not [string]::IsNullOrWhiteSpace(`$_) }
          `$keys = @(
            'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*',
            'HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\*',
            'HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*'
          )
          foreach (`$key in `$keys) {
            foreach (`$app in Get-ItemProperty -Path `$key) {
              foreach (`$name in `$names) {
                if (`$app.DisplayName -like "*`$name*") {
                  if ('$escapedVersion' -and `$app.DisplayVersion -and `$app.DisplayVersion -ne '$escapedVersion') {
                    continue
                  }
                  Write-Output "Detected `$(`$app.DisplayName)"
                  exit 0
                }
              }
            }
          }
          exit 1
          "@ | Set-Content -Path "detection_script.ps1" -Encoding UTF8
          }

      - name: Harden installer logic (engine heuristic)
        shell: pwsh
        env:
          INPUT_INSTALL_ARGS: ${{ github.event.inputs.install_args }}
          INPUT_ASSET_NAME: ${{ github.event.inputs.asset_name }}
          INPUT_APP_NAME: ${{ github.event.inputs.package_name }}
          INPUT_APP_PUBLISHER: ${{ github.event.inputs.app_publisher }}
          INPUT_INSTALLER_ENGINE: ${{ github.event.inputs.installer_engine }}
        run: |
          $ErrorActionPreference = 'Continue'
          $assetPath = Join-Path 'custom-files' $env:INPUT_ASSET_NAME
          try {
            ./scripts/common/New-InstallLogicHeuristic.ps1 `
              -InstallerPath $assetPath `
              -AppName $env:INPUT_APP_NAME `
              -Publisher $env:INPUT_APP_PUBLISHER `
              -InstallScriptPath ./install_script.ps1 `
              -UninstallScriptPath ./uninstall_script.ps1 `
              -InstallArgs $env:INPUT_INSTALL_ARGS `
              -Engine $env:INPUT_INSTALLER_ENGINE
          } catch {
            Write-Host "::warning::Installer heuristic failed: $($_.Exception.Message)"
          }

      - name: Wrap package in PSADT v4
        id: wrap_psadt
        if: ${{ github.event.inputs.use_psadt != 'false' }}
        shell: pwsh
        env:
          INPUT_APP_NAME: ${{ github.event.inputs.package_name }}
          INPUT_APP_PUBLISHER: ${{ github.event.inputs.app_publisher }}
          INPUT_APP_VERSION: ${{ github.event.inputs.app_version }}
          MODERN_DEVMGMT_CONTEXT_B64: ${{ github.event.inputs.modern_dev_mgmt_context_b64 }}
        run: |
          $ErrorActionPreference = 'Continue'
          try {
            $wrapParams = @{
              AppName = $env:INPUT_APP_NAME
              Publisher = $env:INPUT_APP_PUBLISHER
              Version = $env:INPUT_APP_VERSION
              PackageRoot = 'custom-files'
              InstallScriptPath = './install_script.ps1'
              UninstallScriptPath = './uninstall_script.ps1'
            }
            $contextB64 = $env:MODERN_DEVMGMT_CONTEXT_B64
            if ($contextB64) {
              try {
                $context = ([Text.Encoding]::UTF8.GetString([Convert]::FromBase64String(($contextB64 -replace '\s+', '')))) | ConvertFrom-Json
                $ix = $context.installExperience
                if ($ix) {
                  if ($null -ne $ix.conflictingProcesses) { $wrapParams.ConflictingProcessesJson = $ix.conflictingProcesses | ConvertTo-Json -Depth 10 -Compress }
                  if ($ix.deferral -and $ix.deferral.allowed) {
                    $wrapParams.AllowDeferral = $true
                    if ($null -ne $ix.deferral.maxDeferrals) { $wrapParams.MaxDeferrals = [int]$ix.deferral.maxDeferrals }
                    if ($null -ne $ix.deferral.deadlineHours) { $wrapParams.DeferralDeadlineHours = [int]$ix.deferral.deadlineHours }
                  }
                }
              } catch {
                throw "Install-experience context is invalid: $($_.Exception.Message)"
              }
            }
            ./scripts/common/New-PsadtV4Package.ps1 @wrapParams
          } catch {
            Write-Error "PSADT v4 wrap failed: $($_.Exception.Message)"
            throw
          }

      # Freeze the candidate before any untrusted installer code executes.
      # The validation run may mutate its VM, but it cannot alter the immutable
      # artifact later consumed by the fresh credentialed deployment runner.
      - name: Stage immutable deployment candidate
        uses: actions/upload-artifact@v7
        with:
          name: deployment-input-${{ github.run_id }}
          path: |
            custom-files/
            install_script.ps1
            uninstall_script.ps1
            detection_script.ps1
          if-no-files-found: error
          retention-days: 1

      - name: VM validation — baseline snapshot
        id: validate_baseline
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .modern-dev-mgmt/validation | Out-Null
          ./scripts/common/Capture-WindowsFootprint.ps1 -OutputPath .modern-dev-mgmt/validation/before.json -Mode arp

      - name: VM validation — install (custom package)
        id: validate_install
        shell: pwsh
        continue-on-error: true
        env:
          ACTIONS_ID_TOKEN_REQUEST_URL: ''
          ACTIONS_ID_TOKEN_REQUEST_TOKEN: ''
          GITHUB_TOKEN: ''
          GH_TOKEN: ''
        run: |
          $ErrorActionPreference = 'Continue'
          $workspace = $PWD.Path
          $stageDir = Join-Path $workspace 'validation-stage'
          $validationDir = Join-Path $workspace '.modern-dev-mgmt/validation'
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null
          New-Item -ItemType Directory -Force -Path $validationDir | Out-Null
          # Generated scripts live in CWD; the installer asset is under custom-files/.
          foreach ($f in @('install_script.ps1','uninstall_script.ps1','detection_script.ps1')) {
            if (Test-Path -LiteralPath $f) { Copy-Item $f "$stageDir/" -Force }
          }
          # Stage the package CONTENTS at the root — the same layout the
          # .intunewin has on the device (Create-IntuneApplication copies
          # custom-files/* next to install_script.ps1, and the generated logic
          # resolves the installer via $PSScriptRoot). A nested Files/ copy
          # here previously made every custom validation fail on
          # "Installer not found".
          if (Test-Path -LiteralPath 'custom-files') {
            Copy-Item 'custom-files/*' "$stageDir/" -Recurse -Force
          }
          $installLog = Join-Path $validationDir 'install.log'
          $installScript = Join-Path $stageDir 'install_script.ps1'
          Start-Transcript -Path $installLog -Force | Out-Null
          $exit = 0
          try {
            & powershell.exe -ExecutionPolicy Bypass -NoProfile -File $installScript
            $exit = $LASTEXITCODE
          } catch {
            $exit = 1
            Write-Host "Install threw: $($_.Exception.Message)"
          }
          Stop-Transcript | Out-Null
          Add-Content -Path $env:GITHUB_OUTPUT -Value "install_exit_code=$exit"

      - name: VM validation — detection
        id: validate_detection
        if: ${{ steps.validate_install.outcome == 'success' }}
        shell: pwsh
        continue-on-error: true
        run: |
          $detect = Join-Path $PWD.Path 'validation-stage/detection_script.ps1'
          if (Test-Path -LiteralPath $detect) {
            & powershell.exe -ExecutionPolicy Bypass -NoProfile -File $detect
            Add-Content -Path $env:GITHUB_OUTPUT -Value "detection_exit_code=$LASTEXITCODE"
          } else {
            Add-Content -Path $env:GITHUB_OUTPUT -Value "detection_exit_code=0"
          }

      - name: VM validation — after-install snapshot + footprint diff
        if: ${{ steps.validate_install.outcome == 'success' }}
        shell: pwsh
        run: |
          ./scripts/common/Capture-WindowsFootprint.ps1 `
            -OutputPath .modern-dev-mgmt/validation/after-install.json `
            -Mode full `
            -BaselinePath .modern-dev-mgmt/validation/before.json
          ./scripts/common/Diff-WindowsFootprint.ps1 `
            -BeforePath .modern-dev-mgmt/validation/before.json `
            -AfterPath  .modern-dev-mgmt/validation/after-install.json `
            -OutputPath .modern-dev-mgmt/validation/footprint.json

      - name: VM validation — uninstall
        id: validate_uninstall
        if: ${{ steps.validate_install.outcome == 'success' }}
        shell: pwsh
        continue-on-error: true
        env:
          ACTIONS_ID_TOKEN_REQUEST_URL: ''
          ACTIONS_ID_TOKEN_REQUEST_TOKEN: ''
          GITHUB_TOKEN: ''
          GH_TOKEN: ''
        run: |
          $uninstall = Join-Path $PWD.Path 'validation-stage/uninstall_script.ps1'
          $uninstallLog = Join-Path $PWD.Path '.modern-dev-mgmt/validation/uninstall.log'
          Start-Transcript -Path $uninstallLog -Force | Out-Null
          $exit = 0
          try {
            & powershell.exe -ExecutionPolicy Bypass -NoProfile -File $uninstall
            $exit = $LASTEXITCODE
          } catch {
            $exit = 1
            Write-Host "Uninstall threw: $($_.Exception.Message)"
          }
          Stop-Transcript | Out-Null
          Add-Content -Path $env:GITHUB_OUTPUT -Value "uninstall_exit_code=$exit"

      - name: VM validation — leftover diff
        if: ${{ always() && steps.validate_install.outcome == 'success' }}
        shell: pwsh
        run: |
          ./scripts/common/Capture-WindowsFootprint.ps1 `
            -OutputPath .modern-dev-mgmt/validation/after-uninstall.json `
            -Mode full `
            -BaselinePath .modern-dev-mgmt/validation/before.json
          ./scripts/common/Diff-WindowsFootprint.ps1 `
            -BeforePath .modern-dev-mgmt/validation/before.json `
            -AfterPath  .modern-dev-mgmt/validation/after-uninstall.json `
            -OutputPath .modern-dev-mgmt/validation/leftovers.json

      - name: VM validation — post-uninstall detection
        id: validate_post_uninstall_detection
        if: ${{ always() && steps.validate_install.outcome == 'success' }}
        shell: pwsh
        continue-on-error: true
        run: |
          $detect = Join-Path $PWD.Path 'validation-stage/detection_script.ps1'
          if (-not (Test-Path -LiteralPath $detect -PathType Leaf)) {
            Add-Content -Path $env:GITHUB_OUTPUT -Value "post_uninstall_detection_exit_code=1"
            exit 0
          }
          & powershell.exe -ExecutionPolicy Bypass -NoProfile -File $detect
          Add-Content -Path $env:GITHUB_OUTPUT -Value "post_uninstall_detection_exit_code=$LASTEXITCODE"

      - name: VM validation — assemble report
        shell: pwsh
        env:
          INSTALL_EXIT:   ${{ steps.validate_install.outputs.install_exit_code }}
          DETECT_EXIT:    ${{ steps.validate_detection.outputs.detection_exit_code }}
          UNINSTALL_EXIT: ${{ steps.validate_uninstall.outputs.uninstall_exit_code }}
          POST_UNINSTALL_DETECT_EXIT: ${{ steps.validate_post_uninstall_detection.outputs.post_uninstall_detection_exit_code }}
          INSTALL_OUTCOME:   ${{ steps.validate_install.outcome }}
          DETECT_OUTCOME:    ${{ steps.validate_detection.outcome }}
          UNINSTALL_OUTCOME: ${{ steps.validate_uninstall.outcome }}
        run: |
          function ParseInt($s) { if ($s -and $s -match '^-?\d+$') { return [int]$s } else { return $null } }
          $report = [ordered]@{
            installExitCode    = ParseInt $env:INSTALL_EXIT
            detectionExitCode  = ParseInt $env:DETECT_EXIT
            uninstallExitCode  = ParseInt $env:UNINSTALL_EXIT
            postUninstallDetectionExitCode = ParseInt $env:POST_UNINSTALL_DETECT_EXIT
            installOutcome     = $env:INSTALL_OUTCOME
            detectionOutcome   = $env:DETECT_OUTCOME
            uninstallOutcome   = $env:UNINSTALL_OUTCOME
            footprintAvailable = (Test-Path '.modern-dev-mgmt/validation/footprint.json')
            leftoversAvailable = (Test-Path '.modern-dev-mgmt/validation/leftovers.json')
          }
          $report | ConvertTo-Json -Depth 8 | Set-Content '.modern-dev-mgmt/validation/report.json' -Encoding UTF8
          # Gate on the actual exit codes: the validate steps end with exit 0
          # by design (they record the result via outputs), so step outcome is
          # always 'success' and must not be the gate.
          $installExit = ParseInt $env:INSTALL_EXIT
          $detectExit = ParseInt $env:DETECT_EXIT
          if ($null -eq $installExit -or $installExit -notin @(0, 1641, 3010, 1707)) {
            Write-Host "::error::Custom-package install failed in validation runner (exit $installExit) — aborting Intune upload."
            exit 1
          }
          if ($null -ne $detectExit -and $detectExit -ne 0) {
            Write-Host "::error::Detection did not report the app as installed after a successful install (exit $detectExit) — aborting Intune upload."
            exit 1
          }
          $uninstallExit = ParseInt $env:UNINSTALL_EXIT
          if ($null -ne $uninstallExit -and $uninstallExit -notin @(0, 1641, 3010, 1707, 19)) {
            Write-Host "::warning::Uninstall failed in validation runner (exit $uninstallExit). Check leftovers.json for residues."
          }
          $postUninstallDetectExit = ParseInt $env:POST_UNINSTALL_DETECT_EXIT
          if ($null -eq $postUninstallDetectExit -or $postUninstallDetectExit -eq 0) {
            Write-Host "::error::Application is still detected after uninstall — aborting Intune upload."
            exit 1
          }

      - name: VM validation — upload artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: validation-${{ github.run_id }}
          path: .modern-dev-mgmt/validation/
          if-no-files-found: ignore
          retention-days: 14

  deploy-custom-installer:
    needs: validate-custom-installer
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Enable Git long paths
        shell: pwsh
        run: git config --system core.longpaths true

      - name: Checkout repository without persisted credentials
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download validated deployment input
        uses: actions/download-artifact@v8
        with:
          name: deployment-input-${{ github.run_id }}
          path: .

      - name: Resolve target Azure tenant from Vanguard context
        shell: bash
        env:
          MODERN_DEVMGMT_CONTEXT_B64: ${{ github.event.inputs.modern_dev_mgmt_context_b64 }}
        run: |
          if [[ -z "${MODERN_DEVMGMT_CONTEXT_B64:-}" ]]; then
            echo "no Vanguard context — keeping default AZURE_TENANT_ID/CLIENT_ID"
            exit 0
          fi
          decoded="$(printf '%s' "$MODERN_DEVMGMT_CONTEXT_B64" | base64 --decode 2>/dev/null || true)"
          if [[ -z "$decoded" ]]; then
            echo "::warning::could not base64-decode modern_dev_mgmt_context_b64; using YAML defaults"
            exit 0
          fi
          tenant="$(printf '%s' "$decoded" | jq -r '.targetAzureTenantId // ""' 2>/dev/null || true)"
          client="$(printf '%s' "$decoded" | jq -r '.targetAzureClientId // ""' 2>/dev/null || true)"
          if [[ -n "$tenant" ]]; then
            echo "::add-mask::$tenant"
            echo "AZURE_TENANT_ID=$tenant" >> "$GITHUB_ENV"
            echo "INTUNE_TENANT_ID=$tenant" >> "$GITHUB_ENV"
          fi
          if [[ -n "$client" ]]; then
            echo "::add-mask::$client"
            echo "AZURE_CLIENT_ID=$client" >> "$GITHUB_ENV"
            echo "INTUNE_CLIENT_ID=$client" >> "$GITHUB_ENV"
          fi

      - name: Authenticode-sign generated deployment scripts
        if: ${{ github.event.inputs.signing_cert_thumbprint != '' }}
        shell: pwsh
        env:
          SIGNING_CERT_PFX_BASE64: ${{ secrets[format('SIGNING_CERT_{0}', inputs.signing_cert_thumbprint)] }}
          SIGNING_CERT_PFX_PASSWORD: ${{ secrets[format('SIGNING_CERT_PASSWORD_{0}', inputs.signing_cert_thumbprint)] }}
          SIGNING_CERT_THUMBPRINT: ${{ github.event.inputs.signing_cert_thumbprint }}
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not $env:SIGNING_CERT_PFX_BASE64) {
            throw "Certificate-specific signing material for '$($env:SIGNING_CERT_THUMBPRINT)' is missing."
          }
          if (-not $env:SIGNING_CERT_PFX_PASSWORD) {
            throw "Certificate-specific signing password is missing."
          }
          $pfxPath = Join-Path $env:RUNNER_TEMP "signing-cert.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:SIGNING_CERT_PFX_BASE64))
          $importedCert = $null
          try {
            $password = ConvertTo-SecureString $env:SIGNING_CERT_PFX_PASSWORD -AsPlainText -Force
            $importedCert = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation 'Cert:\CurrentUser\My' -Password $password -Exportable
            if (-not $importedCert -or -not $importedCert.HasPrivateKey) {
              throw 'Signing certificate could not be imported with its private key.'
            }
            $actual = ($importedCert.Thumbprint -replace '[^A-Fa-f0-9]', '').ToUpperInvariant()
            $expected = ($env:SIGNING_CERT_THUMBPRINT -replace '[^A-Fa-f0-9]', '').ToUpperInvariant()
            if ($expected -and $actual -ne $expected) {
              throw "Signing certificate thumbprint mismatch. Expected $expected but repo secret contains $actual."
            }
            # Never parse or re-sign the untrusted vendor EXE/DLL while signing
            # credentials are present. Only Vanguard-generated script payloads
            # cross into this credentialed job.
            $targets = @('install_script.ps1', 'uninstall_script.ps1', 'detection_script.ps1') |
              Where-Object { Test-Path -LiteralPath $_ -PathType Leaf }
            if ($targets.Count -eq 0) { throw 'No generated scripts found to sign.' }
            foreach ($target in $targets) {
              $signature = Set-AuthenticodeSignature -FilePath $target -Certificate $importedCert -HashAlgorithm SHA256 -TimestampServer 'http://timestamp.digicert.com'
              $signedBy = (($signature.SignerCertificate.Thumbprint -replace '[^A-Fa-f0-9]', '').ToUpperInvariant())
              if (-not $signature.SignerCertificate -or $signedBy -ne $actual -or $signature.Status -in @('NotSigned', 'HashMismatch')) {
                throw "Authenticode signing failed for $target: $($signature.Status) $($signature.StatusMessage)"
              }
            }
          } finally {
            if ($importedCert) {
              Remove-Item -LiteralPath "Cert:\CurrentUser\My\$($importedCert.Thumbprint)" -Force -ErrorAction SilentlyContinue
            }
            if (Test-Path -LiteralPath $pfxPath) { Remove-Item -LiteralPath $pfxPath -Force }
          }

      # This fresh runner is the first place Azure/GitHub write credentials are
      # granted. The installer was executed only in the completed validation
      # job and no process or filesystem state is shared with this VM.
      - name: Azure Login using OIDC
        uses: azure/login@v3
        with:
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          client-id: ${{ env.AZURE_CLIENT_ID }}
          allow-no-subscriptions: true

      - name: Get Azure Access Token
        id: get_token
        shell: pwsh
        run: |
          $token = (az account get-access-token --resource https://graph.microsoft.com --query accessToken -o tsv)
          if (-not $token) {
            Write-Error "Failed to acquire Microsoft Graph access token"
            exit 1
          }
          echo "::add-mask::$token"
          echo "access_token=$token" >> $env:GITHUB_OUTPUT

      - name: Create Intune application
        id: create_app
        shell: powershell
        env:
          INPUT_PACKAGE_NAME: ${{ github.event.inputs.package_name }}
          INPUT_APP_DESCRIPTION: ${{ github.event.inputs.app_description }}
          INPUT_APP_PUBLISHER: ${{ github.event.inputs.app_publisher }}
          INPUT_APP_VERSION: ${{ github.event.inputs.app_version }}
          INPUT_APP_ICON_BASE64: ${{ github.event.inputs.app_icon_base64 }}
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          INPUT_ASSET_NAME: ${{ github.event.inputs.asset_name }}
        run: |
          $architecture = "x64"
          $contextB64 = "${{ github.event.inputs.modern_dev_mgmt_context_b64 }}"
          if ($contextB64) {
            try {
              $rawContext = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String(($contextB64 -replace '\s+', '')))
              $context = $rawContext | ConvertFrom-Json
              if ($context.architecture) { $architecture = [string]$context.architecture }
              elseif ($context.package -and $context.package.architecture) { $architecture = [string]$context.package.architecture }
            } catch {
              Write-Warning "Could not parse Vanguard context architecture, using x64"
            }
          }
          $mdDeveloper = ""; $mdOwner = ""; $mdInformationUrl = ""; $mdPrivacyUrl = ""; $mdNotes = ""; $mdRestartBehavior = ""
          $mdReturnCodesJson = ""; $mdCategoryIdsJson = ""; $mdCategoryNamesJson = ""; $mdRequirementRulesJson = ""; $mdMinimumSupportedOperatingSystemJson = ""; $mdMaxRunTimeInMinutes = 0
          $mdContextB64 = "${{ github.event.inputs.modern_dev_mgmt_context_b64 }}"
          if ($mdContextB64) {
            try {
              $mdContext = ([Text.Encoding]::UTF8.GetString([Convert]::FromBase64String(($mdContextB64 -replace '\s+', '')))) | ConvertFrom-Json
              if ($mdContext.intuneMetadata) {
                $md = $mdContext.intuneMetadata
                if ($md.developer) { $mdDeveloper = [string]$md.developer }
                if ($md.owner) { $mdOwner = [string]$md.owner }
                if ($md.informationUrl) { $mdInformationUrl = [string]$md.informationUrl }
                if ($md.privacyInformationUrl) { $mdPrivacyUrl = [string]$md.privacyInformationUrl }
                if ($md.notes) { $mdNotes = [string]$md.notes }
                if ($md.restartBehavior) { $mdRestartBehavior = [string]$md.restartBehavior }
                if ($null -ne $md.returnCodes) { $mdReturnCodesJson = $md.returnCodes | ConvertTo-Json -Depth 10 -Compress }
                if ($null -ne $md.categoryIds) { $mdCategoryIdsJson = $md.categoryIds | ConvertTo-Json -Depth 10 -Compress }
                if ($null -ne $md.categoryNames) { $mdCategoryNamesJson = $md.categoryNames | ConvertTo-Json -Depth 10 -Compress }
                if ($null -ne $md.requirementRules) { $mdRequirementRulesJson = $md.requirementRules | ConvertTo-Json -Depth 20 -Compress }
                if ($null -ne $md.minimumSupportedOperatingSystem) { $mdMinimumSupportedOperatingSystemJson = $md.minimumSupportedOperatingSystem | ConvertTo-Json -Depth 10 -Compress }
                if ($md.maxRunTimeInMinutes) { $mdMaxRunTimeInMinutes = [int]$md.maxRunTimeInMinutes }
              }
            } catch {
              Write-Warning "Could not parse Vanguard context Intune metadata"
            }
          }
          $defaultNotes = "Vanguard custom installer package. Release: $env:INPUT_RELEASE_TAG. Asset: $env:INPUT_ASSET_NAME. Workflow: ${{ github.run_id }}."
          $params = @{
            AccessToken = "${{ steps.get_token.outputs.access_token }}"
            PackageId = "${{ github.event.inputs.package_id }}"
            AppName = $env:INPUT_PACKAGE_NAME
            AppDescription = $env:INPUT_APP_DESCRIPTION
            Publisher = $env:INPUT_APP_PUBLISHER
            Version = $env:INPUT_APP_VERSION
            AppIconBase64 = $env:INPUT_APP_ICON_BASE64
            InstallContext = "${{ github.event.inputs.install_context }}"
            UsePSADT = ("${{ github.event.inputs.use_psadt }}" -ne "false")
            DryRun = ("${{ github.event.inputs.dry_run }}" -eq "true")
            IntuneApiUrl = "$env:INTUNE_API_URL"
            PackageFilesDirectory = "custom-files"
            PackageSource = "Custom installer"
            PackageNotes = $(if ($mdNotes) { $mdNotes } else { $defaultNotes })
            Architecture = $architecture
          }
          # Apply the wizard's Intune metadata (Step 3) when the operator set it.
          if ($mdDeveloper) { $params.Developer = $mdDeveloper }
          if ($mdOwner) { $params.Owner = $mdOwner }
          if ($mdInformationUrl) { $params.InformationUrl = $mdInformationUrl }
          if ($mdPrivacyUrl) { $params.PrivacyInformationUrl = $mdPrivacyUrl }
          if ($mdRestartBehavior) { $params.RestartBehavior = $mdRestartBehavior }
          if ($mdReturnCodesJson) { $params.ReturnCodesJson = $mdReturnCodesJson }
          if ($mdCategoryIdsJson) { $params.CategoryIdsJson = $mdCategoryIdsJson }
          if ($mdCategoryNamesJson) { $params.CategoryNamesJson = $mdCategoryNamesJson }
          if ($mdRequirementRulesJson) { $params.RequirementRulesJson = $mdRequirementRulesJson }
          if ($mdMinimumSupportedOperatingSystemJson) { $params.MinimumSupportedOperatingSystemJson = $mdMinimumSupportedOperatingSystemJson }
          if ($mdMaxRunTimeInMinutes -gt 0) { $params.MaxRunTimeInMinutes = $mdMaxRunTimeInMinutes }
          ./scripts/winget/Create-IntuneApplication.ps1 @params

      - name: Apply assignment template
        if: ${{ github.event.inputs.dry_run != 'true' && github.event.inputs.assignment_json != '' }}
        shell: pwsh
        env:
          ASSIGNMENT_JSON: ${{ github.event.inputs.assignment_json }}
        run: |
          ./scripts/common/Assign-IntuneMobileApp.ps1 -AccessToken "${{ steps.get_token.outputs.access_token }}" -AppId "${{ steps.create_app.outputs.app_id }}" -AssignmentJson $env:ASSIGNMENT_JSON -IntuneApiUrl "$env:INTUNE_API_URL"

      - name: Create Update-Only Required companion app
        id: create_update_only_app
        if: ${{ github.event.inputs.dry_run != 'true' && github.event.inputs.update_only_b64 != '' }}
        shell: powershell
        env:
          UPDATE_ONLY_B64: ${{ github.event.inputs.update_only_b64 }}
          INPUT_PACKAGE_NAME: ${{ github.event.inputs.package_name }}
          INPUT_APP_DESCRIPTION: ${{ github.event.inputs.app_description }}
          INPUT_APP_PUBLISHER: ${{ github.event.inputs.app_publisher }}
          INPUT_APP_VERSION: ${{ github.event.inputs.app_version }}
          INPUT_APP_ICON_BASE64: ${{ github.event.inputs.app_icon_base64 }}
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          INPUT_ASSET_NAME: ${{ github.event.inputs.asset_name }}
        run: |
          $ErrorActionPreference = "Stop"
          $raw = $env:UPDATE_ONLY_B64
          if ($raw.Contains(",")) { $raw = $raw.Split(",", 2)[1] }
          [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String(($raw -replace '\s+', ''))) |
            Set-Content -Path "detection_script.ps1" -Encoding UTF8
          $baseName = $env:INPUT_PACKAGE_NAME
          if (-not $baseName) { $baseName = "${{ steps.create_app.outputs.app_name }}" }
          if (-not $baseName) { $baseName = "${{ github.event.inputs.package_id }}" }
          $architecture = "x64"
          $contextB64 = "${{ github.event.inputs.modern_dev_mgmt_context_b64 }}"
          if ($contextB64) {
            try {
              $rawContext = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String(($contextB64 -replace '\s+', '')))
              $context = $rawContext | ConvertFrom-Json
              if ($context.architecture) { $architecture = [string]$context.architecture }
              elseif ($context.package -and $context.package.architecture) { $architecture = [string]$context.package.architecture }
            } catch {
              Write-Warning "Could not parse Vanguard context architecture, using x64"
            }
          }
          $params = @{
            AccessToken = "${{ steps.get_token.outputs.access_token }}"
            PackageId = "${{ github.event.inputs.package_id }}"
            AppName = "$baseName (Update-Only)"
            AppDescription = "$($env:INPUT_APP_DESCRIPTION) (Update-Only Required companion)"
            Publisher = $env:INPUT_APP_PUBLISHER
            Version = $env:INPUT_APP_VERSION
            AppIconBase64 = $env:INPUT_APP_ICON_BASE64
            InstallContext = "${{ github.event.inputs.install_context }}"
            UsePSADT = ("${{ github.event.inputs.use_psadt }}" -ne "false")
            DryRun = $false
            IntuneApiUrl = "$env:INTUNE_API_URL"
            PackageFilesDirectory = "custom-files"
            PackageSource = "Custom installer update-only companion"
            PackageNotes = "Vanguard Update-Only Required companion. Primary Intune app: ${{ steps.create_app.outputs.app_id }}. Release: $env:INPUT_RELEASE_TAG. Asset: $env:INPUT_ASSET_NAME. Workflow: ${{ github.run_id }}."
            Architecture = $architecture
          }
          ./scripts/winget/Create-IntuneApplication.ps1 @params

      - name: Assign Update-Only companion to all devices
        if: ${{ github.event.inputs.dry_run != 'true' && steps.create_update_only_app.outputs.app_id != '' }}
        shell: pwsh
        run: |
          $assignment = @{
            mobileAppAssignments = @(
              @{
                '@odata.type' = '#microsoft.graph.mobileAppAssignment'
                intent = 'required'
                target = @{ '@odata.type' = '#microsoft.graph.allDevicesAssignmentTarget' }
                settings = @{
                  '@odata.type' = '#microsoft.graph.win32LobAppAssignmentSettings'
                  notifications = 'showAll'
                  restartSettings = $null
                  deliveryOptimizationPriority = 'notConfigured'
                }
              }
            )
          } | ConvertTo-Json -Depth 20
          ./scripts/common/Assign-IntuneMobileApp.ps1 -AccessToken "${{ steps.get_token.outputs.access_token }}" -AppId "${{ steps.create_update_only_app.outputs.app_id }}" -AssignmentJson $assignment -IntuneApiUrl "$env:INTUNE_API_URL"

      - name: Persist Vanguard run result
        if: ${{ github.event.inputs.dry_run != 'true' && steps.create_app.outputs.app_id != '' }}
        shell: pwsh
        env:
          MODERN_DEVMGMT_CONTEXT_B64: ${{ github.event.inputs.modern_dev_mgmt_context_b64 }}
          ASSIGNMENT_SUMMARY: ${{ github.event.inputs.assignment_summary }}
          GITHUB_TOKEN: ${{ github.token }}
          RESULT_PACKAGE_ID: ${{ github.event.inputs.package_id }}
          RESULT_APP_ID: ${{ steps.create_app.outputs.app_id }}
          RESULT_UPDATE_ONLY_APP_ID: ${{ steps.create_update_only_app.outputs.app_id }}
          RESULT_APP_NAME: ${{ steps.create_app.outputs.app_name }}
          RESULT_APP_VERSION: ${{ github.event.inputs.app_version }}
          RESULT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          RESULT_ASSET_NAME: ${{ github.event.inputs.asset_name }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          git remote set-url origin "https://x-access-token:$env:GITHUB_TOKEN@github.com/${{ github.repository }}.git"
          git pull --rebase
          $runDir = ".modern-dev-mgmt/runs"
          New-Item -ItemType Directory -Force -Path $runDir | Out-Null
          $context = $null
          if ($env:MODERN_DEVMGMT_CONTEXT_B64) {
            try {
              $contextJson = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($env:MODERN_DEVMGMT_CONTEXT_B64))
              $context = $contextJson | ConvertFrom-Json
            } catch {
              Write-Warning "Could not decode Vanguard context: $($_.Exception.Message)"
            }
          }
          # Same pattern as winget persist step: surface the validation report
          # + footprint + leftovers + install/uninstall log tails so the App
          # Documentation tab can render the Robopack-style page.
          $validation = $null
          if (Test-Path -LiteralPath '.modern-dev-mgmt/validation/report.json') {
            try { $validation = Get-Content -LiteralPath '.modern-dev-mgmt/validation/report.json' -Raw | ConvertFrom-Json } catch {}
          }
          function _LogTail([string]$Path,[int]$N=200) {
            if (-not (Test-Path -LiteralPath $Path)) { return $null }
            try { (Get-Content -LiteralPath $Path -Tail $N -ErrorAction Stop) -join [Environment]::NewLine } catch { $null }
          }
          if ($validation) {
            $validation | Add-Member -NotePropertyName installLogTail   -NotePropertyValue (_LogTail '.modern-dev-mgmt/validation/install.log')   -Force
            $validation | Add-Member -NotePropertyName uninstallLogTail -NotePropertyValue (_LogTail '.modern-dev-mgmt/validation/uninstall.log') -Force
          }
          $footprint = $null
          if (Test-Path -LiteralPath '.modern-dev-mgmt/validation/footprint.json') {
            try { $footprint = Get-Content -LiteralPath '.modern-dev-mgmt/validation/footprint.json' -Raw | ConvertFrom-Json } catch {}
          }
          $leftovers = $null
          if (Test-Path -LiteralPath '.modern-dev-mgmt/validation/leftovers.json') {
            try { $leftovers = Get-Content -LiteralPath '.modern-dev-mgmt/validation/leftovers.json' -Raw | ConvertFrom-Json } catch {}
          }
          $result = [ordered]@{
            workflowRunId = "${{ github.run_id }}"
            workflow = "deploy-custom-package.yml"
            packageManager = "custom"
            packageId = $env:RESULT_PACKAGE_ID
            appId = $env:RESULT_APP_ID
            updateOnlyAppId = $env:RESULT_UPDATE_ONLY_APP_ID
            appName = $env:RESULT_APP_NAME
            appVersion = $env:RESULT_APP_VERSION
            status = "success"
            releaseTag = $env:RESULT_RELEASE_TAG
            assetName = $env:RESULT_ASSET_NAME
            createdAt = (Get-Date).ToUniversalTime().ToString("o")
            context = $context
            validation = $validation
            footprint = $footprint
            leftovers = $leftovers
          }
          $resultJson = $result | ConvertTo-Json -Depth 8
          $resultJson | Set-Content -Path "$runDir/${{ github.run_id }}.json" -Encoding UTF8
          git add "$runDir/${{ github.run_id }}.json"
          # ---- Per-app docs layout (mirrors app-docs-layout.ts) ----
          function _Slugify([string]$Value) {
            if ([string]::IsNullOrWhiteSpace($Value)) { return '_unknown' }
            $lower = $Value.ToLowerInvariant()
            $dashed = [System.Text.RegularExpressions.Regex]::Replace($lower, '[^a-z0-9]+', '-')
            $trimmed = $dashed.Trim('-')
            if ([string]::IsNullOrEmpty($trimmed)) { return '_unknown' }
            return $trimmed
          }
          function _NormalizeVersion([string]$Value) {
            if ([string]::IsNullOrWhiteSpace($Value)) { return 'unknown' }
            $cleaned = [System.Text.RegularExpressions.Regex]::Replace($Value.Trim(), '[^A-Za-z0-9._-]+', '-').Trim('-')
            if ([string]::IsNullOrEmpty($cleaned)) { return 'unknown' }
            return $cleaned
          }
          $slugCandidates = @(
            $result.packageId,
            $result.appName,
            $(if ($context) { $context.packageId } else { $null }),
            $(if ($context) { $context.appName } else { $null })
          )
          $appSlug = '_unknown'
          foreach ($cand in $slugCandidates) {
            if ($cand) {
              $candidate = _Slugify ([string]$cand)
              if ($candidate -ne '_unknown') { $appSlug = $candidate; break }
            }
          }
          $versionCandidates = @(
            $result.appVersion,
            $(if ($context) { $context.targetVersion } else { $null }),
            $(if ($context) { $context.version } else { $null }),
            $result.version
          )
          $appVersion = 'unknown'
          foreach ($cand in $versionCandidates) {
            if ($cand) {
              $candidate = _NormalizeVersion ([string]$cand)
              if ($candidate -ne 'unknown') { $appVersion = $candidate; break }
            }
          }
          $runIdRaw = "${{ github.run_id }}"
          $safeRunId = [System.Text.RegularExpressions.Regex]::Replace($runIdRaw, '[^A-Za-z0-9._-]+', '')
          $appDir = ".modern-dev-mgmt/apps/$appSlug"
          $versionDir = "$appDir/$appVersion"
          $perRunDir = "$versionDir/$safeRunId"
          New-Item -ItemType Directory -Force -Path $perRunDir | Out-Null
          $resultJson | Set-Content -Path "$perRunDir/result.json" -Encoding UTF8
          foreach ($pair in @(
            @{ src = '.modern-dev-mgmt/validation/install.log';   dst = "$perRunDir/install.log" },
            @{ src = '.modern-dev-mgmt/validation/uninstall.log'; dst = "$perRunDir/uninstall.log" },
            @{ src = '.modern-dev-mgmt/validation/footprint.json';dst = "$perRunDir/footprint.json" },
            @{ src = '.modern-dev-mgmt/validation/leftovers.json';dst = "$perRunDir/leftovers.json" },
            @{ src = '.modern-dev-mgmt/validation/report.json';   dst = "$perRunDir/report.json" }
          )) {
            if (Test-Path -LiteralPath $pair.src) {
              Copy-Item -LiteralPath $pair.src -Destination $pair.dst -Force
            }
          }
          $createdAt = $result.createdAt
          $intuneAppId = $result.appId
          $catalogAppId = $null
          $patchRunId = $null
          if ($context) {
            if ($context.PSObject.Properties.Match('catalogAppId').Count -gt 0) { $catalogAppId = $context.catalogAppId }
            if ($context.PSObject.Properties.Match('patchRunId').Count -gt 0) { $patchRunId = $context.patchRunId }
          }
          $latestPointer = [ordered]@{
            workflowRunId = $safeRunId
            createdAt     = $createdAt
            intuneAppId   = $intuneAppId
            catalogAppId  = $catalogAppId
          }
          ($latestPointer | ConvertTo-Json -Depth 4) | Set-Content -Path "$versionDir/latest.json" -Encoding UTF8
          $displayName = $result.appName
          $indexPath = "$appDir/index.json"
          $index = $null
          if (Test-Path -LiteralPath $indexPath) {
            try { $index = Get-Content -LiteralPath $indexPath -Raw | ConvertFrom-Json } catch { $index = $null }
          }
          $indexVersions = @()
          if ($index -and $index.versions) {
            foreach ($v in $index.versions) {
              $runsCopy = @()
              if ($v.runs) {
                foreach ($r in $v.runs) {
                  $runsCopy += [ordered]@{
                    workflowRunId = [string]$r.workflowRunId
                    createdAt     = $r.createdAt
                    intuneAppId   = $r.intuneAppId
                    catalogAppId  = $r.catalogAppId
                    patchRunId    = $r.patchRunId
                    status        = $r.status
                  }
                }
              }
              $indexVersions += [ordered]@{ version = [string]$v.version; runs = $runsCopy }
            }
          }
          $newRunEntry = [ordered]@{
            workflowRunId = $safeRunId
            createdAt     = $createdAt
            intuneAppId   = $intuneAppId
            catalogAppId  = $catalogAppId
            patchRunId    = $patchRunId
            status        = $result.status
          }
          $found = $false
          for ($i = 0; $i -lt $indexVersions.Count; $i++) {
            if ($indexVersions[$i].version -eq $appVersion) {
              $found = $true
              $filteredRuns = @()
              foreach ($r in $indexVersions[$i].runs) {
                if ([string]$r.workflowRunId -ne $safeRunId) { $filteredRuns += $r }
              }
              $filteredRuns += $newRunEntry
              $indexVersions[$i].runs = $filteredRuns
              break
            }
          }
          if (-not $found) {
            $indexVersions += [ordered]@{ version = $appVersion; runs = @($newRunEntry) }
          }
          $sortedVersions = $indexVersions | Sort-Object @{ Expression = {
            $maxCreated = ''
            foreach ($r in $_.runs) {
              if ($r.createdAt -and ([string]$r.createdAt) -gt $maxCreated) { $maxCreated = [string]$r.createdAt }
            }
            $maxCreated
          }; Descending = $true }, @{ Expression = { $_.version }; Descending = $true }
          $indexOut = [ordered]@{
            slug        = $appSlug
            displayName = $displayName
            versions    = @($sortedVersions)
            updatedAt   = (Get-Date).ToUniversalTime().ToString('o')
          }
          ($indexOut | ConvertTo-Json -Depth 10) | Set-Content -Path $indexPath -Encoding UTF8
          git add $appDir
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "chore: record Vanguard custom run ${{ github.run_id }} (per-app docs)"
            git pull --rebase origin "${{ github.ref_name }}"
            git push
          } else {
            Write-Host "no changes"
          }

      - name: Summary
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.dry_run }}" -eq "true") {
            "✅ Dry run completed for custom installer package." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          } else {
            "✅ Custom installer deployed to Intune." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            "App: ${{ steps.create_app.outputs.app_name }}" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            "Intune app id: ${{ steps.create_app.outputs.app_id }}" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            if ("${{ steps.create_update_only_app.outputs.app_id }}") {
              "Update-Only companion id: ${{ steps.create_update_only_app.outputs.app_id }}" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            }
          }
