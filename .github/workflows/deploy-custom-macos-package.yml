name: Deploy Custom macOS Package to Intune

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'GitHub release tag containing the uploaded PKG/DMG'
        required: true
        type: string
      asset_name:
        description: 'Release asset filename to package'
        required: true
        type: string
      package_id:
        description: 'Modern Dev Mgmt custom package id'
        required: true
        type: string
      package_name:
        description: 'Display name in Intune'
        required: true
        type: string
      app_description:
        description: 'Description in Intune'
        required: false
        type: string
      app_publisher:
        description: 'Publisher in Intune'
        required: false
        type: string
      app_version:
        description: 'Application version'
        required: false
        type: string
      app_icon_base64:
        description: 'Base64 encoded app icon (optional)'
        required: false
        type: string
      bundle_id:
        description: 'Primary bundle id fallback for raw PKG payloads'
        required: false
        type: string
      dry_run:
        description: 'Validate asset and metadata only; do not create the Intune app'
        required: false
        type: boolean
        default: false
      pre_install_script_b64:
        description: 'Base64 encoded pre-install script'
        required: false
        type: string
      post_install_script_b64:
        description: 'Base64 encoded post-install script'
        required: false
        type: string
      assignment_json:
        description: 'JSON mobileAppAssignments payload generated by Modern Dev Mgmt'
        required: false
        type: string
      assignment_summary:
        description: 'Human-readable assignment plan summary'
        required: false
        type: string
      signing_identity:
        description: 'codesign/productsign identity (Developer ID Installer common name or SHA-1 of the cert in the keychain)'
        required: false
        type: string
      modern_dev_mgmt_context_b64:
        description: 'Base64 encoded Modern Dev Mgmt run context'
        required: false
        type: string

env:
  AZURE_TENANT_ID: 'f849cde7-f11d-4ef5-a31d-7fca98b21bf5'
  AZURE_CLIENT_ID: '7659f226-8344-4731-b758-a4d93238309c'
  INTUNE_TENANT_ID: 'f849cde7-f11d-4ef5-a31d-7fca98b21bf5'
  INTUNE_CLIENT_ID: '7659f226-8344-4731-b758-a4d93238309c'

permissions:
  id-token: write
  contents: write

jobs:
  deploy-custom-macos-package:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve target Azure tenant from Modern Dev Mgmt context
        shell: bash
        env:
          MODERN_DEVMGMT_CONTEXT_B64: ${{ github.event.inputs.modern_dev_mgmt_context_b64 }}
        run: |
          # The desktop app's catalog deploy passes targetAzureTenantId +
          # targetAzureClientId inside the b64-encoded context blob. When two
          # tenants share the same GitHub repo this is the only mechanism that
          # routes OIDC to the right Azure tenant per dispatch — the YAML env
          # defaults are baked at provisioning time and can only point at one
          # tenant.
          if [[ -z "${MODERN_DEVMGMT_CONTEXT_B64:-}" ]]; then
            echo "no Modern Dev Mgmt context — keeping default AZURE_TENANT_ID/CLIENT_ID"
            exit 0
          fi
          decoded="$(printf '%s' "$MODERN_DEVMGMT_CONTEXT_B64" | base64 --decode 2>/dev/null || true)"
          if [[ -z "$decoded" ]]; then
            echo "::warning::could not base64-decode modern_dev_mgmt_context_b64; using YAML defaults"
            exit 0
          fi
          tenant="$(printf '%s' "$decoded" | jq -r '.targetAzureTenantId // ""' 2>/dev/null || true)"
          client="$(printf '%s' "$decoded" | jq -r '.targetAzureClientId // ""' 2>/dev/null || true)"
          if [[ -n "$tenant" ]]; then
            echo "AZURE_TENANT_ID=$tenant" >> "$GITHUB_ENV"
            echo "INTUNE_TENANT_ID=$tenant" >> "$GITHUB_ENV"
            echo "resolved AZURE_TENANT_ID=$tenant"
          fi
          if [[ -n "$client" ]]; then
            echo "AZURE_CLIENT_ID=$client" >> "$GITHUB_ENV"
            echo "INTUNE_CLIENT_ID=$client" >> "$GITHUB_ENV"
            echo "resolved AZURE_CLIENT_ID=$client"
          fi

      - name: Azure Login using OIDC
        uses: azure/login@v3
        with:
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          client-id: ${{ env.AZURE_CLIENT_ID }}
          allow-no-subscriptions: true

      - name: Acquire Microsoft Graph token
        id: graph_token
        shell: bash
        run: |
          set -euo pipefail
          token=$(az account get-access-token --resource https://graph.microsoft.com/ --query accessToken -o tsv)
          if [[ -z "$token" ]]; then
            echo "::error::Failed to acquire Microsoft Graph access token"
            exit 1
          fi
          echo "::add-mask::$token"
          echo "INTUNE_ACCESS_TOKEN=$token" >> "$GITHUB_ENV"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade pycryptodome

      - name: Ensure packaging tool is executable
        run: chmod +x tools/intune_packager.py

      - name: Download uploaded macOS asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p custom-files
          gh release download "${{ github.event.inputs.release_tag }}" --repo "${{ github.repository }}" --pattern "${{ github.event.inputs.asset_name }}" --dir custom-files --clobber
          asset_path="custom-files/${{ github.event.inputs.asset_name }}"
          if [[ ! -f "$asset_path" ]]; then
            echo "::error::macOS asset was not downloaded: $asset_path"
            exit 1
          fi
          asset_path_lower="$(printf '%s' "$asset_path" | tr '[:upper:]' '[:lower:]')"
          case "$asset_path_lower" in
            *.pkg|*.dmg) echo "asset_path=$asset_path" >> "$GITHUB_ENV" ;;
            *) echo "::error::Only .pkg and .dmg assets are supported by this workflow"; exit 1 ;;
          esac

      - name: Sign macOS package with productsign/codesign
        if: ${{ github.event.inputs.signing_identity != '' && github.event.inputs.dry_run != 'true' }}
        shell: bash
        env:
          SIGNING_IDENTITY: ${{ github.event.inputs.signing_identity }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${asset_path:-}" ]]; then
            echo "::error::asset_path is not set; cannot sign the selected package"
            exit 1
          fi
          # Unlock the login keychain when a password was provisioned (required for non-interactive codesign).
          if [[ -n "${MACOS_KEYCHAIN_PASSWORD:-}" ]]; then
            security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$HOME/Library/Keychains/login.keychain-db" ||               security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" login.keychain || true
          fi
          asset_path_lower="$(printf '%s' "$asset_path" | tr '[:upper:]' '[:lower:]')"
          case "$asset_path_lower" in
            *.pkg)
              signed_path="${asset_path%.pkg}.signed.pkg"
              echo "Signing $asset_path with productsign identity '$SIGNING_IDENTITY'"
              productsign --sign "$SIGNING_IDENTITY" "$asset_path" "$signed_path"
              mv "$signed_path" "$asset_path"
              pkgutil --check-signature "$asset_path" || true
              ;;
            *.dmg)
              # codesign the DMG bundle itself; the python packager will convert it to pkg downstream.
              echo "codesigning DMG $asset_path with identity '$SIGNING_IDENTITY'"
              codesign --sign "$SIGNING_IDENTITY" --force --timestamp "$asset_path"
              codesign --verify --verbose "$asset_path"
              ;;
            *)
              echo "::error::Asset $asset_path is neither .pkg nor .dmg; cannot sign it"
              exit 1
              ;;
          esac

      - name: Package and upload to Intune
        id: package_upload
        if: ${{ github.event.inputs.dry_run != 'true' }}
        shell: bash
        env:
          INTUNE_TENANT_ID: '${{ env.INTUNE_TENANT_ID }}'
          INTUNE_CLIENT_ID: '${{ env.INTUNE_CLIENT_ID }}'
          INTUNE_ACCESS_TOKEN: '${{ env.INTUNE_ACCESS_TOKEN }}'
          INTUNE_CLIENT_SECRET: '${{ secrets.INTUNE_CLIENT_SECRET }}'
          APP_NAME: '${{ github.event.inputs.package_name }}'
          APP_DESCRIPTION: '${{ github.event.inputs.app_description }}'
          APP_PUBLISHER: '${{ github.event.inputs.app_publisher }}'
          APP_VERSION: '${{ github.event.inputs.app_version }}'
          APP_ICON_BASE64: '${{ github.event.inputs.app_icon_base64 }}'
          BUNDLE_ID: '${{ github.event.inputs.bundle_id }}'
          PRE_INSTALL_SCRIPT_B64: '${{ github.event.inputs.pre_install_script_b64 }}'
          POST_INSTALL_SCRIPT_B64: '${{ github.event.inputs.post_install_script_b64 }}'
        run: |
          set -euo pipefail
          if [[ -z "${INTUNE_ACCESS_TOKEN:-}" && -z "${INTUNE_CLIENT_SECRET:-}" ]]; then
            echo "::error::Failed to locate Microsoft Graph token. Ensure Azure login succeeded or configure INTUNE_CLIENT_SECRET." >&2
            exit 1
          fi
          mkdir -p output
          ARGS=(--output-dir output --display-name "$APP_NAME")
          if [[ -n "$APP_DESCRIPTION" ]]; then ARGS+=(--description "$APP_DESCRIPTION"); fi
          if [[ -n "$APP_PUBLISHER" ]]; then ARGS+=(--publisher "$APP_PUBLISHER"); fi
          if [[ -n "$APP_VERSION" ]]; then ARGS+=(--app-version "$APP_VERSION"); fi
          if [[ -n "$BUNDLE_ID" ]]; then ARGS+=(--bundle-id "$BUNDLE_ID"); fi
          if [[ -n "$PRE_INSTALL_SCRIPT_B64" ]]; then ARGS+=(--pre-install-script-b64 "$PRE_INSTALL_SCRIPT_B64"); fi
          if [[ -n "$POST_INSTALL_SCRIPT_B64" ]]; then ARGS+=(--post-install-script-b64 "$POST_INSTALL_SCRIPT_B64"); fi
          ICON_FILE_PATH=""
          if [[ -n "$APP_ICON_BASE64" ]]; then
            ICON_FILE_PATH="output/app_icon.png"
            export APP_ICON_BASE64 ICON_FILE_PATH
            python3 -c "import base64, os, pathlib, sys; raw = os.environ.get('APP_ICON_BASE64', ''); raw = raw.split(',', 1)[1] if raw.startswith('data:') else raw.strip(); sys.exit('App icon base64 data is empty') if not raw else None; path = pathlib.Path(os.environ['ICON_FILE_PATH']); path.parent.mkdir(parents=True, exist_ok=True); path.write_bytes(base64.b64decode(raw))"
            ARGS+=(--icon-file "$ICON_FILE_PATH")
          fi
          asset_path_lower="$(printf '%s' "$asset_path" | tr '[:upper:]' '[:lower:]')"
          case "$asset_path_lower" in
            *.pkg) ARGS+=(--pkg-file "$asset_path") ;;
            *.dmg) ARGS+=(--dmg-file "$asset_path") ;;
          esac
          python3 tools/intune_packager.py "${ARGS[@]}"

      - name: Dry run summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        shell: bash
        env:
          ASSIGNMENT_SUMMARY: ${{ github.event.inputs.assignment_summary }}
        run: |
          echo "✅ Dry run completed. macOS asset and assignment plan were validated."
          if [[ -n "${ASSIGNMENT_SUMMARY:-}" ]]; then
            echo "Assignment plan: $ASSIGNMENT_SUMMARY"
          fi

      - name: Apply assignment template
        if: ${{ github.event.inputs.dry_run != 'true' && github.event.inputs.assignment_json != '' }}
        shell: pwsh
        env:
          ASSIGNMENT_JSON: ${{ github.event.inputs.assignment_json }}
        run: |
          ./scripts/common/Assign-IntuneMobileApp.ps1 -AccessToken "$env:INTUNE_ACCESS_TOKEN" -AppId "${{ steps.package_upload.outputs.app_id }}" -AssignmentJson $env:ASSIGNMENT_JSON -IntuneApiUrl "https://graph.microsoft.com/v1.0"

      - name: Persist Modern Dev Mgmt run result
        if: ${{ github.event.inputs.dry_run != 'true' && steps.package_upload.outputs.app_id != '' }}
        shell: bash
        env:
          APP_ID: ${{ steps.package_upload.outputs.app_id }}
          APP_NAME: ${{ steps.package_upload.outputs.app_name }}
          PACKAGE_ID: ${{ github.event.inputs.package_id }}
          APP_VERSION: ${{ github.event.inputs.app_version }}
          MODERN_DEVMGMT_CONTEXT_B64: ${{ github.event.inputs.modern_dev_mgmt_context_b64 }}
        run: |
          set -euo pipefail
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          # Cache validation artifacts before git stash so the persist step's
          # JS body can still read them after stash + rebase. analyze_app_footprint
          # writes untracked files under .modern-dev-mgmt/validation/ that
          # the stash --include-untracked otherwise removes.
          if [[ -d .modern-dev-mgmt/validation ]]; then
            mkdir -p /tmp/validation-cache
            cp -r .modern-dev-mgmt/validation/. /tmp/validation-cache/ || true
          fi
          if [[ -n "$(git status --porcelain)" ]]; then
            git stash push --include-untracked --message "workflow artifacts before persistence" >/dev/null || true
          fi
          git pull --rebase
          if [[ -d /tmp/validation-cache ]]; then
            mkdir -p .modern-dev-mgmt/validation
            cp -r /tmp/validation-cache/. .modern-dev-mgmt/validation/ || true
          fi
          mkdir -p .modern-dev-mgmt/runs
          node - <<'NODE'
          const fs = require('fs');
          const runId = process.env.GITHUB_RUN_ID;
          let context = null;
          if (process.env.MODERN_DEVMGMT_CONTEXT_B64) {
            try {
              context = JSON.parse(Buffer.from(process.env.MODERN_DEVMGMT_CONTEXT_B64, 'base64').toString('utf8'));
            } catch (error) {
              console.warn('Could not decode Modern Dev Mgmt context:', error.message);
            }
          }
          const result = {
            workflowRunId: runId,
            workflow: 'deploy-custom-macos-package.yml',
            packageManager: 'custom-macos',
            packageId: process.env.PACKAGE_ID || null,
            appId: process.env.APP_ID || null,
            appName: process.env.APP_NAME || process.env.PACKAGE_ID || null,
            appVersion: process.env.APP_VERSION || null,
            status: 'success',
            createdAt: new Date().toISOString(),
            context,
          };
          const resultJson = JSON.stringify(result, null, 2);
          fs.writeFileSync(`.modern-dev-mgmt/runs/${runId}.json`, resultJson);
          if (context && context.patchRunId) {
            fs.mkdirSync('.modern-dev-mgmt/patch-runs', { recursive: true });
            fs.writeFileSync(`.modern-dev-mgmt/patch-runs/${context.patchRunId}.json`, resultJson);
          }
          // ---- Per-app docs layout (mirrors app-docs-layout.ts) ----
          function slugifyApp(value) {
            if (!value) return '_unknown';
            const lowered = String(value).normalize('NFKD').toLowerCase();
            const ascii = lowered.replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
            return ascii || '_unknown';
          }
          function normalizeVersion(value) {
            if (!value) return 'unknown';
            const cleaned = String(value).trim().replace(/[^A-Za-z0-9._\-]+/g, '-').replace(/^-+|-+$/g, '');
            return cleaned || 'unknown';
          }
          const slugCandidates = [
            result.packageId,
            result.appName,
            context && context.packageId,
            context && context.appName,
          ];
          let appSlug = '_unknown';
          for (const c of slugCandidates) {
            const s = slugifyApp(c);
            if (s !== '_unknown') { appSlug = s; break; }
          }
          const versionCandidates = [
            result.appVersion,
            context && context.targetVersion,
            context && context.version,
            result.version,
          ];
          let appVersion = 'unknown';
          for (const c of versionCandidates) {
            const v = normalizeVersion(c);
            if (v !== 'unknown') { appVersion = v; break; }
          }
          const safeRunId = String(runId).replace(/[^A-Za-z0-9._-]+/g, '');
          const appDir = `.modern-dev-mgmt/apps/${appSlug}`;
          const versionDir = `${appDir}/${appVersion}`;
          const perRunDir = `${versionDir}/${safeRunId}`;
          fs.mkdirSync(perRunDir, { recursive: true });
          fs.writeFileSync(`${perRunDir}/result.json`, resultJson);
          const copies = [
            ['.modern-dev-mgmt/validation/install.log',    `${perRunDir}/install.log`],
            ['.modern-dev-mgmt/validation/uninstall.log',  `${perRunDir}/uninstall.log`],
            ['.modern-dev-mgmt/validation/footprint.json', `${perRunDir}/footprint.json`],
            ['.modern-dev-mgmt/validation/leftovers.json', `${perRunDir}/leftovers.json`],
            ['.modern-dev-mgmt/validation/report.json',    `${perRunDir}/report.json`],
          ];
          for (const [src, dst] of copies) {
            try { if (fs.existsSync(src)) fs.copyFileSync(src, dst); } catch (e) { /* ignore */ }
          }
          const createdAt = result.createdAt;
          const intuneAppId = result.appId || null;
          const catalogAppId = (context && context.catalogAppId != null) ? context.catalogAppId : null;
          const patchRunId = (context && context.patchRunId != null) ? context.patchRunId : null;
          const latestPointer = {
            workflowRunId: safeRunId,
            createdAt,
            intuneAppId,
            catalogAppId,
          };
          fs.writeFileSync(`${versionDir}/latest.json`, JSON.stringify(latestPointer, null, 2));
          const indexPath = `${appDir}/index.json`;
          let index = null;
          if (fs.existsSync(indexPath)) {
            try { index = JSON.parse(fs.readFileSync(indexPath, 'utf8')); } catch (e) { index = null; }
          }
          const versions = (index && Array.isArray(index.versions)) ? index.versions.map(function (v) { return ({
            version: String(v.version),
            runs: Array.isArray(v.runs) ? v.runs.map(function (r) { return ({
              workflowRunId: String(r.workflowRunId),
              createdAt: r.createdAt || null,
              intuneAppId: r.intuneAppId || null,
              catalogAppId: r.catalogAppId != null ? r.catalogAppId : null,
              patchRunId: r.patchRunId != null ? r.patchRunId : null,
              status: r.status || null,
            }); }) : [],
          }); }) : [];
          const newRun = {
            workflowRunId: safeRunId,
            createdAt,
            intuneAppId,
            catalogAppId,
            patchRunId,
            status: result.status || null,
          };
          let target = versions.find(function (v) { return v.version === appVersion; });
          if (!target) {
            target = { version: appVersion, runs: [] };
            versions.push(target);
          }
          target.runs = target.runs.filter(function (r) { return r.workflowRunId !== safeRunId; });
          target.runs.push(newRun);
          versions.sort(function (a, b) {
            const aMax = a.runs.reduce(function (acc, r) { return (r.createdAt && r.createdAt > acc) ? r.createdAt : acc; }, '');
            const bMax = b.runs.reduce(function (acc, r) { return (r.createdAt && r.createdAt > acc) ? r.createdAt : acc; }, '');
            if (aMax !== bMax) return bMax.localeCompare(aMax);
            return b.version.localeCompare(a.version);
          });
          const indexOut = {
            slug: appSlug,
            displayName: result.appName || null,
            versions,
            updatedAt: new Date().toISOString(),
          };
          fs.writeFileSync(indexPath, JSON.stringify(indexOut, null, 2));
          NODE
          git add ".modern-dev-mgmt/runs/${GITHUB_RUN_ID}.json"
          if [ -d .modern-dev-mgmt/patch-runs ]; then
            git add .modern-dev-mgmt/patch-runs
          fi
          if [ -d .modern-dev-mgmt/apps ]; then
            git add .modern-dev-mgmt/apps
          fi
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "chore: record Modern Dev Mgmt macOS custom run ${GITHUB_RUN_ID} (per-app docs)"
            git pull --rebase origin "${GITHUB_REF_NAME:-main}"
            git push
          fi

      - name: Summary
        shell: bash
        run: |
          echo "✅ Custom macOS package ${{ github.event.inputs.package_name }} deployed to Intune." >> "$GITHUB_STEP_SUMMARY"
          echo "Release asset: ${{ github.event.inputs.asset_name }}" >> "$GITHUB_STEP_SUMMARY"
