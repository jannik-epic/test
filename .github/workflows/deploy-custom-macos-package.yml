# vanguard-template-version: 2026-07-20.4
name: Deploy Custom macOS Package to Intune
run-name: "Vanguard · ${{ inputs.package_id }} · ${{ inputs.app_version }} · ${{ inputs.dispatch_correlation_id }}"

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'GitHub release tag containing the uploaded PKG/DMG'
        required: true
        type: string
      asset_name:
        description: 'Release asset filename to package'
        required: true
        type: string
      package_id:
        description: 'Vanguard custom package id'
        required: true
        type: string
      dispatch_correlation_id:
        description: 'Unique Vanguard dispatch correlation id'
        required: false
        type: string
      package_name:
        description: 'Display name in Intune'
        required: true
        type: string
      app_description:
        description: 'Description in Intune'
        required: false
        type: string
      app_publisher:
        description: 'Publisher in Intune'
        required: false
        type: string
      app_version:
        description: 'Application version'
        required: false
        type: string
      app_icon_base64:
        description: 'Base64 encoded app icon (optional)'
        required: false
        type: string
      bundle_id:
        description: 'Primary bundle id fallback for raw PKG payloads'
        required: false
        type: string
      dry_run:
        description: 'Validate asset and metadata only; do not create the Intune app'
        required: false
        type: boolean
        default: false
      pre_install_script_b64:
        description: 'Base64 encoded pre-install script'
        required: false
        type: string
      post_install_script_b64:
        description: 'Base64 encoded post-install script'
        required: false
        type: string
      validation_enabled:
        description: 'Run VM validation (install/detect/uninstall/footprint) on the macOS runner before upload'
        required: false
        type: boolean
        default: true
      detection_script_b64:
        description: 'Base64 encoded macOS detection shell script (optional; default asserts a new /Applications app bundle)'
        required: false
        type: string
      uninstall_script_b64:
        description: 'Base64 encoded macOS uninstall shell script (optional; default removes new app bundles + pkgutil --forget)'
        required: false
        type: string
      assignment_json:
        description: 'JSON mobileAppAssignments payload generated by Vanguard'
        required: false
        type: string
      assignment_summary:
        description: 'Human-readable assignment plan summary'
        required: false
        type: string
      signing_identity:
        description: 'codesign/productsign identity (Developer ID Installer common name or SHA-1 of the cert in the keychain)'
        required: false
        type: string
      signing_cert_thumbprint:
        description: 'SHA-1 thumbprint used to select certificate-specific GitHub secrets'
        required: false
        type: string
      modern_dev_mgmt_context_b64:
        description: 'Base64 encoded Vanguard run context'
        required: false
        type: string

env:
  AZURE_TENANT_ID: 'f849cde7-f11d-4ef5-a31d-7fca98b21bf5'
  AZURE_CLIENT_ID: 'a34f2806-b6f7-4d11-98f6-b32894396ca8'
  INTUNE_TENANT_ID: 'f849cde7-f11d-4ef5-a31d-7fca98b21bf5'
  INTUNE_CLIENT_ID: 'a34f2806-b6f7-4d11-98f6-b32894396ca8'

permissions:
  id-token: write
  contents: write

jobs:
  validate-custom-macos-package:
    runs-on: macos-latest
    timeout-minutes: 35
    permissions:
      contents: read
      id-token: none
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade pycryptodome

      - name: Ensure packaging tool is executable
        run: chmod +x tools/intune_packager.py

      - name: Download uploaded macOS asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p custom-files
          gh release download "${{ github.event.inputs.release_tag }}" --repo "${{ github.repository }}" --pattern "${{ github.event.inputs.asset_name }}" --dir custom-files --clobber
          asset_path="custom-files/${{ github.event.inputs.asset_name }}"
          if [[ ! -f "$asset_path" ]]; then
            echo "::error::macOS asset was not downloaded: $asset_path"
            exit 1
          fi
          asset_path_lower="$(printf '%s' "$asset_path" | tr '[:upper:]' '[:lower:]')"
          case "$asset_path_lower" in
            *.pkg|*.dmg) echo "source_asset_path=$asset_path" >> "$GITHUB_ENV" ;;
            *) echo "::error::Only .pkg and .dmg assets are supported by this workflow"; exit 1 ;;
          esac

      - name: Normalize the deployment candidate to PKG
        shell: bash
        env:
          PACKAGE_NAME: ${{ github.event.inputs.package_name }}
          APP_VERSION: ${{ github.event.inputs.app_version }}
          BUNDLE_ID: ${{ github.event.inputs.bundle_id }}
        run: |
          set -euo pipefail
          if [[ -z "${source_asset_path:-}" || ! -f "$source_asset_path" ]]; then
            echo "::error::Downloaded macOS source asset is missing"
            exit 1
          fi
          mkdir -p custom-files/vanguard-candidate
          candidate="$PWD/custom-files/vanguard-candidate/vanguard-candidate.pkg"
          source_lower="$(printf '%s' "$source_asset_path" | tr '[:upper:]' '[:lower:]')"
          case "$source_lower" in
            *.pkg)
              cp -p "$source_asset_path" "$candidate"
              ;;
            *.dmg)
              rm -rf normalized-pkg
              args=(--skip-upload --dmg-file "$source_asset_path" --output-dir normalized-pkg --display-name "${PACKAGE_NAME:-Custom macOS app}")
              if [[ -n "${APP_VERSION:-}" ]]; then args+=(--app-version "$APP_VERSION"); fi
              if [[ -n "${BUNDLE_ID:-}" ]]; then args+=(--bundle-id "$BUNDLE_ID"); fi
              python3 tools/intune_packager.py "${args[@]}"
              built_pkg="$(find normalized-pkg -type f -name '*.pkg' -print -quit)"
              if [[ -z "$built_pkg" || ! -f "$built_pkg" ]]; then
                echo "::error::DMG normalization did not produce a PKG"
                exit 1
              fi
              cp -p "$built_pkg" "$candidate"
              ;;
          esac
          if [[ ! -s "$candidate" ]]; then
            echo "::error::Normalized macOS PKG is empty"
            exit 1
          fi
          echo "asset_path=$candidate" >> "$GITHUB_ENV"

      - name: Sign normalized macOS package with productsign
        if: ${{ github.event.inputs.signing_identity != '' }}
        shell: bash
        env:
          SIGNING_IDENTITY: ${{ github.event.inputs.signing_identity }}
          SIGNING_CERT_P12_BASE64: ${{ secrets[format('SIGNING_CERT_{0}', inputs.signing_cert_thumbprint)] }}
          SIGNING_CERT_P12_PASSWORD: ${{ secrets[format('SIGNING_CERT_PASSWORD_{0}', inputs.signing_cert_thumbprint)] }}
        run: |
          set -euo pipefail
          if [[ -z "${asset_path:-}" ]]; then
            echo "::error::asset_path is not set; cannot sign the selected package"
            exit 1
          fi
          if [[ -z "${SIGNING_CERT_P12_BASE64:-}" ]]; then
            echo "::error::Certificate-specific signing material is missing for ${{ github.event.inputs.signing_cert_thumbprint }}"
            exit 1
          fi
          cert_path="$RUNNER_TEMP/vanguard-signing.p12"
          keychain_path="$RUNNER_TEMP/vanguard-signing.keychain-db"
          keychain_password="$(openssl rand -hex 24)"
          cleanup_signing() {
            security delete-keychain "$keychain_path" >/dev/null 2>&1 || true
            rm -f "$cert_path" "$keychain_path"
          }
          trap cleanup_signing EXIT
          printf '%s' "$SIGNING_CERT_P12_BASE64" | base64 --decode > "$cert_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$cert_path" -k "$keychain_path" -P "${SIGNING_CERT_P12_PASSWORD:-}" -T /usr/bin/productsign -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain_path"
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | tr -d '"')
          if ! security find-identity -v "$keychain_path" | grep -Fi "$SIGNING_IDENTITY" >/dev/null; then
            echo "::error::Signing identity '$SIGNING_IDENTITY' was not found in the imported P12."
            exit 1
          fi
          signed_path="${asset_path%.pkg}.signed.pkg"
          echo "Signing normalized PKG with productsign identity '$SIGNING_IDENTITY'"
          productsign --sign "$SIGNING_IDENTITY" "$asset_path" "$signed_path"
          mv "$signed_path" "$asset_path"
          pkgutil --check-signature "$asset_path"

      - name: Require a deployable PKG signature
        shell: bash
        run: |
          set -euo pipefail
          signature_report="$(pkgutil --check-signature "$asset_path" 2>&1 || true)"
          printf '%s\n' "$signature_report"
          if [[ "$signature_report" == *"Status: unsigned"* || "$signature_report" == *"No signature"* || "$signature_report" != *"Status: signed"* ]]; then
            echo "::error::The normalized PKG is unsigned. Import a macOS Developer ID Installer certificate or provide a signed PKG."
            exit 1
          fi

      - name: Stage immutable macOS deployment candidate
        uses: actions/upload-artifact@v7
        with:
          name: macos-deployment-input-${{ github.run_id }}
          path: custom-files/
          if-no-files-found: error
          retention-days: 1

      - name: VM validation — baseline snapshot
        id: validate_baseline_macos
        if: ${{ github.event.inputs.validation_enabled != 'false' }}
        shell: bash
        run: |
          set +e
          mkdir -p .modern-dev-mgmt/validation
          python3 tools/macos_footprint.py snapshot --output .modern-dev-mgmt/validation/before.json

      - name: VM validation — install (custom macOS package)
        id: validate_install_macos
        if: ${{ github.event.inputs.validation_enabled != 'false' }}
        shell: bash
        timeout-minutes: 10
        continue-on-error: true
        run: |
          set +e
          mkdir -p .modern-dev-mgmt/validation
          log=.modern-dev-mgmt/validation/install.log
          : > "$log"
          if [ -z "$asset_path" ] || [ ! -f "$asset_path" ]; then
            echo "asset_path not available for validation: $asset_path" | tee -a "$log"
            echo "install_exit_code=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          asset_lower="$(printf '%s' "$asset_path" | tr '[:upper:]' '[:lower:]')"
          exit_code=0
          case "$asset_lower" in
            *.pkg)
              echo "Installing PKG: $asset_path" | tee -a "$log"
              sudo installer -pkg "$asset_path" -target / >> "$log" 2>&1
              exit_code=$?
              ;;
            *.dmg)
              echo "Mounting DMG: $asset_path" | tee -a "$log"
              mountpoint="$(mktemp -d)"
              hdiutil attach "$asset_path" -nobrowse -mountpoint "$mountpoint" >> "$log" 2>&1
              exit_code=$?
              if [ $exit_code -eq 0 ]; then
                inner_pkg="$(/usr/bin/find "$mountpoint" -maxdepth 2 -name '*.pkg' | head -n1)"
                if [ -n "$inner_pkg" ]; then
                  echo "Installing inner PKG: $inner_pkg" | tee -a "$log"
                  sudo installer -pkg "$inner_pkg" -target / >> "$log" 2>&1
                  exit_code=$?
                else
                  app="$(/usr/bin/find "$mountpoint" -maxdepth 2 -name '*.app' | head -n1)"
                  if [ -n "$app" ]; then
                    echo "Copying app bundle to /Applications: $app" | tee -a "$log"
                    sudo cp -R "$app" /Applications/ >> "$log" 2>&1
                    exit_code=$?
                  else
                    echo "No .pkg or .app found inside DMG" | tee -a "$log"
                    exit_code=1
                  fi
                fi
                hdiutil detach "$mountpoint" >> "$log" 2>&1 || true
              fi
              ;;
            *)
              echo "Unsupported asset for validation: $asset_path" | tee -a "$log"
              exit_code=1
              ;;
          esac
          echo "install exit code: $exit_code" | tee -a "$log"
          echo "install_exit_code=$exit_code" >> "$GITHUB_OUTPUT"

      - name: VM validation — after-install snapshot + footprint diff
        if: ${{ github.event.inputs.validation_enabled != 'false' && steps.validate_install_macos.outcome == 'success' && steps.validate_install_macos.outputs.install_exit_code == '0' }}
        shell: bash
        run: |
          set +e
          python3 tools/macos_footprint.py snapshot --output .modern-dev-mgmt/validation/after-install.json
          python3 tools/macos_footprint.py diff \
            --before .modern-dev-mgmt/validation/before.json \
            --after  .modern-dev-mgmt/validation/after-install.json \
            --output .modern-dev-mgmt/validation/footprint.json

      - name: VM validation — detection (assert installed)
        id: validate_detection_macos
        if: ${{ github.event.inputs.validation_enabled != 'false' && steps.validate_install_macos.outcome == 'success' && steps.validate_install_macos.outputs.install_exit_code == '0' }}
        shell: bash
        continue-on-error: true
        env:
          DETECTION_SCRIPT_B64: ${{ github.event.inputs.detection_script_b64 }}
        run: |
          set +e
          out=.modern-dev-mgmt/validation/detection.log
          : > "$out"
          code=1
          if [ -n "$DETECTION_SCRIPT_B64" ]; then
            printf '%s' "$DETECTION_SCRIPT_B64" | base64 --decode > /tmp/detection_script.sh 2>/dev/null
            bash /tmp/detection_script.sh >> "$out" 2>&1
            code=$?
          else
            # Default detection: install must have added at least one file or
            # installed-application (pkgutil receipt / .app bundle) to the system.
            if python3 -c "import json,sys; d=json.load(open('.modern-dev-mgmt/validation/footprint.json')); s=d.get('summary',{}); sys.exit(0 if (s.get('fileCount',0)>0 or s.get('arpEntries',0)>0) else 1)" >> "$out" 2>&1; then
              code=0
            fi
          fi
          echo "detection exit code: $code" | tee -a "$out"
          echo "detection_exit_code=$code" >> "$GITHUB_OUTPUT"

      - name: VM validation — uninstall (when an uninstall script is supplied)
        id: validate_uninstall_macos
        if: ${{ github.event.inputs.validation_enabled != 'false' && github.event.inputs.uninstall_script_b64 != '' && steps.validate_install_macos.outcome == 'success' && steps.validate_install_macos.outputs.install_exit_code == '0' }}
        shell: bash
        timeout-minutes: 10
        continue-on-error: true
        env:
          UNINSTALL_SCRIPT_B64: ${{ github.event.inputs.uninstall_script_b64 }}
        run: |
          set +e
          log=.modern-dev-mgmt/validation/uninstall.log
          : > "$log"
          printf '%s' "$UNINSTALL_SCRIPT_B64" | base64 --decode > /tmp/uninstall_script.sh 2>/dev/null
          bash /tmp/uninstall_script.sh >> "$log" 2>&1
          code=$?
          echo "uninstall exit code: $code" | tee -a "$log"
          echo "uninstall_exit_code=$code" >> "$GITHUB_OUTPUT"

      - name: VM validation — leftover diff
        if: ${{ always() && github.event.inputs.validation_enabled != 'false' && github.event.inputs.uninstall_script_b64 != '' && steps.validate_install_macos.outputs.install_exit_code == '0' }}
        shell: bash
        run: |
          set +e
          python3 tools/macos_footprint.py snapshot --output .modern-dev-mgmt/validation/after-uninstall.json
          python3 tools/macos_footprint.py diff --leftovers \
            --before .modern-dev-mgmt/validation/before.json \
            --after  .modern-dev-mgmt/validation/after-uninstall.json \
            --output .modern-dev-mgmt/validation/leftovers.json

      - name: VM validation — assemble report
        if: ${{ github.event.inputs.validation_enabled != 'false' }}
        shell: bash
        env:
          INSTALL_EXIT:      ${{ steps.validate_install_macos.outputs.install_exit_code }}
          DETECT_EXIT:       ${{ steps.validate_detection_macos.outputs.detection_exit_code }}
          UNINSTALL_EXIT:    ${{ steps.validate_uninstall_macos.outputs.uninstall_exit_code }}
          INSTALL_OUTCOME:   ${{ steps.validate_install_macos.outcome }}
          DETECT_OUTCOME:    ${{ steps.validate_detection_macos.outcome }}
          UNINSTALL_OUTCOME: ${{ steps.validate_uninstall_macos.outcome }}
          UNINSTALL_CONFIGURED: ${{ github.event.inputs.uninstall_script_b64 != '' }}
        run: |
          set +e
          python3 - <<'PY'
          import json, os
          def parse_int(v):
              try:
                  return int(v)
              except Exception:
                  return None
          def tail(path, n=200):
              try:
                  with open(path, 'r', errors='replace') as fh:
                      return ''.join(fh.readlines()[-n:])
              except Exception:
                  return None
          vdir = '.modern-dev-mgmt/validation'
          report = {
              'installExitCode':   parse_int(os.environ.get('INSTALL_EXIT')),
              'detectionExitCode': parse_int(os.environ.get('DETECT_EXIT')),
              'uninstallExitCode': parse_int(os.environ.get('UNINSTALL_EXIT')),
              'installOutcome':    os.environ.get('INSTALL_OUTCOME') or None,
              'detectionOutcome':  os.environ.get('DETECT_OUTCOME') or None,
              'uninstallOutcome':  os.environ.get('UNINSTALL_OUTCOME') or 'skipped',
              'footprintAvailable': os.path.exists(os.path.join(vdir, 'footprint.json')),
              'leftoversAvailable': os.path.exists(os.path.join(vdir, 'leftovers.json')),
              'installLogTail':    tail(os.path.join(vdir, 'install.log')),
              'uninstallLogTail':  tail(os.path.join(vdir, 'uninstall.log')),
          }
          os.makedirs(vdir, exist_ok=True)
          with open(os.path.join(vdir, 'report.json'), 'w') as fh:
              json.dump(report, fh, indent=2)
          PY
          if [ "$INSTALL_OUTCOME" != "success" ] || [ "$INSTALL_EXIT" != "0" ]; then
            echo "::error::Custom macOS package install failed in validation runner — aborting Intune upload."
            exit 1
          fi
          if [ "$DETECT_OUTCOME" != "success" ] || [ "$DETECT_EXIT" != "0" ]; then
            echo "::error::Custom macOS detection did not confirm the installed app — aborting Intune upload."
            exit 1
          fi
          if [ "$UNINSTALL_CONFIGURED" = "true" ]; then
            if [ "$UNINSTALL_OUTCOME" != "success" ] || [ "$UNINSTALL_EXIT" != "0" ]; then
              echo "::error::Custom macOS uninstall failed in validation runner — aborting Intune upload."
              exit 1
            fi
            python3 - <<'PY'
          import json, os, sys
          path = '.modern-dev-mgmt/validation/leftovers.json'
          if not os.path.exists(path):
              print('::error::macOS leftover report is missing after uninstall.')
              sys.exit(1)
          summary = (json.load(open(path)) or {}).get('summary', {})
          leftovers = int(summary.get('fileCount') or 0) + int(summary.get('arpEntries') or 0)
          if leftovers:
              print(f'::error::macOS uninstall left {leftovers} package artifact(s) behind.')
              sys.exit(1)
          PY
          fi

      - name: VM validation — upload artifacts
        if: ${{ always() && github.event.inputs.validation_enabled != 'false' }}
        uses: actions/upload-artifact@v7
        with:
          name: validation-macos-${{ github.run_id }}
          path: .modern-dev-mgmt/validation/
          if-no-files-found: ignore
          retention-days: 14

      - name: Dry run summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        shell: bash
        env:
          ASSIGNMENT_SUMMARY: ${{ github.event.inputs.assignment_summary }}
        run: |
          echo "✅ Dry run completed. The macOS asset passed validation and no Intune app was created."
          if [[ -n "${ASSIGNMENT_SUMMARY:-}" ]]; then
            echo "Assignment plan: $ASSIGNMENT_SUMMARY"
          fi

  deploy-custom-macos-package:
    needs: validate-custom-macos-package
    if: ${{ github.event.inputs.dry_run != 'true' }}
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve target Azure tenant from Vanguard context
        shell: bash
        env:
          MODERN_DEVMGMT_CONTEXT_B64: ${{ github.event.inputs.modern_dev_mgmt_context_b64 }}
        run: |
          if [[ -z "${MODERN_DEVMGMT_CONTEXT_B64:-}" ]]; then exit 0; fi
          decoded="$(printf '%s' "$MODERN_DEVMGMT_CONTEXT_B64" | base64 --decode 2>/dev/null || true)"
          if [[ -z "$decoded" ]]; then
            echo "::warning::could not decode Vanguard tenant context; using workflow defaults"
            exit 0
          fi
          tenant="$(printf '%s' "$decoded" | jq -r '.targetAzureTenantId // ""' 2>/dev/null || true)"
          client="$(printf '%s' "$decoded" | jq -r '.targetAzureClientId // ""' 2>/dev/null || true)"
          if [[ -n "$tenant" ]]; then
            echo "::add-mask::$tenant"
            echo "AZURE_TENANT_ID=$tenant" >> "$GITHUB_ENV"
            echo "INTUNE_TENANT_ID=$tenant" >> "$GITHUB_ENV"
          fi
          if [[ -n "$client" ]]; then
            echo "AZURE_CLIENT_ID=$client" >> "$GITHUB_ENV"
            echo "INTUNE_CLIENT_ID=$client" >> "$GITHUB_ENV"
          fi

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip pycryptodome

      - name: Ensure packaging tool is executable
        run: chmod +x tools/intune_packager.py

      - name: Download immutable validated candidate
        uses: actions/download-artifact@v8
        with:
          name: macos-deployment-input-${{ github.run_id }}
          path: custom-files

      - name: Download validation evidence
        if: ${{ github.event.inputs.validation_enabled != 'false' }}
        uses: actions/download-artifact@v8
        with:
          name: validation-macos-${{ github.run_id }}
          path: .modern-dev-mgmt/validation

      - name: Resolve validated asset path
        shell: bash
        run: |
          set -euo pipefail
          asset_path="$PWD/custom-files/vanguard-candidate/vanguard-candidate.pkg"
          if [[ ! -f "$asset_path" ]]; then
            echo "::error::Validated macOS asset is missing: $asset_path"
            exit 1
          fi
          echo "asset_path=$asset_path" >> "$GITHUB_ENV"

      - name: Azure Login using OIDC
        uses: azure/login@v3
        with:
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          client-id: ${{ env.AZURE_CLIENT_ID }}
          allow-no-subscriptions: true

      - name: Acquire Microsoft Graph token
        shell: bash
        run: |
          set -euo pipefail
          token=$(az account get-access-token --resource https://graph.microsoft.com --query accessToken -o tsv)
          if [[ -z "$token" ]]; then
            echo "::error::Failed to acquire Microsoft Graph access token"
            exit 1
          fi
          echo "::add-mask::$token"
          echo "INTUNE_ACCESS_TOKEN=$token" >> "$GITHUB_ENV"

      - name: Package and upload to Intune
        id: package_upload
        if: ${{ github.event.inputs.dry_run != 'true' }}
        shell: bash
        env:
          INTUNE_TENANT_ID: '${{ env.INTUNE_TENANT_ID }}'
          INTUNE_CLIENT_ID: '${{ env.INTUNE_CLIENT_ID }}'
          INTUNE_ACCESS_TOKEN: '${{ env.INTUNE_ACCESS_TOKEN }}'
          INTUNE_CLIENT_SECRET: '${{ secrets.INTUNE_CLIENT_SECRET }}'
          APP_NAME: '${{ github.event.inputs.package_name }}'
          APP_DESCRIPTION: '${{ github.event.inputs.app_description }}'
          APP_PUBLISHER: '${{ github.event.inputs.app_publisher }}'
          APP_VERSION: '${{ github.event.inputs.app_version }}'
          APP_ICON_BASE64: '${{ github.event.inputs.app_icon_base64 }}'
          BUNDLE_ID: '${{ github.event.inputs.bundle_id }}'
          PRE_INSTALL_SCRIPT_B64: '${{ github.event.inputs.pre_install_script_b64 }}'
          POST_INSTALL_SCRIPT_B64: '${{ github.event.inputs.post_install_script_b64 }}'
        run: |
          set -euo pipefail
          if [[ -z "${INTUNE_ACCESS_TOKEN:-}" && -z "${INTUNE_CLIENT_SECRET:-}" ]]; then
            echo "::error::Failed to locate Microsoft Graph token. Ensure Azure login succeeded or configure INTUNE_CLIENT_SECRET." >&2
            exit 1
          fi
          mkdir -p output
          ARGS=(--output-dir output --display-name "$APP_NAME")
          if [[ -n "$APP_DESCRIPTION" ]]; then ARGS+=(--description "$APP_DESCRIPTION"); fi
          if [[ -n "$APP_PUBLISHER" ]]; then ARGS+=(--publisher "$APP_PUBLISHER"); fi
          if [[ -n "$APP_VERSION" ]]; then ARGS+=(--app-version "$APP_VERSION"); fi
          if [[ -n "$BUNDLE_ID" ]]; then ARGS+=(--bundle-id "$BUNDLE_ID"); fi
          if [[ -n "$PRE_INSTALL_SCRIPT_B64" ]]; then ARGS+=(--pre-install-script-b64 "$PRE_INSTALL_SCRIPT_B64"); fi
          if [[ -n "$POST_INSTALL_SCRIPT_B64" ]]; then ARGS+=(--post-install-script-b64 "$POST_INSTALL_SCRIPT_B64"); fi
          ICON_FILE_PATH=""
          if [[ -n "$APP_ICON_BASE64" ]]; then
            ICON_FILE_PATH="output/app_icon.png"
            export APP_ICON_BASE64 ICON_FILE_PATH
            python3 -c "import base64, os, pathlib, sys; raw = os.environ.get('APP_ICON_BASE64', ''); raw = raw.split(',', 1)[1] if raw.startswith('data:') else raw.strip(); sys.exit('App icon base64 data is empty') if not raw else None; path = pathlib.Path(os.environ['ICON_FILE_PATH']); path.parent.mkdir(parents=True, exist_ok=True); path.write_bytes(base64.b64decode(raw))"
            ARGS+=(--icon-file "$ICON_FILE_PATH")
          fi
          ARGS+=(--pkg-file "$asset_path")
          python3 tools/intune_packager.py "${ARGS[@]}"

      - name: Apply assignment template
        if: ${{ github.event.inputs.dry_run != 'true' && github.event.inputs.assignment_json != '' }}
        shell: pwsh
        env:
          ASSIGNMENT_JSON: ${{ github.event.inputs.assignment_json }}
        run: |
          ./scripts/common/Assign-IntuneMobileApp.ps1 -AccessToken "$env:INTUNE_ACCESS_TOKEN" -AppId "${{ steps.package_upload.outputs.app_id }}" -AssignmentJson $env:ASSIGNMENT_JSON -IntuneApiUrl "https://graph.microsoft.com/v1.0"

      - name: Persist Vanguard run result
        if: ${{ github.event.inputs.dry_run != 'true' && steps.package_upload.outputs.app_id != '' }}
        shell: bash
        env:
          APP_ID: ${{ steps.package_upload.outputs.app_id }}
          APP_NAME: ${{ steps.package_upload.outputs.app_name }}
          PACKAGE_ID: ${{ github.event.inputs.package_id }}
          APP_VERSION: ${{ github.event.inputs.app_version }}
          MODERN_DEVMGMT_CONTEXT_B64: ${{ github.event.inputs.modern_dev_mgmt_context_b64 }}
        run: |
          set -euo pipefail
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          # Cache validation artifacts before git stash so the persist step's
          # JS body can still read them after stash + rebase. analyze_app_footprint
          # writes untracked files under .modern-dev-mgmt/validation/ that
          # the stash --include-untracked otherwise removes.
          if [[ -d .modern-dev-mgmt/validation ]]; then
            mkdir -p /tmp/validation-cache
            cp -r .modern-dev-mgmt/validation/. /tmp/validation-cache/ || true
          fi
          if [[ -n "$(git status --porcelain)" ]]; then
            git stash push --include-untracked --message "workflow artifacts before persistence" >/dev/null || true
          fi
          git pull --rebase
          if [[ -d /tmp/validation-cache ]]; then
            mkdir -p .modern-dev-mgmt/validation
            cp -r /tmp/validation-cache/. .modern-dev-mgmt/validation/ || true
          fi
          mkdir -p .modern-dev-mgmt/runs
          node - <<'NODE'
          const fs = require('fs');
          const runId = process.env.GITHUB_RUN_ID;
          let context = null;
          if (process.env.MODERN_DEVMGMT_CONTEXT_B64) {
            try {
              context = JSON.parse(Buffer.from(process.env.MODERN_DEVMGMT_CONTEXT_B64, 'base64').toString('utf8'));
            } catch (error) {
              console.warn('Could not decode Vanguard context:', error.message);
            }
          }
          const result = {
            workflowRunId: runId,
            workflow: 'deploy-custom-macos-package.yml',
            packageManager: 'custom-macos',
            packageId: process.env.PACKAGE_ID || null,
            appId: process.env.APP_ID || null,
            appName: process.env.APP_NAME || process.env.PACKAGE_ID || null,
            appVersion: process.env.APP_VERSION || null,
            status: 'success',
            createdAt: new Date().toISOString(),
            context,
          };
          // Embed VM-validation evidence (install/detect/uninstall report +
          // footprint/leftovers) so the App Documentation payload shows the
          // same validation sub-object + footprint as Windows. The standalone
          // footprint.json/leftovers.json copied below remain the source of
          // truth, but inlining them keeps the legacy run JSON self-contained.
          try {
            const readJson = (p) => { try { return JSON.parse(fs.readFileSync(p, 'utf8')); } catch (e) { return null; } };
            const report = readJson('.modern-dev-mgmt/validation/report.json');
            const footprint = readJson('.modern-dev-mgmt/validation/footprint.json');
            const leftovers = readJson('.modern-dev-mgmt/validation/leftovers.json');
            if (report) result.validation = report;
            if (footprint) result.footprint = footprint;
            if (leftovers) result.leftovers = leftovers;
          } catch (e) { /* validation evidence is best-effort */ }
          const resultJson = JSON.stringify(result, null, 2);
          fs.writeFileSync(`.modern-dev-mgmt/runs/${runId}.json`, resultJson);
          if (context && context.patchRunId) {
            fs.mkdirSync('.modern-dev-mgmt/patch-runs', { recursive: true });
            fs.writeFileSync(`.modern-dev-mgmt/patch-runs/${context.patchRunId}.json`, resultJson);
          }
          // ---- Per-app docs layout (mirrors app-docs-layout.ts) ----
          function slugifyApp(value) {
            if (!value) return '_unknown';
            const lowered = String(value).normalize('NFKD').toLowerCase();
            const ascii = lowered.replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
            return ascii || '_unknown';
          }
          function normalizeVersion(value) {
            if (!value) return 'unknown';
            const cleaned = String(value).trim().replace(/[^A-Za-z0-9._\-]+/g, '-').replace(/^-+|-+$/g, '');
            return cleaned || 'unknown';
          }
          const slugCandidates = [
            result.packageId,
            result.appName,
            context && context.packageId,
            context && context.appName,
          ];
          let appSlug = '_unknown';
          for (const c of slugCandidates) {
            const s = slugifyApp(c);
            if (s !== '_unknown') { appSlug = s; break; }
          }
          const versionCandidates = [
            result.appVersion,
            context && context.targetVersion,
            context && context.version,
            result.version,
          ];
          let appVersion = 'unknown';
          for (const c of versionCandidates) {
            const v = normalizeVersion(c);
            if (v !== 'unknown') { appVersion = v; break; }
          }
          const safeRunId = String(runId).replace(/[^A-Za-z0-9._-]+/g, '');
          const appDir = `.modern-dev-mgmt/apps/${appSlug}`;
          const versionDir = `${appDir}/${appVersion}`;
          const perRunDir = `${versionDir}/${safeRunId}`;
          fs.mkdirSync(perRunDir, { recursive: true });
          fs.writeFileSync(`${perRunDir}/result.json`, resultJson);
          const copies = [
            ['.modern-dev-mgmt/validation/install.log',    `${perRunDir}/install.log`],
            ['.modern-dev-mgmt/validation/uninstall.log',  `${perRunDir}/uninstall.log`],
            ['.modern-dev-mgmt/validation/footprint.json', `${perRunDir}/footprint.json`],
            ['.modern-dev-mgmt/validation/leftovers.json', `${perRunDir}/leftovers.json`],
            ['.modern-dev-mgmt/validation/report.json',    `${perRunDir}/report.json`],
          ];
          for (const [src, dst] of copies) {
            try { if (fs.existsSync(src)) fs.copyFileSync(src, dst); } catch (e) { /* ignore */ }
          }
          const createdAt = result.createdAt;
          const intuneAppId = result.appId || null;
          const catalogAppId = (context && context.catalogAppId != null) ? context.catalogAppId : null;
          const patchRunId = (context && context.patchRunId != null) ? context.patchRunId : null;
          const latestPointer = {
            workflowRunId: safeRunId,
            createdAt,
            intuneAppId,
            catalogAppId,
          };
          fs.writeFileSync(`${versionDir}/latest.json`, JSON.stringify(latestPointer, null, 2));
          const indexPath = `${appDir}/index.json`;
          let index = null;
          if (fs.existsSync(indexPath)) {
            try { index = JSON.parse(fs.readFileSync(indexPath, 'utf8')); } catch (e) { index = null; }
          }
          const versions = (index && Array.isArray(index.versions)) ? index.versions.map(function (v) { return ({
            version: String(v.version),
            runs: Array.isArray(v.runs) ? v.runs.map(function (r) { return ({
              workflowRunId: String(r.workflowRunId),
              createdAt: r.createdAt || null,
              intuneAppId: r.intuneAppId || null,
              catalogAppId: r.catalogAppId != null ? r.catalogAppId : null,
              patchRunId: r.patchRunId != null ? r.patchRunId : null,
              status: r.status || null,
            }); }) : [],
          }); }) : [];
          const newRun = {
            workflowRunId: safeRunId,
            createdAt,
            intuneAppId,
            catalogAppId,
            patchRunId,
            status: result.status || null,
          };
          let target = versions.find(function (v) { return v.version === appVersion; });
          if (!target) {
            target = { version: appVersion, runs: [] };
            versions.push(target);
          }
          target.runs = target.runs.filter(function (r) { return r.workflowRunId !== safeRunId; });
          target.runs.push(newRun);
          versions.sort(function (a, b) {
            const aMax = a.runs.reduce(function (acc, r) { return (r.createdAt && r.createdAt > acc) ? r.createdAt : acc; }, '');
            const bMax = b.runs.reduce(function (acc, r) { return (r.createdAt && r.createdAt > acc) ? r.createdAt : acc; }, '');
            if (aMax !== bMax) return bMax.localeCompare(aMax);
            return b.version.localeCompare(a.version);
          });
          const indexOut = {
            slug: appSlug,
            displayName: result.appName || null,
            versions,
            updatedAt: new Date().toISOString(),
          };
          fs.writeFileSync(indexPath, JSON.stringify(indexOut, null, 2));
          NODE
          git add ".modern-dev-mgmt/runs/${GITHUB_RUN_ID}.json"
          if [ -d .modern-dev-mgmt/patch-runs ]; then
            git add .modern-dev-mgmt/patch-runs
          fi
          if [ -d .modern-dev-mgmt/apps ]; then
            git add .modern-dev-mgmt/apps
          fi
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "chore: record Vanguard macOS custom run ${GITHUB_RUN_ID} (per-app docs)"
            git pull --rebase origin "${GITHUB_REF_NAME:-main}"
            git push
          fi

      - name: Summary
        shell: bash
        env:
          PACKAGE_NAME: ${{ github.event.inputs.package_name }}
          ASSET_NAME: ${{ github.event.inputs.asset_name }}
        run: |
          printf '✅ Custom macOS package %s deployed to Intune.\n' "$PACKAGE_NAME" >> "$GITHUB_STEP_SUMMARY"
          printf 'Release asset: %s\n' "$ASSET_NAME" >> "$GITHUB_STEP_SUMMARY"
